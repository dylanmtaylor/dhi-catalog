variant: runtime
flavor: python3.12
tags:
  - 4-python3.12
  - 4.1050-python3.12
  - 4-debian13-python3.12
  - 4.1050.100-python3.12
  - 4.1050-debian13-python3.12
  - 4.1050.100-debian13-python3.12
platforms:
  - linux/amd64
vars:
  BUILD_NUMBER: "100"
  COMMIT_SHA: 7fb8a581bbc6c5a2455eedad8d8b842600011bbf
  DOTNET_8_REFERENCE: dhi/dotnet:8.0.421-sdk-debian13@sha256:72fbc5f36f6f5b93caf23f5ccbd79294bd0f3df11d421d72c36bd48544b91683
  DOTNET_8_VERSION: 8.0.421
  DOTNET_10_REFERENCE: dhi/dotnet:10.0.300-sdk-debian13@sha256:eee3023a47216a018b02d1c14cfefb38e27ed98a8e964df29f6b5e81fb40ecaf
  DOTNET_10_VERSION: 10.0.300
  EXT_BUNDLE_COMMIT_SHA: d1fe93a40047cf6cab8ea5f37f2161ea260de151
  EXT_BUNDLE_VERSION: 4.35.0
  FUNCTIONS_WORKER: python
  PYTHON_DIGEST: sha256:d5006d334c66ca6129f4488cae0c8db4dddfb6648328fc64f30817e8932e6c84
  PYTHON_MAJOR_MINOR_VERSION: "3.12"
  PYTHON_VERSION: 3.12.13
  SEMVER_MAJOR_MINOR_VERSION: "4.1050"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.1050.100
  TEMPLATES_BUILDID: "278677"
  TEMPLATES_DOWNLOADURL: https://artprodwus21.artifacts.visualstudio.com/Ad1c51fbc-4477-4a0f-b99f-fc9013009a58/ae7e3bf3-d41a-4480-9ac0-b6cf9df9ac24/_apis/artifact/cGlwZWxpbmVhcnRpZmFjdDovL2F6ZnVuYy9wcm9qZWN0SWQvYWU3ZTNiZjMtZDQxYS00NDgwLTlhYzAtYjZjZjlkZjlhYzI0L2J1aWxkSWQvMjc4Njc3L2FydGlmYWN0TmFtZS9kcm9w0/content?format=zip
  VERSION: 4.1050.100
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/microsoft-signing-key] https://packages.microsoft.com/debian/13/prod trixie main
  keyring:
    - https://packages.microsoft.com/keys/microsoft-2025.asc
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - libglib2.0-0t64
    - libicu76
    - libsm6
    - libxext6
    - libxrender-dev
    - msodbcsql18
    - mssql-tools18
    - unixodbc
  builds:
    - name: azure-functions-host
      uses: dhi.io/dotnet:10.0.300-sdk-debian13@sha256:eee3023a47216a018b02d1c14cfefb38e27ed98a8e964df29f6b5e81fb40ecaf
      contents:
        packages:
          - bash
          - findutils
        files:
          - url: git+https://github.com/Azure/azure-functions-host.git#v4.1050.100
            checksum: 7fb8a581bbc6c5a2455eedad8d8b842600011bbf
            path: ${source.dir}/azure-functions-host
            spdx:
              name: azure-functions-host
              version: 4.1050.100
              packages:
                - name: azure-functions-host
                  purl: pkg:github/Azure/azure-functions-host@4.1050.100
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: bump nuget dependencies
          work-dir: ${source.dir}/azure-functions-host
          runs: |
            set -eux -o pipefail

            # CVE-2026-40182, CVE-2026-40891, CVE-2026-42191: OpenTelemetry.Exporter.OpenTelemetryProtocol 1.14.0 -> 1.15.3
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/OpenTelemetry\.Exporter\.OpenTelemetryProtocol" Version="1\.14\.0"/OpenTelemetry.Exporter.OpenTelemetryProtocol" Version="1.15.3"/g'
            # CVE-2026-40894: OpenTelemetry.Api 1.14.0 -> 1.15.3
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/OpenTelemetry\.Api" Version="1\.14\.0"/OpenTelemetry.Api" Version="1.15.3"/g'
            # GHSA-g4vj-cjjj-v7hg: NuGet.Packaging 5.11.6 -> 5.11.7
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/NuGet\.Packaging" Version="5\.11\.6"/NuGet.Packaging" Version="5.11.7"/g'
            # GHSA-g4vj-cjjj-v7hg: NuGet.Protocol 5.11.6 -> 5.11.7
            find . -name "*.csproj" -o -name "*.props" | xargs sed -i 's/NuGet\.Protocol" Version="5\.11\.6"/NuGet.Protocol" Version="5.11.7"/g'
        - name: build
          work-dir: ${source.dir}/azure-functions-host
          privileged: true
          runs: |
            set -eux -o pipefail

            dotnet publish -v q \
              /p:BuildNumber='100' /p:CommitHash='7fb8a581bbc6c5a2455eedad8d8b842600011bbf' \
              src/WebJobs.Script.WebHost/WebJobs.Script.WebHost.csproj \
              -c Release \
              --output '${target.dir}/azure-functions-host' \
              --runtime linux-x64 --self-contained
        - name: install
          runs: |
            set -eux -o pipefail

            find '${target.dir}/azure-functions-host/workers' -type d -mindepth 1 -maxdepth 1 -not -name 'python' -exec rm -rf '{}' \;
      outputs:
        - source: ${target.dir}/azure-functions-host
          target: /azure-functions-host
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/azure-functions-host
          target: /opt/docker/sbom/azure-functions-host
          uid: 0
          gid: 0
    - name: azure-functions-extension-bundles
      uses: dhi.io/dotnet:8.0.421-sdk-debian13@sha256:72fbc5f36f6f5b93caf23f5ccbd79294bd0f3df11d421d72c36bd48544b91683
      contents:
        packages:
          - bash
          - ca-certificates
          - sed
          - unzip
        files:
          - url: git+https://github.com/Azure/azure-functions-extension-bundles.git#4.35.0
            checksum: d1fe93a40047cf6cab8ea5f37f2161ea260de151
            path: ${source.dir}/azure-functions-extension-bundles
            spdx:
              name: azure-functions-extension-bundles
              version: 4.35.0
              packages:
                - name: azure-functions-extension-bundles
                  purl: pkg:github/Azure/azure-functions-extension-bundles@4.35.0
                  license: MIT
            uid: 0
            gid: 0
          - url: https://artprodwus21.artifacts.visualstudio.com/Ad1c51fbc-4477-4a0f-b99f-fc9013009a58/ae7e3bf3-d41a-4480-9ac0-b6cf9df9ac24/_apis/artifact/cGlwZWxpbmVhcnRpZmFjdDovL2F6ZnVuYy9wcm9qZWN0SWQvYWU3ZTNiZjMtZDQxYS00NDgwLTlhYzAtYjZjZjlkZjlhYzI0L2J1aWxkSWQvMjc4Njc3L2FydGlmYWN0TmFtZS9kcm9w0/content?format=zip
            path: ${source.dir}/templatesArtifacts.zip
            uid: 0
            gid: 0
      pipeline:
        - name: extract templates
          work-dir: ${source.dir}/azure-functions-extension-bundles
          runs: |
            set -eux -o pipefail

            unzip ${source.dir}/templatesArtifacts.zip
            mv drop templatesArtifacts
        - name: patch source
          uses: patch@v1
          with:
            dir: ${source.dir}/azure-functions-extension-bundles
            options: -p1
            patches:
              - ${source.dir}/patch/linux_bundles.patch
        - name: build
          work-dir: ${source.dir}/azure-functions-extension-bundles/build
          privileged: true
          runs: |
            set -eux -o pipefail

            sed -E -i '${source.dir}/azure-functions-extension-bundles/src/Microsoft.Azure.Functions.ExtensionBundle/NuGet.Config' \
              -e 's|azure-functions-extension-bundles|nuget.org|' \
              -e 's|https://pkgs.dev.azure.com/[^"]+|https://api.nuget.org/v3/index.json|'

            TEMPLATES_ARTIFACTS_DIRECTORY=1 dotnet run \
              skip:GenerateVulnerabilityReport,PackageNetCoreV3BundlesWindows,CreateRUPackage,CreateCDNStoragePackage,CreateCDNStoragePackageWindows,BuildBundleBinariesForWindows
        - name: install
          work-dir: ${source.dir}/azure-functions-extension-bundles/artifacts
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/FuncExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle/4.35.0
            unzip Microsoft.Azure.Functions.ExtensionBundle.4.35.0_linux-x64.zip \
              -d ${target.dir}/FuncExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle/4.35.0
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: ecosystem/azure-functions/patch
      outputs:
        - source: ${target.dir}/FuncExtensionBundles
          target: /FuncExtensionBundles
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/azure-functions-extension-bundles
          target: /opt/docker/sbom/azure-functions-extension-bundles
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.12.13@sha256:d5006d334c66ca6129f4488cae0c8db4dddfb6648328fc64f30817e8932e6c84
      includes:
        - opt/**
        - usr/**
        - var/**
      uid: 0
      gid: 0
