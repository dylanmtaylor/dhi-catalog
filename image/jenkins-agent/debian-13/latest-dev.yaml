# syntax=dhi.io/build:2-debian13

name: Jenkins Agent (latest) (dev)
image: dhi.io/jenkins-agent
variant: dev
tags:
  - 3345-dev
  - 3345-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BCFIPS_VERSION: 2.1.2
  BCPKIXFIPS_VERSION: 2.1.10
  BCRNGJENT_VERSION: 1.3.6
  BCTLSFIPS_VERSION: 2.1.22
  BCUTILFIPS_VERSION: 2.1.5
  JAVA_HOME_PATH: /opt/java/openjdk/21-jre
  JAVA_MAJOR_VERSION: "21"
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JRE_VERSION: 21.0.11.10
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  REMOTING_COMMIT_SHA: 03dee9bf88fca2151e7f8f246c64fdacd72c62cb
  REMOTING_SEMVER_VERSION: "3345"
  VERSION: 3345.v03dee9b_f88fc
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: jenkins-agent
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - coreutils
          - findutils
          - bash
          - curl
          - git
          - gzip
          - sed
          - tar
        files:
          - url: git+https://github.com/jenkinsci/remoting.git#3345.v03dee9b_f88fc
            checksum: 03dee9bf88fca2151e7f8f246c64fdacd72c62cb
            path: ${source.dir}/remoting
            spdx:
              name: jenkins-remoting
              version: 3345.v03dee9b_f88fc
              packages:
                - name: jenkins-remoting
                  purl: pkg:dhi/jenkins-remoting@3345.v03dee9b_f88fc
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: build
          work-dir: ${source.dir}/remoting
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            # Replace changelist property in pom.xml with VERSION to ensure reproducible builds
            sed -i "s|<changelist>.*</changelist>|<changelist>3345.v03dee9b_f88fc</changelist>|" pom.xml

            # Build remoting (single-module project, produces remoting JAR)
            mvn clean install -DskipTests -Dmaven.test.skip=true -Dspotless.check.skip=true

            # Verify the JAR has Main-Class in manifest (maven-shade-plugin should set this)
            JAR_FILE="target/remoting-3345.v03dee9b_f88fc.jar"
            if [ ! -f "$JAR_FILE" ]; then
              echo "ERROR: JAR file not found: $JAR_FILE" >&2
              exit 1
            fi
            jar xf "$JAR_FILE" META-INF/MANIFEST.MF 2> /dev/null || {
              echo "ERROR: Could not extract manifest from JAR: $JAR_FILE" >&2
              exit 1
            }
            if ! grep -q "Main-Class:" META-INF/MANIFEST.MF; then
              echo "ERROR: JAR file missing Main-Class in manifest: $JAR_FILE" >&2
              echo "Manifest contents:" >&2
              cat META-INF/MANIFEST.MF
              rm -rf META-INF
              exit 1
            fi
            rm -rf META-INF
      outputs:
        - source: ${source.dir}/remoting/target/remoting-3345.v03dee9b_f88fc.jar
          target: /usr/share/jenkins/agent.jar
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/jenkins-remoting
          target: /opt/docker/sbom/jenkins-remoting
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: jenkins
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: jenkins
      gid: 1000
      members:
        - jenkins
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/jenkins
environment:
  AGENT_WORKDIR: /home/jenkins/agent
  DEBIAN_FRONTEND: noninteractive
  JAVA_HOME: /opt/java/openjdk/21-jre
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  TZ: Etc/UTC
  USER: jenkins
paths:
  - type: directory
    path: /home/jenkins
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /home/jenkins/agent
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /home/jenkins/.jenkins
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: symlink
    path: /usr/share/jenkins/slave.jar
    uid: 0
    gid: 0
    mode: "0644"
    source: /usr/share/jenkins/agent.jar
annotations:
  org.opencontainers.image.description: A minimal Jenkins Agent image
  org.opencontainers.image.licenses: MIT
cmd:
  - /usr/local/bin/java
  - -jar
  - /usr/share/jenkins/agent.jar
