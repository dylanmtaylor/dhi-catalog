  BASE_TAG: 20250419-debian13
  CEPH_REFERENCE: dhi/ceph:20.3.0-debian13@sha256:0d30b12ebe30b359ef10751111bd472391897a1ecc70e3390294eac41dd97479
  COMMIT_SHA: d7816398d826d358f68b0d62f98b906559d335c4
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  S5CMD_COMMIT_SHA: 991c9fbc16709341b4bac04513232a1445941f63
