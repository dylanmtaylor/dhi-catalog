    - findutils
    - grep
    - iproute2
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: rook
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/rook/rook
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - ca-certificates
          - coreutils
          - findutils
          - git
        files:
          - url: git+https://github.com/rook/rook.git#v1.19.5
            checksum: d7816398d826d358f68b0d62f98b906559d335c4
            path: /go/src/github.com/rook/rook
            spdx:
              name: rook
              version: 1.19.5
              packages:
                - name: rook
                  purl: pkg:golang/github.com/rook/rook@1.19.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies (1.19 only)
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/moby/spdystream@v0.5.1
              - golang.org/x/net@v0.53.0
            download: true
        - name: run targeted go tests
          work-dir: /go/src/github.com/rook/rook
          privileged: true
          environment:
            CGO_ENABLED: "0"
            GOFLAGS: -buildvcs=false
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test ./cmd/rook/...
        - name: build rook
          uses: go/build@v1
          work-dir: /go/src/github.com/rook/rook
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            ldflags:
              - -X github.com/rook/rook/pkg/version.Version=1.19.5
            output: ${target.dir}/usr/local/bin/rook
            packages: ./cmd/rook
        - name: stage rook helper assets
          work-dir: /go/src/github.com/rook/rook
          runs: |
            set -eux -o pipefail

            install -D -m 0755 images/ceph/toolbox.sh "${target.dir}/usr/local/bin/toolbox.sh"
            install -D -m 0755 images/ceph/set-ceph-debug-level "${target.dir}/usr/local/bin/set-ceph-debug-level"

            mkdir -p "${target.dir}/etc/ceph-monitoring"
            cp -a deploy/examples/monitoring/. "${target.dir}/etc/ceph-monitoring/"

            mkdir -p "${target.dir}/etc/rook-external/test-data"
            cp -a deploy/examples/create-external-cluster-resources.* "${target.dir}/etc/rook-external/"
      outputs:
        - source: ${target.dir}/usr/local/bin/rook
          target: /usr/local/bin/rook
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/toolbox.sh
          target: /usr/local/bin/toolbox.sh
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/bin/set-ceph-debug-level
          target: /usr/local/bin/set-ceph-debug-level
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/etc/ceph-monitoring
          target: /etc/ceph-monitoring
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/rook-external
          target: /etc/rook-external
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/rook
          target: /opt/docker/sbom/rook
          uid: 0
          gid: 0
    - name: s5cmd
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/peak/s5cmd
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - ca-certificates
          - git
        files:
          - url: git+https://github.com/peak/s5cmd.git#v2.3.0
            checksum: 991c9fbc16709341b4bac04513232a1445941f63
            path: /go/src/github.com/peak/s5cmd
            spdx:
              name: s5cmd
              version: 2.3.0
              packages:
                - name: s5cmd
                  purl: pkg:golang/github.com/peak/s5cmd/v2@2.3.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build s5cmd
          uses: go/build@v1
          work-dir: /go/src/github.com/peak/s5cmd
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 0
            output: ${target.dir}/usr/local/bin/s5cmd
      outputs:
        - source: ${target.dir}/usr/local/bin/s5cmd
          target: /usr/local/bin/s5cmd
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/s5cmd
          target: /opt/docker/sbom/s5cmd
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
