            ./gradlew shadowJar

            mkdir -p ${target.dir}/usr/local/bin
            cp build/libs/cass-config-builder-*-all.jar ${target.dir}/usr/local/bin/cass-config-builder.jar

            mkdir -p ${target.dir}/definitions
            cp -r ${source.dir}/cass-config-definitions/cass-config-definitions-1b7eaf4e50447fc8168c4a6c16d0ed986941edf8/resources/. ${target.dir}/definitions/
