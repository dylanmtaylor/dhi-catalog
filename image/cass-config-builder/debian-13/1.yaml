            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: patch@v1
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/jackson-cve.patch
        - name: configure gradle maven mirror
          runs: |
            set -eux -o pipefail

            mkdir -p /root/.gradle/init.d
            cat > /root/.gradle/init.d/mirror.gradle << 'EOF'
            def MIRROR = 'https://maven-central.storage-download.googleapis.com/maven2/'

            settingsEvaluated { settings ->
                settings.pluginManagement.repositories.clear()
                settings.pluginManagement.repositories {
                    maven { url MIRROR }
                    gradlePluginPortal()
                }
            }

            allprojects {
                buildscript {
                    repositories {
                        maven { url MIRROR }
                    }
                }
                repositories {
                    maven { url MIRROR }
                }
            }

            gradle.projectsLoaded {
                rootProject.allprojects {
                    buildscript.repositories {
                        maven { url MIRROR }
                    }
                    repositories {
                        maven { url MIRROR }
                    }
                }
            }
            EOF
