          target: /usr/local/bin/cass-config-builder.jar
          uid: 0
          gid: 0
        - source: ${target.dir}/definitions
          target: /definitions
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cass-config-builder
          target: /opt/docker/sbom/cass-config-builder
          uid: 0
          gid: 0
