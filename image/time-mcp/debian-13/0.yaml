name: Time MCP Server 2026.x
image: dhi.io/time-mcp
variant: runtime
tags:
  - "2026"
  - "2026.1"
  - latest
  - 2026.1.26
  - 2026-debian13
  - 2026.1-debian13
  - 2026.1.26-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: a1e5a9a9b186f00462a8a2448ee041728ce052d5
  PYTHON_DEV_REFERENCE: dhi/python:3.14.5-debian13-sfw-dev@sha256:9cc15900a7d5920946117aa5853f4cd3ee1e920595faa3a4637a4adfbd2bc473
  PYTHON_REFERENCE: dhi/python:3.14.5-debian13@sha256:06affe7f9b2dbca52f8ccdaeb2aef7d0e9096f52121d25a9a97d186fdbbd0827
  SEMVER_MAJOR_MINOR_VERSION: "2026.1"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.1.26
  UV_VERSION: 0.11.14
  VERSION: 2026.1.26
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: time-mcp
      uses: dhi.io/python:3.14.5-debian13-sfw-dev@sha256:9cc15900a7d5920946117aa5853f4cd3ee1e920595faa3a4637a4adfbd2bc473
      environment:
        UV_COMPILE_BYTECODE: "1"
      contents:
        packages:
          - gzip
          - tar
        files:
          - url: https://github.com/astral-sh/uv/releases/download/0.11.14/uv-${ARCH}-unknown-linux-gnu.tar.gz
            path: ${source.dir}/uv-unknown-linux-gnu.tar.gz
            uid: 0
            gid: 0
          - url: git+https://github.com/modelcontextprotocol/servers.git#2026.1.26
            checksum: a1e5a9a9b186f00462a8a2448ee041728ce052d5
            path: ${source.dir}/servers
            spdx:
              name: time-mcp
              version: 2026.1.26
              packages:
                - name: time-mcp
                  purl: pkg:dhi/time-mcp@2026.1.26
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: setup uv
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/local/bin
            tar -xzf "${source.dir}/uv-unknown-linux-gnu.tar.gz" -C /usr/local/bin --strip-components=1
            chmod +x /usr/local/bin/uv
        - name: move to /app
          runs: |
            set -eux -o pipefail

            cp -r "${source.dir}/servers/src/time" /app
        - name: build python package
          work-dir: /app
          privileged: true
          runs: |
            set -eux -o pipefail

            rm .python-version

            sfw uv lock --upgrade
            sfw uv sync --locked --no-install-project --no-dev --no-editable
            sfw uv sync --locked --no-dev --no-editable
      outputs:
        - source: /app/.venv
          target: /app/.venv
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/time-mcp
          target: /opt/docker/sbom/time-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.14.5-debian13@sha256:06affe7f9b2dbca52f8ccdaeb2aef7d0e9096f52121d25a9a97d186fdbbd0827
      uid: 0
      gid: 0
accounts:
