# syntax=dhi.io/build:2-debian13

name: Vault 1.x (helm)
image: dhi.io/vault
variant: runtime
flavor: helm
tags:
  - 1-helm
  - 1.21-helm
  - 1.21.4-helm
  - 1-debian13-helm
  - 1.21-debian13-helm
  - 1.21.4-debian13-helm
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-10-21"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
  GO_VERSION: "1"
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.21"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.21.4
  VERSION: 1.21.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] https://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - bash
    - coreutils
    - findutils
    - sed
    - tini
  builds:
    - name: vault
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/hashicorp/vault
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils
          - libcap2-bin
        files:
          - url: git+https://github.com/hashicorp/vault.git#v1.21.4
            checksum: ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
            path: /go/src/github.com/hashicorp/vault
            spdx:
              name: vault
              version: 1.21.4
              packages:
                - name: vault
                  purl: pkg:dhi/vault@1.21.4
                  license: BUSL-1.1
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/apache/thrift@v0.23.0
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/docker/cli@v29.2.0
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/microsoft/kiota-http-go@v1.5.5
              - github.com/opencontainers/runc@v1.2.8
              - github.com/satori/go.uuid@v1.2.1-0.20181016170032-d91630c85102
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/image@v0.5.0
              - google.golang.org/grpc@v1.79.3
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: patch CVE-2026-3605
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/CVE-2026-3605-reject-wildcards-in-acl-templates.patch
        - name: patch CVE-2026-4525
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/CVE-2026-4525-strip-vault-token-authz-passthrough.patch
        - name: patch CVE-2026-5052
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/CVE-2026-5052-reject-unsafe-acme-validation-targets.patch
        - name: bootstrap
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Use lenient FIPS mode during bootstrap because tool downloads
              # require X25519 for TLS connections to proxy.golang.org
              export GODEBUG=fips140=on
            fi

            # Retry bootstrap to handle transient network errors from proxy.golang.org
            for attempt in 1 2 3; do
              if make bootstrap; then
                break
              elif [ "$attempt" -eq 3 ]; then
                echo "Bootstrap failed after 3 attempts" >&2
                exit 1
              else
                echo "Bootstrap attempt $attempt failed, retrying..." >&2
                sleep 5
              fi
            done
        - name: test
          runs: |
            set -eux -o pipefail

            # Vault's broad -short suite still runs Docker, network, cluster,
            # and cloud-heavy tests. Run real unit tests from root-module
            # packages that are stable across the 1.x and 2.x lines, while
            # avoiding root ./vault, external_tests, physical backends,
            # database plugins, command tests, nested module roots, and
            # helper/trace, whose tests conflict with buildkit's active tracer.
            # Within the selected packages, skip only tests that require host
            # syslog, root-sensitive filesystem permissions, or Keybase network
            # access, none of which are feasible in the offline build sandbox.
            unset VAULT_ADDR VAULT_TOKEN VAULT_DEV_ROOT_TOKEN_ID VAULT_ACC || true
            GOMAXPROCS=1 CGO_ENABLED=0 go test -tags=testonly -count=1 -p 1 -parallel=16 -timeout 30m \
              -skip 'Test(AuditBroker_Register_MultipleFails|SyslogBackend_newSyslogBackend|NewSyslogSink|Logger_SetupLoggerWithInValidLogPathPermission|PubKeyFilesFlagSetKeybase|FetchKeybasePubkeys)' \
              ./shamir \
              ./internal/observability/event \
              ./internalshared/... \
              ./vault/diagnose \
              ./builtin/logical/pki/parsing \
              ./helper/dhutil \
              ./helper/fairshare \
              ./helper/flag-kv \
              ./helper/flag-slice \
              ./helper/forwarding \
              ./helper/hostutil \
              ./helper/locking \
              ./helper/logging \
              ./helper/metricsutil \
              ./helper/monitor \
              ./helper/namespace \
              ./helper/osutil \
              ./helper/parseip \
              ./helper/pgpkeys \
              ./helper/policies \
              ./helper/random \
              ./helper/syncmap \
              ./helper/testhelpers \
              ./helper/timeutil \
              ./helper/useragent \
              ./helper/versions

            if [ "${target.fips}" = "true" ]; then
              # Keep the broad suite in strict FIPS mode, but run packages
              # that intentionally exercise legacy crypto paths in lenient
              # mode so FIPS variants still validate the supported paths.
              GODEBUG=fips140=on GOMAXPROCS=1 CGO_ENABLED=0 go test \
                -tags=testonly -count=1 -p 1 -parallel=16 -timeout 30m \
                -skip 'Test(AuditBroker_Register_MultipleFails|SyslogBackend_newSyslogBackend|NewSyslogSink)' \
                ./audit \
                ./builtin/logical/totp \
                ./http \
                ./helper/pkcs7 \
                ./helper/storagepacker

              # This transit subtest expects strict-mode rejections for RSA
              # PSS verification combinations, so skip it in the lenient pass
              # that keeps the package's other unit coverage available.
              GODEBUG=fips140=on GOMAXPROCS=1 CGO_ENABLED=0 go test \
                -tags=testonly -count=1 -p 1 -parallel=16 -timeout 30m \
                -skip 'TestTransit_SignVerify_RSA_PSS' \
                ./builtin/logical/transit
            else
              GOMAXPROCS=1 CGO_ENABLED=0 go test \
                -tags=testonly -count=1 -p 1 -parallel=16 -timeout 30m \
                -skip 'Test(AuditBroker_Register_MultipleFails|SyslogBackend_newSyslogBackend|NewSyslogSink)' \
                ./audit \
                ./builtin/logical/totp \
                ./builtin/logical/transit \
                ./http \
                ./helper/pkcs7 \
                ./helper/storagepacker
            fi
        - name: build
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X github.com/hashicorp/vault/version.fullVersion=1.21.4
              - -X github.com/hashicorp/vault/version.GitCommit=ffe7023c481dc1ea2d8550bbaca8d85f8e611e0b
              - -X github.com/hashicorp/vault/version.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/vault
            tags: vault
        - name: setcap
          runs: |
            set -eux -o pipefail

            # Grants the binary the CAP_IPC_LOCK capability
            # This process requires root access and was being done in the live
            # environment in the upstream image file but does lock us into the
            # production variant
            setcap cap_ipc_lock=+ep '${target.dir}/usr/local/bin/vault'
      paths:
        - type: file
          path: ${source.dir}/patch/CVE-2026-3605-reject-wildcards-in-acl-templates.patch
          uid: 0
          gid: 0
          source: image/vault/patch/CVE-2026-3605-reject-wildcards-in-acl-templates.patch
        - type: file
          path: ${source.dir}/patch/CVE-2026-4525-strip-vault-token-authz-passthrough.patch
          uid: 0
          gid: 0
          source: image/vault/patch/CVE-2026-4525-strip-vault-token-authz-passthrough.patch
        - type: file
          path: ${source.dir}/patch/CVE-2026-5052-reject-unsafe-acme-validation-targets.patch
          uid: 0
          gid: 0
          source: image/vault/patch/CVE-2026-5052-reject-unsafe-acme-validation-targets.patch
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vault
          target: /opt/docker/sbom/vault
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: vault
  users:
    - name: vault
      uid: 1000
      gid: 1000
  groups:
    - name: vault
      gid: 1000
      members:
        - vault
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/vault/bin/docker-entrypoint-helm.sh
  - type: directory
    path: /vault/data
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/config
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/logs
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /vault/file
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Vault image
  org.opencontainers.image.licenses: BUSL-1.1
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - server
  - -config=/vault/config
ports:
  - 8200/tcp
