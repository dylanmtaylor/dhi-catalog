# syntax=dhi.io/build:2-debian13

name: Cilium Envoy 1.18.x (compat)
image: dhi.io/cilium-envoy
variant: runtime
flavor: compat
tags:
  - 1.18-compat
  - 1.18.9-compat
  - 1.18-debian13-compat
  - 1.18.9-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-07-29"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  BAZEL_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  BAZEL_VERSION: 7.7.1
  CILIUM_COMMIT_SHA: c4898256570989a353f65304446e02da9aaa812f
  CILIUM_ENVOY_COMMIT_SHA: 2437d2edeaf4d9b56ef279bd0d71127440c067aa
  CILIUM_ENVOY_VERSION: 1.36.6
  CLANG_VERSION: "18"
  GO_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  PYTHON_REFERENCE: dhi/python:3.12.13-debian13@sha256:c574e5c4254e262e30c952170bf02bcf58ee846fdab31a4b98b34b18e11ae282
  SEMVER_MAJOR_MINOR_VERSION: "1.18"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.18.9
  VERSION: 1.18.9
contents:
  packages:
    - '!base-files'
    - ca-certificates
    - libatomic1
  builds:
    - name: cilium-envoy
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      environment:
        PATH: /opt/bazel/bin:/opt/python/bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      caches:
        - path: /bazel-disk-cache
        - path: /bazel-repo-cache
        - path: /go/pkg/mod
      contents:
        packages:
          - autoconf
          - automake
          - build-essential
          - ca-certificates
          - clang
          - clang-18
          - clang-format-18
          - clang-tidy-18
          - clang-tools-18
          - clangd-18
          - cmake
          - coreutils
          - curl
          - gzip
          - libatomic1
          - libc++-18-dev
          - libc++abi-18-dev
          - libtool
          - lld-18
          - lldb-18
          - llvm-18-dev
          - ninja-build
          - patch
          - patchelf
        files:
          - url: git+https://github.com/cilium/proxy.git#2437d2edeaf4d9b56ef279bd0d71127440c067aa
            path: /go/src/github.com/cilium/proxy
            spdx:
              name: cilium-envoy
              version: 1.36.6
              packages:
                - name: proxy
                  purl: pkg:golang/github.com/cilium/proxy@2437d2edeaf4d9b56ef279bd0d71127440c067aa
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}
            checksum: https://github.com/bazelbuild/bazel/releases/download/7.7.1/bazel-7.7.1-linux-${BAZEL_ARCH}.sha256
            path: /opt/bazel/bin/bazel
            uid: 0
            gid: 0
            mode: "0755"
        artifacts:
          - name: dhi.io/python:3.12.13-debian13@sha256:c574e5c4254e262e30c952170bf02bcf58ee846fdab31a4b98b34b18e11ae282
            includes:
              - opt/**
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/cilium/proxy
          caches:
            - path: /go/pkg/mod
          with:
            deps: []
            download: true
        - name: setup
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            echo 2437d2edeaf4d9b56ef279bd0d71127440c067aa > SOURCE_VERSION

            # Match upstream's builder image for cilium/proxy@2437d2e:
            # unversioned LLVM tool names resolve to clang/llvm 18.
            ln -sf "$(command -v clang-18)" /usr/bin/clang
            ln -sf "$(command -v clang++-18)" /usr/bin/clang++
            ln -sf "$(command -v clang-cpp-18)" /usr/bin/clang-cpp
            ln -sf "$(command -v lld-18)" /usr/bin/lld
            ln -sf "$(command -v ld.lld-18)" /usr/bin/ld.lld
            ln -sf "$(command -v lldb-18)" /usr/bin/lldb
            ln -sf "$(command -v clang-format-18)" /usr/bin/clang-format
            ln -sf "$(command -v clang-tidy-18)" /usr/bin/clang-tidy
            ln -sf "$(command -v run-clang-tidy-18)" /usr/bin/run-clang-tidy
            ln -sf "$(command -v llvm-ar-18)" /usr/bin/ar
            ln -sf "$(command -v llvm-ar-18)" /usr/bin/llvm-ar
            ln -sf "$(command -v llvm-ranlib-18)" /usr/bin/ranlib
            ln -sf "$(command -v llvm-ranlib-18)" /usr/bin/llvm-ranlib
            ln -sf "$(command -v llvm-nm-18)" /usr/bin/llvm-nm
            ln -sf "$(command -v llvm-strip-18)" /usr/bin/llvm-strip
            ln -sf "$(command -v llvm-objcopy-18)" /usr/bin/llvm-objcopy
            ln -sf "$(command -v llvm-objdump-18)" /usr/bin/llvm-objdump
            ln -sf "$(command -v llvm-dwp-18)" /usr/bin/llvm-dwp
            ln -sf "$(command -v llvm-cov-18)" /usr/bin/llvm-cov
            ln -sf "$(command -v llvm-config-18)" /usr/bin/llvm-config
        - name: build-proxylib
          work-dir: /go/src/github.com/cilium/proxy/proxylib
          privileged: true
          runs: |
            set -eux -o pipefail

            make test all

            # Copy instead of moving so that tests find the artifact.
            install -D libcilium.so ${target.dir}/usr/lib/libcilium.so
        - name: build-proxy
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            BAZEL_BUILD_OPTS=(
              --curses=no
              --keep_going=false
              --verbose_failures
              --sandbox_debug
              --jobs=auto
              --disk_cache=/bazel-disk-cache
              --repository_cache=/bazel-repo-cache
              --experimental_guard_against_concurrent_changes
              --experimental_disk_cache_gc_max_size=5G
              --experimental_disk_cache_gc_max_age=30d
            )

            # # Configure FIPS BoringSSL if requested.
            # if [ "${target.fips}" = "true" ]; then
            #   BAZEL_BUILD_OPTS+=(--define=boringssl=fips)
            #   # FIPS build triggers bazelrc configs that restrict PATH; symlink python to /usr/bin
            #   ln -sf /opt/python/bin/python3 /usr/bin/python3
            # fi

            BAZEL_OPTS=--batch BAZELRC_FILE="${PWD}/clang.bazelrc" DESTDIR=${target.dir}/ \
              BAZEL_BUILD_OPTS="${BAZEL_BUILD_OPTS[@]}" PKG_BUILD=1 V=1 make install
        - name: envoy bazel sbom
          work-dir: /go/src/github.com/cilium/proxy
          runs: |
            set -eux -o pipefail

            mkdir -p /opt/docker/sbom/envoy
            python ${source.dir}/bin/envoy-bazel-to-spdx.py cilium-envoy 1.36.6 > /opt/docker/sbom/envoy/.spdx.envoy.json
        - name: test-proxy
          work-dir: /go/src/github.com/cilium/proxy
          privileged: true
          runs: |
            set -eux -o pipefail

            BAZEL_BUILD_OPTS=(
              --curses=no
              --keep_going=false
              --verbose_failures
              --sandbox_debug
              --jobs=auto
              --disk_cache=/bazel-disk-cache
              --repository_cache=/bazel-repo-cache
              --experimental_guard_against_concurrent_changes
              --experimental_disk_cache_gc_max_size=5G
              --experimental_disk_cache_gc_max_age=30d
            )

            # Tier A (unit) + tier B (tcp integration): see envoy-tests-tier-ab.mk
            BAZEL_OPTS=--batch BAZEL_BUILD_OPTS="${BAZEL_BUILD_OPTS[@]}" PKG_BUILD=1 V=1 \
              make -f Makefile -f "${source.dir}/debian-13/envoy-tests-tier-ab.mk" envoy-tests-ci
      paths:
        - type: file
          path: ${source.dir}/debian-13/envoy-tests-tier-ab.mk
          uid: 0
          gid: 0
          source: image/cilium-envoy/debian-13/envoy-tests-tier-ab.mk
        - type: file
          path: ${source.dir}/bin/envoy-bazel-to-spdx.py
          uid: 0
          gid: 0
          source: image/cilium-envoy/bin/envoy-bazel-to-spdx.py
      outputs:
        - source: ${target.dir}/usr/bin/cilium-envoy
          target: /usr/bin/cilium-envoy
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/bin/cilium-envoy-starter
          target: /usr/bin/cilium-envoy-starter
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/lib/libcilium.so
          target: /usr/lib/libcilium.so
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cilium-envoy
          target: /opt/docker/sbom/cilium-envoy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/envoy
          target: /opt/docker/sbom/envoy
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Cilium Envoy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/bin/cilium-envoy
