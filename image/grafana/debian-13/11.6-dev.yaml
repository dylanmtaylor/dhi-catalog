  builds:
    - name: grafana
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - sed
          - grep
          - make
          - build-essential
          - python3-setuptools
          - grep
          - gcc
          - jq
        files:
          - url: git+https://github.com/grafana/grafana.git#v11.6.14
            checksum: 4da40799451631e6c8591c841282447cdf55be3d
            path: /go/src/github.com/grafana/grafana
            spdx:
              name: grafana
              version: 11.6.14
              packages:
                - name: grafana
                  purl: pkg:dhi/grafana@11.6.14
                  license: AGPL-3.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.3-debian13-dev@sha256:e224484cc663eace659e7cd0d043769ee83ef14c2e7916fc9d32987e9df5b208
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
          - name: dhi.io/python:3.13.13-debian13-dev@sha256:19e0e6b0a08de7e47295401cb9273d2020f724bb7de6b67ba16576a44b2fa3b0
            includes:
              - opt/**
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update version
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            # The tagged source contains an old version in package.json
            sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"11.6.14\"/g" package.json
        - name: update node-gyp
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            # Update node-gyp version to be compatible with Python >=3.12
            jq '.resolutions += { "node-gyp" : "^10.0.0" }' package.json > package.new.json
            rm package.json
            mv package.new.json package.json

            # Update lockfile with updated versions
            yarn install
        - name: build ui
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            export NODE_OPTIONS=--max_old_space_size=8000
            yarn install --immutable

            export NODE_ENV=production
            yarn build

            mkdir -p "${target.dir}/usr/share/grafana/public/"
            cp -r public/* "${target.dir}/usr/share/grafana/public/"
        - name: update go dependencies 11.6
          uses: go/bump@v2
          work-dir: /go/src/github.com/grafana/grafana
          with:
            deps:
              - github.com/buger/jsonparser@v1.1.2
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
              - github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
              - github.com/cloudflare/circl@v1.6.3
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/go-viper/mapstructure/v2@v2.4.0
              - github.com/golang-jwt/jwt/v4@v4.5.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/moby/spdystream@v0.5.1
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/apache/thrift@v0.23.0
            replaces:
              - github.com/getkin/kin-openapi=github.com/getkin/kin-openapi@v0.131.0
            work-replaces:
              - github.com/getkin/kin-openapi=github.com/getkin/kin-openapi@v0.131.0
        - name: compile
          work-dir: /go/src/github.com/grafana/grafana
          privileged: true
          runs: |
            set -eux -o pipefail

            make build-go
        - name: install
          work-dir: /go/src/github.com/grafana/grafana
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/grafana/bin/"
            # Grafana may emit binaries under bin/linux/<arch>/ (nested) or bin/*/ (one level); a
            # single * does not match bin/linux/arm64/grafana*, so collect by name.
            find ./bin -type f -name 'grafana*' -exec cp {} "${target.dir}/usr/share/grafana/bin/" \;

            mkdir -p "${target.dir}/etc/grafana/"
            cp conf/sample.ini "${target.dir}/etc/grafana/grafana.ini"
            cp conf/ldap.toml "${target.dir}/etc/grafana/ldap.toml"

            mkdir -p "${target.dir}/usr/share/grafana/conf/"
            cp -r conf/* "${target.dir}/usr/share/grafana/conf/"
      outputs:
        - source: ${target.dir}/usr/share/grafana/public
          target: /usr/share/grafana/public
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/bin
          target: /usr/share/grafana/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/grafana
          target: /etc/grafana
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/grafana/conf
          target: /usr/share/grafana/conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/grafana
          target: /opt/docker/sbom/grafana
          uid: 0
          gid: 0
