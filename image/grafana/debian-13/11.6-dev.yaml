  NODE_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:e224484cc663eace659e7cd0d043769ee83ef14c2e7916fc9d32987e9df5b208
  NODE_VERSION: 22.22.3
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:19e0e6b0a08de7e47295401cb9273d2020f724bb7de6b67ba16576a44b2fa3b0
