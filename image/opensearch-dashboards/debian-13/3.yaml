    - name: opensearch-dashboards files from upstream
      contents:
        packages:
          - bash
          - coreutils
          - findutils
        files:
          - url: git+https://github.com/opensearch-project/opensearch-build.git#3.6.0
            checksum: 18761b2bc0e7c224ff402da1380a5c6e56330f0f
            path: ${source.dir}/opensearch-build-18761b2bc0e7c224ff402da1380a5c6e56330f0f
            uid: 0
            gid: 0
      pipeline:
        - name: copy config and entrypoint files
          runs: |
            set -eux -o pipefail

            cp "${source.dir}/opensearch-build-18761b2bc0e7c224ff402da1380a5c6e56330f0f/docker/release/config/opensearch-dashboards/opensearch-dashboards-docker-entrypoint-3.x.sh" "${target.dir}/docker-entrypoint.sh"
            # /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
            cp "${source.dir}/opensearch-build-18761b2bc0e7c224ff402da1380a5c6e56330f0f/config/opensearch_dashboards-3.x.yml" "${target.dir}/opensearch_dashboards.yml"
        - name: customize config
          runs: |
            set -eux -o pipefail

            # This is what upstream does in their docker images so it is important to do this here
            echo "Setting default network host in opensearch-dashboards config..."
