name: Gatekeeper 3.22.x
image: dhi.io/gatekeeper
variant: runtime
tags:
  - "3"
  - "3.22"
  - 3.22.2
  - 3-debian13
  - 3.22-debian13
  - 3.22.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-09"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: eda110bdaf2510288dccd73a1be4dd0c6442a4aa
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "3.22"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.22.2
  VERSION: 3.22.2
contents:
  packages:
    - '!base-files'
  builds:
    - name: gatekeeper
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/open-policy-agent/gatekeeper
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/open-policy-agent/gatekeeper.git#v3.22.2
            checksum: eda110bdaf2510288dccd73a1be4dd0c6442a4aa
            path: /go/src/github.com/open-policy-agent/gatekeeper
            spdx:
              name: gatekeeper
              version: 3.22.2
              packages:
                - name: gatekeeper
                  purl: pkg:golang/github.com/open-policy-agent/gatekeeper/v3@3.22.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (3.22 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.53.0
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # FIPS Go toolchain enforces fips140=only at compile time, but
              # gatekeeper's client-go pulls X25519 which strict FIPS rejects.
              export GODEBUG=fips140=on
            fi

            # Scope: pure-Go packages that don't require envtest binaries
            # (etcd/kube-apiserver). Covers the manager's mutation/target/
            # webhook surface plus pkg/metrics (which exercises the otel/sdk
            # and otlpmetric CVE bumps applied above) and cmd/gator/... as a
            # smoke check that the shared module still compiles end-to-end.
            go test -short -count=1 \
              ./apis/... \
              ./cmd/gator/... \
              ./pkg/mutation/... \
              ./pkg/target/... \
              ./pkg/webhook/... \
              ./pkg/metrics/...
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/open-policy-agent/gatekeeper/v3/pkg/version.Version=v3.22.2
            output: ${target.dir}/usr/local/bin/gatekeeper
      outputs:
        - source: ${target.dir}/usr/local/bin/gatekeeper
          target: /usr/local/bin/gatekeeper
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gatekeeper
          target: /opt/docker/sbom/gatekeeper
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
