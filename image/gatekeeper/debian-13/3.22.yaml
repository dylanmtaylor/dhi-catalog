    path: /manager
    uid: 0
    gid: 0
    source: /usr/local/bin/gatekeeper
annotations:
  org.opencontainers.image.description: A minimal Gatekeeper image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
