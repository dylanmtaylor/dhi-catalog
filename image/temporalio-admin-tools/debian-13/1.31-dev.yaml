    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
  builds:
    - name: build apps
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/go.temporal.io/temporal
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/temporalio/temporal.git#v1.31.0
            checksum: 83881961df2bad7d78d93a2d50778dbc8bd1a2fc
            path: /go/src/go.temporal.io/temporal
            spdx:
              name: temporalio-admin-tools
              version: 1.31.0
              packages:
                - name: temporal-cassandra-tool
                  purl: pkg:golang/go.temporal.io/server/cmd/tools/cassandra@1.31.0
                  license: MIT
                - name: temporal-sql-tool
                  purl: pkg:golang/go.temporal.io/server/cmd/tools/sql@1.31.0
                  license: MIT
                - name: temporal-elasticsearch-tool
                  purl: pkg:golang/go.temporal.io/server/cmd/tools/elasticsearch@1.31.0
                  license: MIT
                - name: tdbg
                  purl: pkg:golang/go.temporal.io/server/cmd/tools/tdbg@1.31.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (1.31 only)
          uses: go/bump@v2
          with:
            deps:
              - github.com/apache/thrift@v0.23.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: build temporal-cassandra-tool
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal-cassandra-tool
            packages: ./cmd/tools/cassandra
        - name: build temporal-sql-tool
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal-sql-tool
            packages: ./cmd/tools/sql
        - name: build temporal-elasticsearch-tool
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/temporal-elasticsearch-tool
            packages: ./cmd/tools/elasticsearch
        - name: build tdbg
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/tdbg
            packages: ./cmd/tools/tdbg
        - name: install schema
          shell: bash
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/etc/temporal"

            # Copy configuration files and scripts
            cp -r schema "${target.dir}/etc/temporal/"
      outputs:
        - source: ${target.dir}/usr/local/bin/temporal-cassandra-tool
          target: /usr/local/bin/temporal-cassandra-tool
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/temporal-sql-tool
          target: /usr/local/bin/temporal-sql-tool
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/temporal-elasticsearch-tool
          target: /usr/local/bin/temporal-elasticsearch-tool
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/tdbg
          target: /usr/local/bin/tdbg
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/temporal/schema
          target: /etc/temporal/schema
          uid: 0
          gid: 0
