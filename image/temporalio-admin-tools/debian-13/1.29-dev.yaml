# syntax=dhi.io/build:2-debian13

name: Temporal Admin Tools 1.29.x (dev)
image: dhi.io/temporalio-admin-tools
variant: dev
tags:
  - 1.29-dev
  - 1.29.6-dev
  - 1.29-debian13-dev
  - 1.29.6-debian13-dev
  - 1.29.6-cli-1.7.0-dev
  - 1.29.6-cli-1.7.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  CLI_VERSION: 1.7.0
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "1.29"
  DEBIAN_EPOCH_MAJOR_VERSION: "1"
  DEBIAN_EPOCH_VERSION: 1.29.6
  DEBIAN_VERSION: "13"
  PYTHON_BUILD_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:a87c4bc7bbf75da7d5bb1816f2bdf7640c17eeb42d3ba84c5201827977da8de4
  SEMVER_MAJOR_MINOR_VERSION: "1.29"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.29.6
  TEMPORALIO_SERVER_DIGEST: sha256:5f031c6a923f510aef28c350b5bba617afcd074bd6aaaf141fc831535e1345ce
  VARIANT_SUFFIX: ""
  VERSION: 1.29.6
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - bash-completion
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - grep
    - jq
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tini
    - tzdata
    - util-linux
  builds:
    - name: add bash completion
      contents:
        packages:
          - bash
          - coreutils
        artifacts:
          - name: dhi.io/temporalio-server:1.29.6-debian13@sha256:5f031c6a923f510aef28c350b5bba617afcd074bd6aaaf141fc831535e1345ce
            includes:
              - usr/local/bin/temporal
            uid: 0
            gid: 0
      pipeline:
        - name: install bash completion
          runs: |
            set -eux -o pipefail

            # [The OS] has a /etc/bash/bashrc that sources all files named /etc/bash/*.sh for
            # interactive shells, so we can add completion logic in /etc/bash/temporal-completion.sh
            # Completion for temporal depends on the bash-completion package.
            mkdir -p "${target.dir}"/etc/bash/
            /usr/local/bin/temporal completion bash > "${target.dir}"/etc/bash/temporal-completion.sh
      outputs:
        - source: ${target.dir}/etc/bash/temporal-completion.sh
          target: /etc/bash/temporal-completion.sh
          uid: 0
          gid: 0
    - name: add cqlsh
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add cqlsh
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/cqlsh'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install cqlsh

            # Make cqlsh executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/cqlsh/bin/cqlsh /usr/local/bin
      outputs:
        - source: /opt/cqlsh
          target: /opt/cqlsh
          uid: 0
          gid: 0
        - source: /usr/local/bin/cqlsh
          target: /usr/local/bin/cqlsh
          uid: 0
          gid: 0
    - name: add yq
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
      contents:
        packages:
          - bash
          - ca-certificates
      pipeline:
        - name: add yq
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='/opt/yq'
            python3 -m venv "$VIRTUAL_ENV"

            # CVE-2024-5569: zipp 1.0.0 → 3.19.1+
            "$VIRTUAL_ENV/bin/python3" -m pip install 'zipp>=3.19.1'

            "$VIRTUAL_ENV/bin/python3" -m pip install yq

            # Make yq executable available in PATH
            mkdir -p /usr/local/bin
            ln -s ../../../opt/yq/bin/yq /usr/local/bin
      outputs:
        - source: /opt/yq
          target: /opt/yq
          uid: 0
          gid: 0
        - source: /usr/local/bin/yq
          target: /usr/local/bin/yq
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/temporalio-server:1.29.6-debian13@sha256:5f031c6a923f510aef28c350b5bba617afcd074bd6aaaf141fc831535e1345ce
      includes:
        - etc/temporal/schema/**
        - usr/local/bin/tdbg
        - usr/local/bin/temporal
        - usr/local/bin/temporal-cassandra-tool
        - usr/local/bin/temporal-sql-tool
      uid: 0
      gid: 0
    - name: dhi.io/python:3.13.13-debian13@sha256:a87c4bc7bbf75da7d5bb1816f2bdf7640c17eeb42d3ba84c5201827977da8de4
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: temporal
      uid: 1000
      gid: 1000
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: temporal
      gid: 1000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /etc/temporal
environment:
  DEBIAN_FRONTEND: noninteractive
  TEMPORAL_HOME: /etc/temporal
paths:
  - type: directory
    path: /etc/temporal/config
    uid: 1000
    gid: 1000
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Temporal Admin Tools image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/bin/tini
  - --
  - sleep
  - infinity
