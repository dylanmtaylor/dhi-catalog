# syntax=dhi.io/build:2-debian13

name: Cassandra Reaper 4.x (dev)
image: dhi.io/cassandra-reaper
variant: dev
tags:
  - 4-dev
  - 4.2-dev
  - 4.2.2-dev
  - 4-debian13-dev
  - 4.2-debian13-dev
  - 4.2.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-26"
vars:
  COMMIT_SHA: 7bd62218e438ad249a92f0449eb8f86ce9d267c0
  JRE_REFERENCE: dhi/eclipse-temurin:11.0.31.11-debian13@sha256:7f4e47d403615dacad522883b0dc72a64e4ef0dd15b784d495b08364deeb2fd5
  JRE_VERSION: 11.0.31.11
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  MAVEN_VERSION: 3.9.16
  NODE_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
  NODE_VERSION: 24.15.0
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.2
  VERSION: 4.2.2
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: cassandra-reaper
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
      work-dir: ${source.dir}/cassandra-reaper
      environment:
        MAVEN_ARGS: --batch-mode --no-transfer-progress
      caches:
        - path: /root/.m2/repository
        - path: /src/cassandra-reaper/src/ui/node_modules
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - git
          - sed
          - tar
        files:
          - url: git+https://github.com/thelastpickle/cassandra-reaper.git#4.2.2
            checksum: 7bd62218e438ad249a92f0449eb8f86ce9d267c0
            path: ${source.dir}/cassandra-reaper
            spdx:
              name: cassandra-reaper
              version: 4.2.2
              packages:
                - name: cassandra-reaper
                  purl: pkg:dhi/cassandra-reaper@4.2.2
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
            includes:
              - opt/**
              - usr/local/bin/**
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: patch maven dependencies
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-dependencies.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/cassandra-reaper
        - name: build ui
          work-dir: ${source.dir}/cassandra-reaper/src/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Reaper's UI is webpack 4 / Babel 6 / Bower 1.8 / React 16,
            # built for Node 10–14. Node 18+ disables MD4 (and other
            # legacy crypto) by default in OpenSSL3, which webpack 4's
            # asset hashing relies on. The legacy-provider escape hatch
            # is the documented workaround for webpack 4 on modern Node.
            export NODE_OPTIONS=--openssl-legacy-provider

            npm install
            # `npm run navbar` runs build-navbar.sh which expands the
            # navbar template (version + git SHA + build date) and
            # writes app/jsx/navbar.jsx. Upstream uses this file as a
            # build-time artifact; without it webpack fails to resolve
            # `jsx/navbar`.
            npm run navbar
            npm run bower
            npm run minimize
        - name: build jar
          work-dir: ${source.dir}/cassandra-reaper
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn package -B -pl src/server -am -DskipTests \
              -Daether.connector.http.retryHandler.count=10 \
              -Daether.connector.http.retryHandler.requestSentEnabled=true \
              -Dmaven.javadoc.skip=true \
              -Dcheckstyle.skip=true \
              -Dspotbugs.skip=true \
              -Dspotless.check.skip=true \
              -Dspotless.apply.skip=true \
              -Dspotless.skip=true \
              -Denforcer.skip=true \
              -Djacoco.skip=true \
              -Drat.skip=true
        - name: prepare for sbom
          work-dir: ${source.dir}/cassandra-reaper/src/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Keep the build cache's full node_modules intact for webpack.
            # The SBOM only needs the production dependency tree.
            sbom_dir="${source.dir}/cassandra-reaper/src/ui-sbom"
            rm -rf "${sbom_dir}"
            mkdir -p "${sbom_dir}"
            cp package.json "${sbom_dir}/"
            if [ -f package-lock.json ]; then
              cp package-lock.json "${sbom_dir}/"
            fi
            npm install --prefix "${sbom_dir}" --omit=dev --ignore-scripts
        - name: sbom ui
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: cassandra-reaper-ui
            source: ${source.dir}/cassandra-reaper/src/ui-sbom/node_modules
        - name: install
          runs: |
            set -eux -o pipefail

            install -D -m 0644 \
              "${source.dir}/cassandra-reaper/src/server/target/cassandra-reaper-4.2.2.jar" \
              "${target.dir}/usr/local/share/cassandra-reaper/cassandra-reaper.jar"

            # Config templates from the upstream source tree
            # (src/packaging/resource/, same files the release tarball
            # ships under resource/). Three patches per template, each
            # followed by an assertion so a future upstream rename or
            # whitespace tweak fails the build instead of silently
            # producing a wrong runtime config:
            #   (a) add empty defaults on four Dropwizard env-var
            #       references (DHI strips empty-string values from
            #       `environment:`, so unset vars are otherwise
            #       rejected at startup);
            #   (b) flip REAPER_AUTH_ENABLED's built-in default from
            #       true to false so the image boots out-of-the-box
            #       (Dropwizard rejects auth-enabled with no users);
            #   (c) inject persistenceStoragePath after `storageType:
            #       memory` (required by 4.x for the in-memory backend).
            for f in cassandra-reaper.yaml \
              cassandra-reaper-memory.yaml \
              cassandra-reaper-cassandra.yaml; do
              dst="${target.dir}/etc/cassandra-reaper/$f"
              install -D -m 0644 \
                "${source.dir}/cassandra-reaper/src/packaging/resource/$f" \
                "$dst"

              # Patches (a) and (b) apply to every template — the auth
              # block is shared across backends.
              sed -E -i \
                -e 's/\$\{(REAPER_AUTH_USER|REAPER_AUTH_PASSWORD|REAPER_READ_USER|REAPER_READ_USER_PASSWORD)\}/${\1:-}/g' \
                -e 's/\$\{REAPER_AUTH_ENABLED:-true\}/\${REAPER_AUTH_ENABLED:-false}/g' \
                "$dst"
              grep -q '${REAPER_AUTH_USER:-}' "$dst" \
                || (
                  echo "FATAL: REAPER_AUTH_USER patch missed in $f" >&2
                  exit 1
                )
              grep -q '${REAPER_AUTH_ENABLED:-false}' "$dst" \
                || (
                  echo "FATAL: REAPER_AUTH_ENABLED default-flip missed in $f" >&2
                  exit 1
                )

              # Patch (c) only applies to memory-backed templates.
              if grep -q '^storageType: memory$' "$dst"; then
                sed -i \
                  '/^storageType: memory$/a persistenceStoragePath: /var/lib/cassandra-reaper/storage' \
                  "$dst"
                grep -q '^persistenceStoragePath: /var/lib/cassandra-reaper/storage$' "$dst" \
                  || (
                    echo "FATAL: persistenceStoragePath inject missed in $f" >&2
                    exit 1
                  )
              fi
            done
      paths:
        - type: file
          path: ${source.dir}/patch/mvn-dependencies.json
          uid: 0
          gid: 0
          source: image/cassandra-reaper/patch/mvn-dependencies.json
      outputs:
        - source: ${target.dir}/usr/local/share/cassandra-reaper/cassandra-reaper.jar
          target: /usr/local/share/cassandra-reaper/cassandra-reaper.jar
          uid: 0
          gid: 0
          mode: "0644"
        - source: ${target.dir}/etc/cassandra-reaper/cassandra-reaper.yaml
          target: /etc/cassandra-reaper/cassandra-reaper.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: ${target.dir}/etc/cassandra-reaper/cassandra-reaper-memory.yaml
          target: /etc/cassandra-reaper/cassandra-reaper-memory.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: ${target.dir}/etc/cassandra-reaper/cassandra-reaper-cassandra.yaml
          target: /etc/cassandra-reaper/cassandra-reaper-cassandra.yaml
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/cassandra-reaper
          target: /opt/docker/sbom/cassandra-reaper
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cassandra-reaper-ui
          target: /opt/docker/sbom/cassandra-reaper-ui
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:11.0.31.11-debian13@sha256:7f4e47d403615dacad522883b0dc72a64e4ef0dd15b784d495b08364deeb2fd5
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
