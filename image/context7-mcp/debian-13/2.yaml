# syntax=dhi.io/build:2-debian13

name: Upstash Context7 MCP 2.x
image: dhi.io/context7-mcp
variant: runtime
tags:
  - "2"
  - "2.2"
  - 2.2.5
  - latest
  - 2-debian13
  - 2.2-debian13
  - 2.2.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 13f3ef03d9956c2a43b3db43d46341f237732ca2
  NODE_BUILD_REFERENCE: dhi/node:24.15.0-debian13-sfw-dev@sha256:0e9ee4eb256ab00171db7131f9d9e3276efe1b137b34ecc85f55486c569e71b4
  NODE_RUNTIME_REFERENCE: dhi/node:24.15.0-debian13@sha256:12dd3a0b044f9601e987ecfd9fa728118375bcb418435d8780e1a95f8fb01317
  SEMVER_MAJOR_MINOR_VERSION: "2.2"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.2.5
  VERSION: 2.2.5
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: context7-mcp
      uses: dhi.io/node:24.15.0-debian13-sfw-dev@sha256:0e9ee4eb256ab00171db7131f9d9e3276efe1b137b34ecc85f55486c569e71b4
      contents:
        packages:
          - yq
        files:
          - url: git+https://github.com/upstash/context7.git#@upstash/context7-mcp@2.2.5
            checksum: 13f3ef03d9956c2a43b3db43d46341f237732ca2
            path: ${source.dir}/context7
            spdx:
              name: context7-mcp
              version: 2.2.5
              packages:
                - name: context7-mcp
                  purl: pkg:dhi/context7-mcp@2.2.5
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update dependencies
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            # Context7 is a pnpm workspace; keep CVE overrides in
            # pnpm-workspace.yaml so pnpm applies them to workspace installs.
            yq -y -i '.overrides."@modelcontextprotocol/sdk" = "1.25.2"' pnpm-workspace.yaml # CVE-2026-25536 (1.26.0 breaks MCP server)
            yq -y -i '.overrides."hono" = "4.12.18"' pnpm-workspace.yaml                     # CVE-2026-39409, CVE-2026-39408, GHSA-26pp-8wgv-hjvm, CVE-2026-39407, CVE-2026-39410, GHSA-458j-xx4x-4375, CVE-2026-44455, CVE-2026-44456, CVE-2026-44457, CVE-2026-44458, CVE-2026-44459
            yq -y -i '.overrides."@hono/node-server" = "1.19.13"' pnpm-workspace.yaml        # CVE-2026-39406
            yq -y -i '.overrides."picomatch" = "4.0.4"' pnpm-workspace.yaml                  # CVE-2026-33671, CVE-2026-33672
            yq -y -i '.overrides."minimatch" = "10.2.3"' pnpm-workspace.yaml                 # CVE-2026-26996, CVE-2026-27903, CVE-2026-27904
            yq -y -i '.overrides."qs" = "6.14.2"' pnpm-workspace.yaml                        # CVE-2025-15284, CVE-2026-2391
            yq -y -i '.overrides."body-parser" = "2.2.1"' pnpm-workspace.yaml                # CVE-2025-13466
            yq -y -i '.overrides."undici" = "6.24.0"' pnpm-workspace.yaml                    # CVE-2026-1526, CVE-2026-1528, CVE-2026-2229
            yq -y -i '.overrides."rollup" = "4.59.0"' pnpm-workspace.yaml                    # CVE-2026-27606
            yq -y -i '.overrides."path-to-regexp" = "8.4.0"' pnpm-workspace.yaml             # CVE-2026-4926, CVE-2026-4923
            yq -y -i '.overrides."vite" = "7.3.2"' pnpm-workspace.yaml                       # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            # pnpm 10+ fails on unapproved dependency build scripts; these
            # dependency rewrites do not need lifecycle hooks to run.
            sfw pnpm update --ignore-scripts
        - name: update dependencies
          work-dir: ${source.dir}/context7/packages/mcp
          privileged: true
          runs: |
            set -eux -o pipefail

            # pnpm 10+ fails on unapproved dependency build scripts; these
            # dependency rewrites do not need lifecycle hooks to run.
            sfw pnpm add hono@4.12.18 --filter @upstash/context7-mcp --save-exact --ignore-scripts
            sfw pnpm update --ignore-scripts
        - name: build
          work-dir: ${source.dir}/context7
          privileged: true
          runs: |
            set -eux -o pipefail

            # Avoid pnpm's unapproved dependency build-script failure; this
            # package builds with tsc and does not require install hooks.
            sfw pnpm install --frozen-lockfile --ignore-scripts
            sfw pnpm --filter @upstash/context7-mcp build
        - name: setup
          work-dir: ${source.dir}/context7
          privileged: true
          environment:
            CI: "true"
          runs: |
            set -eux -o pipefail

            # Replace the build-time dependency tree so dev-only packages do
            # not remain in the final image after the production install.
            rm -rf node_modules

            # Production install only needs resolved packages; skip lifecycle
            # hooks and remove esbuild afterward to keep it out of the SBOM.
            sfw pnpm install --frozen-lockfile --prod --filter @upstash/context7-mcp --ignore-scripts

            # remove all esbuild dependencies
            rm -rf node_modules/.pnpm/*esbuild*
      outputs:
        - source: ${source.dir}/context7/packages/mcp
          target: /app/packages/mcp
          uid: 0
          gid: 0
        - source: ${source.dir}/context7/node_modules
          target: /app/node_modules
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/context7-mcp
          target: /opt/docker/sbom/context7-mcp
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.15.0-debian13@sha256:12dd3a0b044f9601e987ecfd9fa728118375bcb418435d8780e1a95f8fb01317
      uid: 0
      gid: 0
accounts:
  run-as: node
  users:
    - name: node
      uid: 1000
      gid: 1000
  groups:
    - name: node
      gid: 1000
      members:
        - node
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app/packages/mcp
annotations:
  org.opencontainers.image.description: Upstash Context7 MCP Server
  org.opencontainers.image.licenses: MIT
labels:
  io.modelcontextprotocol.server.name: io.upstash/context7-mcp
cmd:
  - node
  - dist/index.js
  - --transport
  - http
  - --port
  - "8080"
ports:
  - 8080/tcp
