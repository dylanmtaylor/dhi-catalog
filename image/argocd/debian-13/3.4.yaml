            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:57c274be45f65db1a54c18f7ec58b5f647a3cbbffcc8b7aa4687e649bea7489b
            includes:
              - opt/nodejs
