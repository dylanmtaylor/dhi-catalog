# syntax=dhi.io/build:2-debian13

name: JRuby 10.x
image: dhi.io/jruby
variant: runtime
tags:
  - "10"
  - "10.1"
  - 10.1.0
  - 10-debian13
  - 10.1-debian13
  - 10.1.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  COMMIT_SHA: 32f988b78c4277177c3cd0a86915ada135e736c1
  JRE_REF: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JRE_VERSION: 21.0.11.10
  MAVEN_REF: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  SEMVER_MAJOR_MINOR_VERSION: "10.1"
  SEMVER_MAJOR_VERSION: "10"
  SEMVER_VERSION: 10.1.0
  VERSION: 10.1.0.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - coreutils
  builds:
    - name: jruby
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
      environment:
        JRE_TRUST_STORE: ${JRE_TRUST_STORE}
      contents:
        packages:
          - gzip
        files:
          - url: git+https://github.com/jruby/jruby.git#10.1.0.0
            checksum: 32f988b78c4277177c3cd0a86915ada135e736c1
            path: ${source.dir}/jruby
            spdx:
              name: jruby
              version: 10.1.0.0
              packages:
                - name: jruby
                  purl: pkg:dhi/jruby@10.1.0.0
                  license: EPL-2.0 and GPL-2.0 and LGPL-2.1
            uid: 0
            gid: 0
      pipeline:
        - name: patch jruby stdlibs
          work-dir: ${source.dir}/jruby/lib
          privileged: true
          runs: |
            set -eux -o pipefail

            # update rexml for CVE-2025-58767
            ${source.dir}/patches/patch.sh rexml 3.4.4

            # update cgi for CVE-2025-27221 and CVE-2025-27220
            ${source.dir}/patches/patch.sh cgi 0.4.2

            # update json for CVE-2026-33210
            ${source.dir}/patches/patch.sh json 2.19.2

            # update uri for CVE-2025-61594
            ${source.dir}/patches/patch.sh uri 1.0.4

            # update uri for CVE-2026-0636 and CVE-2026-5588
            ${source.dir}/patches/patch.sh jruby-openssl 0.16.0

            # update net-imap for CVE-2026-42246, CVE-2026-42258, CVE-2026-42257, CVE-2026-42256, CVE-2026-42245
            # update erb for CVE-2026-41316
            # erb 6.x requires Ruby 3.4+, so JRuby 9.x (Ruby 3.1) takes erb 4.0.3.1
            if [ "10" = "9" ]; then
              ${source.dir}/patches/patch.sh net-imap 0.4.24
              ${source.dir}/patches/patch.sh erb 4.0.3.1
            else
              ${source.dir}/patches/patch.sh net-imap 0.6.4
              ${source.dir}/patches/patch.sh erb 6.0.1.1
            fi
        - name: configure maven mirror
          runs: |
            set -eux -o pipefail

            mkdir -p /root/.m2
            cat > /root/.m2/settings.xml << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
              <mirrors>
                <mirror>
                  <id>google-maven-central</id>
                  <name>GCS Maven Central mirror</name>
                  <url>https://maven-central.storage-download.googleapis.com/maven2/</url>
                  <mirrorOf>central</mirrorOf>
                </mirror>
              </mirrors>
            </settings>
            EOF
        - name: install jruby
          work-dir: ${source.dir}/jruby
          privileged: true
          runs: |
            set -eux -o pipefail

            # Point mvnw bootstrap at GCS mirror; it ignores settings.xml.
            sed -i "s|https://repo.maven.apache.org/maven2|https://maven-central.storage-download.googleapis.com/maven2|g" \
              .mvn/wrapper/maven-wrapper.properties

            # Set platform-specific Maven properties
            if [ "${ARCH}" = "aarch64" ]; then
              export MAVEN_OPTS="-Dos.arch=aarch64 -Dos.name=Linux -Dos.version=arm64"
              export JAVA_OPTS="-Dos.arch=aarch64"
            fi

            ./mvnw
        - name: Add lib and etc
          work-dir: ${source.dir}/jruby
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/jruby/etc/
            echo 'install: --no-document' >> ${target.dir}/opt/jruby/etc/gemrc
            echo 'update: --no-document' >> ${target.dir}/opt/jruby/etc/gemrc

            cp -r lib ${target.dir}/opt/jruby
        - name: add jruby binaries
          work-dir: ${source.dir}/jruby/bin
          runs: |
            set -eux -o pipefail

            install -D -m 755 -t ${target.dir}/opt/jruby/bin jruby* ruby*
      paths:
        - type: file
          path: ${source.dir}/patches/patch.sh
          uid: 0
          gid: 0
          mode: "0777"
          source: image/jruby/patch/patch.sh
      outputs:
        - source: ${target.dir}/opt/jruby
          target: /opt/jruby
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/jruby
          target: /opt/docker/sbom/jruby
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  LD_LIBRARY_PATH: /usr/local/lib:${LD_LIBRARY_PATH}
  PATH: /opt/jruby/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
annotations:
  org.opencontainers.image.description: A minimal JRuby image
  org.opencontainers.image.licenses: EPL-2.0 and GPL-2.0 and LGPL-2.1
cmd:
  - jruby
