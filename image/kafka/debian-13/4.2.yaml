# syntax=dhi.io/build:2-debian13

name: Apache Kafka 4.2.x
image: dhi.io/kafka
variant: runtime
tags:
  - "4"
  - "4.2"
  - 4.2.0
  - 4-debian13
  - 4.2-debian13
  - 4.2.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-02-17"
vars:
  COMMIT_SHA: a18251bae0b825c69794a50dffd4c3100cf5ca5b
  GRADLE_REFERENCE: dhi/gradle:9.5.1-jdk21-debian13-dev@sha256:66fd991087db07a4ff195ad3e1cab9fd7d90c87b76d625d834c3d384f2ff1b74
  GRADLE_VERSION: 9.5.1
  JAVA_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JAVA_VERSION: 21.0.11.10
  KAFKA_MAJOR_MINOR_VERSION: ${KAFKA_VERSION:([0-9]+.[0-9]+).*$}
  KAFKA_MAJOR_VERSION: ${KAFKA_VERSION:([0-9]+).*$}
  SCALA_VERSION: "2.13"
  SEMVER_MAJOR_MINOR_VERSION: "4.2"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.2.0
  VERSION: 4.2.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - grep
    - netbase
    - sed
    - tzdata
  builds:
    - name: kafka
      uses: dhi.io/gradle:9.5.1-jdk21-debian13-dev@sha256:66fd991087db07a4ff195ad3e1cab9fd7d90c87b76d625d834c3d384f2ff1b74
      contents:
        packages:
          - gzip
          - patch
          - sed
          - tar
        files:
          - url: git+https://github.com/apache/kafka.git#4.2.0
            checksum: a18251bae0b825c69794a50dffd4c3100cf5ca5b
            path: ${source.dir}/kafka
            spdx:
              name: kafka
              version: 4.2.0
              packages:
                - name: kafka
                  purl: pkg:github/apache/kafka@4.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: apply log4j cve patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/log4j-cve-4.2.patch
        - name: apply jackson-core cve patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/jackson-core-cve-4.2.patch
        - name: apply jetty cve patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/jetty-cve-4.2.patch
        - name: apply gradle 9.5 projectdependency compatibility patch
          uses: git/patch@v1
          work-dir: ${source.dir}/kafka
          with:
            patch: ${source.dir}/patch/gradle-9.5-projectdependency-4.2.patch
        - name: build kafka distribution
          work-dir: ${source.dir}/kafka
          privileged: true
          runs: |
            set -eux -o pipefail

            gradle clean releaseTarGz \
              -PscalaVersion=2.13 \
              --no-daemon \
              --console=plain \
              --warning-mode=summary
        - name: extract distribution
          work-dir: ${source.dir}/kafka
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/opt/kafka

            tar -xzf "core/build/distributions/kafka_2.13-4.2.0.tgz" \
              --strip-components=1 \
              -C ${target.dir}/opt/kafka
        - name: configure
          work-dir: ${source.dir}/kafka
          runs: |
            set -eux -o pipefail

            cp docker/server.properties \
              ${target.dir}/opt/kafka/config/server.properties

            sed -i \
              -e 's|^advertised\.listeners=PLAINTEXT://localhost:9092|advertised.listeners=PLAINTEXT://:9092|' \
              ${target.dir}/opt/kafka/config/server.properties

            chown -Rh 65532:65532 ${target.dir}/opt/kafka/config
            chmod -R 755 ${target.dir}/opt/kafka/config
      paths:
        - type: file
          path: ${source.dir}/patch/fips-sha256-log-cleaner.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/fips-sha256-log-cleaner.patch
        - type: file
          path: ${source.dir}/patch/log4j-cve-4.2.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/log4j-cve-4.2.patch
        - type: file
          path: ${source.dir}/patch/jackson-core-cve-4.2.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/jackson-core-cve-4.2.patch
        - type: file
          path: ${source.dir}/patch/jetty-cve-4.2.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/jetty-cve-4.2.patch
        - type: file
          path: ${source.dir}/patch/gradle-9.5-projectdependency-4.2.patch
          uid: 0
          gid: 0
          source: image/kafka/patch/gradle-9.5-projectdependency-4.2.patch
      outputs:
        - source: ${target.dir}/opt/kafka
          target: /opt/kafka
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kafka
          target: /opt/docker/sbom/kafka
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
      uid: 0
      gid: 0
accounts:
  run-as: kafka
  users:
    - name: kafka
      uid: 65532
      gid: 65532
  groups:
    - name: kafka
      gid: 65532
      members:
        - kafka
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /opt/kafka
environment:
  KAFKA_LOG4J_OPTS: -Dkafka.logs.dir=/opt/kafka/logs/ -Dlog4j2.configurationFile=file:/opt/kafka/config/log4j2.yaml
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
paths:
  - type: directory
    path: /opt/kafka/logs
    uid: 65532
    gid: 65532
    mode: "0775"
  - type: directory
    path: /tmp/kraft-combined-logs
    uid: 65532
    gid: 65532
    mode: "0775"
  - type: directory
    path: /usr/local/bin
    uid: 0
    gid: 0
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/kafka/bin/docker-entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal Kafka image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
ports:
  - 9092/tcp
