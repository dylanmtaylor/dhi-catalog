            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test $(go list ./... | grep -v -e ./test/cmd/metrics-plugin-sample -e github.com/argoproj/argo-rollouts/rollout$)
