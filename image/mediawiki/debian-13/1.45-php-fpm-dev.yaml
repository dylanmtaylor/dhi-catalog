# syntax=dhi.io/build:2-debian13

name: MediaWiki 1.45 (php-fpm, dev)
image: dhi.io/mediawiki
variant: dev
flavor: php-fpm
tags:
  - 1-php-fpm-dev
  - 1.45-php-fpm-dev
  - 1.45.3-php-fpm-dev
  - 1-debian13-php-fpm-dev
  - 1.45-debian13-php-fpm-dev
  - 1.45.3-debian13-php-fpm-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-12-04"
vars:
  COMPOSER_PHAR_SHA256: c86ce603fe836bf0861a38c93ac566c8f1e69ac44b2445d9b7a6a17ea2e9972a
  COMPOSER_VERSION: 2.9.5
  EXPAT_REFERENCE: dhi/pkg-expat:2.8.1-debian13@sha256:25fdf661242f7dedae95752d9fb13c8d10481d23471903e8769b83aaa358f6f0
  IMAGEMAGICK_COMMIT_SHA: ccf56fb3edd41389a02e4fe7a1a11a18f2b13389
  IMAGEMAGICK_VERSION: 7.1.2-22
  PHP_DEV_REFERENCE: dhi/php:8.3.31-debian13-dev@sha256:9a062f4ba59afc40c229be5b62a9f775f1f23194bb25bba1acb7058585ae4363
  PHP_INI_DIR: /opt/php-8.3/etc/php
  PHP_MAJOR_MINOR_VERSION: "8.3"
  PHP_PREFIX: /opt/php-8.3
  PHP_REFERENCE: dhi/php:8.3.31-debian13-fpm@sha256:c901698a3f215a3caa35fdf2c80ddf8ad41bc61c20d87e4f7c2e6ef7426ff47a
  PHP_VERSION: 8.3.31
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
  SEMVER_MAJOR_MINOR_VERSION: "1.45"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.45.3
  VERSION: 1.45.3
contents:
  packages:
    - '!gawk'
    - '!imagemagick'
    - '!libelogind0'
    - '!libexpat1'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - fontconfig-config
    - git
    - grep
    - libargon2-1
    - libc-bin
    - libcurl4t64
    - libfontconfig1
    - libicu76
    - liblcms2-2
    - libltdl7
    - liblua5.1-0
    - libonig5
    - libpcre2-8-0
    - libreadline8t64
    - libsodium23
    - libsqlite3-0
    - libssl3t64
    - libtiff6
    - libwebp7
    - libxml2
    - mawk
    - perl-base
    - sed
    - util-linux
    - zlib1g
  builds:
    - name: mediawiki
      uses: dhi.io/php:8.3.31-debian13-dev@sha256:9a062f4ba59afc40c229be5b62a9f775f1f23194bb25bba1acb7058585ae4363
      contents:
        packages:
          - ca-certificates
          - coreutils
          - curl
          - liblua5.1-0-dev
          - libpcre2-dev
          - tar
          - unzip
        files:
          - url: https://releases.wikimedia.org/mediawiki/1.45/mediawiki-1.45.3.tar.gz
            path: ${source.dir}/mediawiki.tar.gz
            spdx:
              name: mediawiki
              version: 1.45.3
              packages:
                - name: mediawiki
                  purl: pkg:composer/mediawiki/core@1.45.3
                  license: GPL-2.0-or-later
            uid: 0
            gid: 0
          - url: https://releases.wikimedia.org/mediawiki/1.45/mediawiki-1.45.3.tar.gz.sig
            path: ${source.dir}/mediawiki.tar.gz.sig
            uid: 0
            gid: 0
          - url: https://github.com/composer/composer/releases/download/2.9.5/composer.phar
            path: ${source.dir}/composer.phar
            uid: 0
            gid: 0
      pipeline:
        - name: verify server GPG
          uses: gpg/verify@v1
          with:
            file: ${source.dir}/mediawiki.tar.gz
            keys: ${source.dir}/keys.txt
            signature: ${source.dir}/mediawiki.tar.gz.sig
        - name: verify composer phar checksum
          privileged: true
          runs: |
            set -eux -o pipefail

            # Composer publishes a detached .asc signature, but we cannot verify it with gpg/verify@v1 because the
            # public keys documented on https://composer.github.io/pubkeys.html are PEM/SPKI keys, not OpenPGP keys.
            # Also explored Sigstore/GitHub attestations via cosign, but verification requires Rekor/tlog inclusion
            # which is not reliably available in this build environment. To keep the build deterministic, we pin
            # Composer to 2.9.5 and verify composer.phar by SHA-256 (COMPOSER_PHAR_SHA256).
            # COMPOSER_PHAR_SHA256 is validated out-of-band by comparing the sha256 of the GitHub release asset
            # and the https://getcomposer.org/download/2.9.5/composer.phar download.
            echo "c86ce603fe836bf0861a38c93ac566c8f1e69ac44b2445d9b7a6a17ea2e9972a  ${source.dir}/composer.phar" | sha256sum -c -
        - name: extract source
          work-dir: ${source.dir}/mediawiki
          runs: |
            set -eux -o pipefail

            tar -x --strip-components=1 -f '${source.dir}/mediawiki.tar.gz'
        - name: install php extensions with pecl
          privileged: true
          runs: |
            set -eux -o pipefail

            pecl install APCu
            echo "extension=apcu.so" > /opt/php-8.3/etc/php/conf.d/apcu.ini

            pecl install LuaSandbox
            echo "extension=luasandbox.so" > /opt/php-8.3/etc/php/conf.d/luasandbox.ini
        - name: add calendar php extension
          work-dir: /opt/php-8.3/src/ext/calendar
          privileged: true
          runs: |
            set -eux -o pipefail

            phpize
            ./configure --with-php-config=/opt/php-8.3/bin/php-config
            make -j "$(nproc)"
            make install

            echo "extension=calendar.so" > /opt/php-8.3/etc/php/conf.d/calendar.ini
        - name: add mysqli php extension
          work-dir: /opt/php-8.3/src/ext/mysqli
          privileged: true
          runs: |
            set -eux -o pipefail

            phpize
            ./configure --with-php-config=/opt/php-8.3/bin/php-config
            make -j "$(nproc)"
            make install

            echo "extension=mysqli.so" > /opt/php-8.3/etc/php/conf.d/mysqli.ini
        - name: configure opcache
          runs: |
            set -eux -o pipefail

            cat << 'EOF' >> /opt/php-8.3/etc/php/conf.d/opcache-recommended.ini
            opcache.memory_consumption=128
            opcache.interned_strings_buffer=8
            opcache.max_accelerated_files=4000
            opcache.revalidate_freq=60
            EOF
        - name: bump firebase/php-jwt
          work-dir: ${source.dir}/mediawiki
          privileged: true
          runs: |
            set -eux -o pipefail

            # prevent dev-tool advisories from breaking the build
            php ${source.dir}/composer.phar config audit.block-insecure false

            # Bump to fixed major for CVE-2025-45769
            php ${source.dir}/composer.phar require --no-interaction --no-ansi --no-progress --no-update firebase/php-jwt:^7.0

            # Ensure vendor tree is updated (omit dev deps)
            php ${source.dir}/composer.phar install --no-interaction --no-ansi --no-progress --no-dev --prefer-dist
      paths:
        - type: file
          path: ${source.dir}/keys.txt
          uid: 0
          gid: 0
          source: image/mediawiki/key/keys.txt
      outputs:
        - source: /opt/php-8.3
          target: /opt/php-8.3
          uid: 0
          gid: 0
          diff: true
        - source: ${source.dir}/mediawiki
          target: /var/www/html
          uid: 0
          gid: 0
          diff: true
        - source: /opt/docker/sbom/mediawiki
          target: /opt/docker/sbom/mediawiki
          uid: 0
          gid: 0
    - name: imagemagick
      contents:
        packages:
          - autoconf
          - bash
          - build-essential
          - coreutils
          - grep
          - fontconfig-config
          - libfontconfig1-dev
          - libfreetype-dev
          - libjpeg62-turbo-dev
          - liblcms2-dev
          - liblqr-1-0-dev
          - libltdl-dev
          - liblzma-dev
          - libonig-dev
          - libopenexr-dev
          - libopenjp2-7-dev
          - libpango1.0-dev
          - libpcre2-dev
          - libperl-dev
          - libpng-dev
          - libraw-dev
          - librsvg2-bin
          - librsvg2-dev
          - libtiff-dev
          - libtool
          - libwebp-dev
          - libwmf-dev
          - libx11-dev
          - libxext-dev
          - libxml2-dev
          - libxml2-utils
          - libxt-dev
          - libzip-dev
          - libicu-dev
          - libonig-dev
          - make
          - pkg-config
          - sed
          - xsltproc
          - zlib1g-dev
        files:
          - url: git+https://github.com/ImageMagick/ImageMagick#7.1.2-22
            checksum: ccf56fb3edd41389a02e4fe7a1a11a18f2b13389
            path: ${source.dir}/imagemagick
            spdx:
              name: imagemagick
              version: 7.1.2-22
              packages:
                - name: imagemagick
                  purl: pkg:dhi/imagemagick/imagemagick@7.1.2-22
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: build
          work-dir: ${source.dir}/imagemagick
          environment:
            CC: gcc
            CFLAGS: -Wno-deprecated-declarations -Wdeclaration-after-statement -Wno-error=unused-variable
            CXX: g++
          runs: |
            set -eux -o pipefail

            ./configure \
              --prefix=/usr/local \
              --enable-reproducible-build \
              --disable-static \
              --enable-shared \
              --with-modules \
              --with-quantum-depth=16 \
              --without-magick-plus-plus \
              --without-perl \
              --disable-docs \
              --disable-opencl

            make -j$(nproc)
            make install DESTDIR=${target.dir}
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/etc
          target: /usr/local/etc
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/include
          target: /usr/local/include
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/lib
          target: /usr/local/lib
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/share
          target: /usr/local/share
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/imagemagick
          target: /opt/docker/sbom/imagemagick
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/php:8.3.31-debian13-fpm@sha256:c901698a3f215a3caa35fdf2c80ddf8ad41bc61c20d87e4f7c2e6ef7426ff47a
      includes:
        - opt/**
        - var/www/html/**
      uid: 0
      gid: 0
    - name: dhi.io/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
      includes:
        - opt/**
      uid: 0
      gid: 0
    - name: dhi.io/pkg-expat:2.8.1-debian13@sha256:25fdf661242f7dedae95752d9fb13c8d10481d23471903e8769b83aaa358f6f0
      includes:
        - usr/**
        - var/lib/dpkg/status.d
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
