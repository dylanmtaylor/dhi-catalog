  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 9c803860cc63cd650471155a2e1e35c05b2c2346
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  PYTHON_BUILD_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
  SEMVER_MAJOR_MINOR_VERSION: "2.19"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.19.0
  VERSION: 2.19.0
contents:
  packages:
    - '!base-files'
  builds:
    - name: azure-service-operator
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - gettext-base
          - hostname
        files:
          - url: git+https://github.com/Azure/azure-service-operator.git#v2.19.0
            checksum: 9c803860cc63cd650471155a2e1e35c05b2c2346
            path: /go/src/github.com/Azure/azure-service-operator
            spdx:
              name: azure-service-operator
              version: 2.19.0
              packages:
                - name: azure-service-operator
                  purl: pkg:golang/github.com/Azure/azure-service-operator/v2@2.19.0
                  license: MIT
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: install setup utilities
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build tools installed upstream via .devcontainer/install-dependencies.sh
            # https://github.com/Azure/azure-service-operator/blob/079194d1c4882362369e2e337249f914a8370400/.devcontainer/install-dependencies.sh
            go install github.com/go-task/task/v3/cmd/task@latest
            go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.17.3
            go install mvdan.cc/gofumpt@latest
            CGO_ENABLED=0 go install sigs.k8s.io/kustomize/kustomize/v4@v4.5.7
        - name: generate CRDs
          work-dir: /go/src/github.com/Azure/azure-service-operator
          privileged: true
          runs: |
            set -eux -o pipefail

            # Patch to use the built-in venv module.
            sed -i 's/-m virtualenv/-m venv/' Taskfile.yml

            task controller:bundle-crds
            cp -a ./v2/out/crds '${target.dir}/crds'
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/Azure/azure-service-operator/v2
          with:
            deps:
              - github.com/jackc/pgx/v5@v5.9.2
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - google.golang.org/grpc@v1.79.3
            download: true
            tidy: true
        - name: test
          work-dir: /go/src/github.com/Azure/azure-service-operator
          privileged: true
          runs: |
            set -eux -o pipefail

            cd v2/tools/generator/
            go mod tidy

            cd -
            task controller:test
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/Azure/azure-service-operator/v2
          with:
            ldflags:
              - -X github.com/Azure/azure-service-operator/v2/internal/version.BuildVersion=2.19.0
            output: ${target.dir}/usr/local/bin/aso-controller
            packages: ./cmd/controller
      outputs:
        - source: ${target.dir}/usr/local/bin/
          target: /usr/local/bin/
          uid: 0
          gid: 0
        - source: ${target.dir}/crds
          target: /crds
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/azure-service-operator
          target: /opt/docker/sbom/azure-service-operator
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
