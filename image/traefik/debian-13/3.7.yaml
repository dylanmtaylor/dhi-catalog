# syntax=dhi.io/build:2-debian13

name: Traefik 3.x
image: dhi.io/traefik
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.1
  - 3-debian13
  - 3.7-debian13
  - 3.7.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-05-05"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: fa49e2bcad7ffd8a80accdf1fae1ae480913d93d
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  GOLANG_VERSION: PLACEHOLDER_GOLANG_VERSION
  NODE_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:abb50bd7d4f3a289fb55b6ee5c6030bb0662d1a7208905b16f1ec601970a570e
  NODE_VERSION: 22.22.3
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.1
  VERSION: 3.7.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: go
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      contents:
        packages:
          - grep
          - sed
        files:
          - url: git+https://github.com/traefik/traefik.git#v3.7.1
            checksum: fa49e2bcad7ffd8a80accdf1fae1ae480913d93d
            path: /go/src/github.com/traefik/traefik/v3
            spdx:
              name: traefik
              version: 3.7.1
              packages:
                - name: traefik
                  purl: pkg:golang/github.com/traefik/traefik@3.7.1#v3
                  license: MIT
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:22.22.3-debian13-dev@sha256:abb50bd7d4f3a289fb55b6ee5c6030bb0662d1a7208905b16f1ec601970a570e
            includes:
              - opt/nodejs
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/traefik/traefik/v3
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: run unit tests
          work-dir: /go/src/github.com/traefik/traefik/v3
          runs: |
            set -eux -o pipefail

            # Use lenient FIPS mode during tests because redis/go-redis uses SHA-1
            # for Lua script hashing, which fails in strict mode
            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test -v ./cmd/...
        - name: build webui (> v2)
          work-dir: /go/src/github.com/traefik/traefik/v3/webui
          privileged: true
          runs: |
            set -eux -o pipefail

            # pkg-node currently does not contain corepack
            npm install -g corepack

            /opt/nodejs/node-v22.22.3/bin/corepack yarn workspaces focus --production
            /opt/nodejs/node-v22.22.3/bin/corepack yarn run build
        - name: webui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: traefik-webui
            source: /go/src/github.com/traefik/traefik/v3/webui/static
        - name: build traefik
          uses: go/build@v1
          work-dir: /go/src/github.com/traefik/traefik/v3
          with:
            ldflags:
              - -X github.com/traefik/traefik/v3/pkg/version.Version=3.7.1
              - -X github.com/traefik/traefik/v3/pkg/version.Codename=$(grep -Po 'CODENAME \?= \K\w+' Makefile)
              - -X github.com/traefik/traefik/v3/pkg/version.BuildDate=$(date -d @${SOURCE_DATE_EPOCH} +'"%Y-%m-%dT%H:%M:%SZ')
            output: ${target.dir}/usr/local/bin/traefik
            packages: ./cmd/traefik
      outputs:
        - source: ${target.dir}/usr/local/bin/traefik
          target: /usr/local/bin/traefik
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/traefik
          target: /opt/docker/sbom/traefik
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/traefik-webui
          target: /opt/docker/sbom/traefik-webui
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal traefik image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /usr/local/bin/traefik
