name: Emissary 4.x
image: dhi.io/emissary
variant: runtime
tags:
  - "4"
  - "4.1"
  - 4.1.0
  - 4-debian13
  - 4.1-debian13
  - 4.1.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-06"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 5497a66908186400d16de0a4fba3e467f4b55e46
  ENVOY_DIGEST: sha256:75aafdef175111ab3a757e22c354187acf7e11871ed13fccca943ff5c037e8cc
  ENVOY_VERSION: 1.31.10
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  PYTHON_DIGEST: sha256:48d528137e0f657072c3a966ad5adc85046ccf80be3c6f5bf6d4a8e3160fe365
  PYTHON_MAJOR_MINOR_VERSION: "3.11"
  PYTHON_VERSION: 3.11.15
  SEMVER_MAJOR_MINOR_VERSION: "4.1"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.1.0
  VERSION: 4.1.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - libcap2
    - libffi8
    - libyaml-0-2
    - locales
  builds:
    - name: emissary
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      environment:
        PATH: /opt/python/bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      contents:
        packages:
          - bash
          - binutils
          - binutils-gold
          - build-essential
          - coreutils
          - cargo
          - gcc
          - iptables
          - jq
          - libcap-dev
          - libcap2-bin
          - libffi-dev
          - libncurses6
          - libyaml-dev
          - make
          - openssl
          - patchelf
          - rsync
        files:
          - url: git+https://github.com/emissary-ingress/emissary.git#v4.1.0
            checksum: 5497a66908186400d16de0a4fba3e467f4b55e46
            path: ${source.dir}/emissary
            spdx:
              name: emissary
              version: 4.1.0
              packages:
                - name: emissary
                  purl: pkg:golang/github.com/emissary-ingress/emissary@4.1.0
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/python:3.11.15-debian13@sha256:48d528137e0f657072c3a966ad5adc85046ccf80be3c6f5bf6d4a8e3160fe365
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: set emissary version
          work-dir: ${source.dir}/emissary
          runs: |
            set -eux -o pipefail

            cat > ./python/ambassador.version << EOF
            4.1.0
            5497a66908186400d16de0a4fba3e467f4b55e46
            EOF
        - name: add k8s controller-manager dependency (4 only)
          work-dir: ${source.dir}/emissary
          privileged: true
          runs: |
            set -eux -o pipefail

            go get k8s.io/controller-manager@v0.32.10
        - name: update go dependencies (4 only)
          uses: go/bump@v1
          work-dir: ${source.dir}/emissary
          with:
            deps:
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel@v1.41.0
              - golang.org/x/oauth2@v0.34.0
              - google.golang.org/grpc@v1.79.3
              - sigs.k8s.io/controller-runtime@v0.20.4
              - k8s.io/kubernetes@v1.32.10
              - k8s.io/api@v0.32.10
              - k8s.io/apimachinery@v0.32.10
              - k8s.io/component-base@v0.32.10
              - k8s.io/component-helpers@v0.32.10
              - k8s.io/controller-manager@v0.32.10
              - k8s.io/kube-openapi@v0.0.0-20241105132330-32ad38e42d3f
              - sigs.k8s.io/structured-merge-diff/v4@v4.4.2
              - github.com/go-openapi/spec@v0.21.0
              - github.com/go-openapi/jsonpointer@v0.21.0
              - github.com/go-openapi/jsonreference@v0.21.0
              - github.com/go-openapi/swag@v0.23.0
              - github.com/google/gnostic-models@v0.6.8
            downgrade: true
            download: true
        - name: patch diagd (4 only)
          uses: git/patch@v1
          work-dir: ${source.dir}/emissary
          with:
            patch: ${source.dir}/patch/diagd.4.patch
        - name: install python projects (4 only)
          work-dir: ${source.dir}/emissary/python
          privileged: true
          runs: |
            set -eux -o pipefail

            python3 -m venv ${target.dir}/opt/ambassador

            ${target.dir}/opt/ambassador/bin/python3 -m pip install --upgrade 'wheel>=0.46.2'
            ${target.dir}/opt/ambassador/bin/python3 -m pip install --no-binary=pyyaml ./ambassador ./ambassador-diag
            # Remove vendored wheel from setuptools to fix CVE-2026-24049
            find ${target.dir}/opt/ambassador/lib/python*/site-packages/setuptools/_vendor -name 'wheel-0.45.*' -type d -exec rm -rf {} + 2> /dev/null || true
            find '${target.dir}/opt/ambassador/bin' -type f -executable -exec sed -i '1s|^#!${target.dir}|#!|' {} +
        - name: golang build stage
          work-dir: ${source.dir}/emissary
          runs: |
            set -eux -o pipefail

            GOLDFLAGS=""
            CGO_ENABLED=0 go build \
              -ldflags=$GOLDFLAGS \
              -o ${target.dir}/usr/local/bin/apiext ./cmd/apiext
            CGO_ENABLED=0 go build \
              -ldflags=$GOLDFLAGS \
              -o ${target.dir}/usr/local/bin/busyambassador ./cmd/busyambassador
            CGO_ENABLED=0 go build \
              -ldflags=$GOLDFLAGS \
              -o ${target.dir}/usr/local/bin/wrapper ./cmd/capabilities_wrapper

            setcap cap_net_bind_service=p ${target.dir}/usr/local/bin/wrapper
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/emissary/patch
      outputs:
        - source: ${target.dir}/opt/ambassador
          target: /opt/ambassador
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/apiext
          target: /usr/local/bin/apiext
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/busyambassador
          target: /usr/local/bin/busyambassador
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/wrapper
          target: /usr/local/bin/wrapper
          uid: 0
          gid: 0
        - source: ${source.dir}/emissary/python/ambassador.version
          target: /buildroot/ambassador/python/ambassador.version
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/emissary
          target: /opt/docker/sbom/emissary
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.11.15-debian13@sha256:48d528137e0f657072c3a966ad5adc85046ccf80be3c6f5bf6d4a8e3160fe365
      includes:
        - opt/**
        - usr/**
      uid: 0
