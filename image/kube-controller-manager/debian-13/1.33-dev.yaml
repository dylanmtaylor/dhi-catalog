# syntax=dhi.io/build:2-debian13

name: Kubernetes Controller Manager 1.33.x (dev)
image: dhi.io/kube-controller-manager
variant: dev
tags:
  - 1.33-dev
  - 1.33.12-dev
  - 1.33-debian13-dev
  - 1.33.12-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-04-23"
  end-of-life: "2026-06-28"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 1f348c8e82cf0f170df4ac2b1e859ea0d398ff09
  DBG: '#{ target.dev ? "1" : "0" }'
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  GOLANG_VERSION: 1.25.10
  SEMVER_MAJOR_MINOR_VERSION: "1.33"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.33.12
  VERSION: 1.33.12
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: kube-controller-manager
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      work-dir: /go/src/k8s.io/kubernetes
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - bash
          - coreutils
          - findutils
          - gzip
          - jq
          - libcap2-bin
          - make
          - rsync
          - sed
        files:
          - url: git+https://github.com/kubernetes/kubernetes.git#v1.33.12
            checksum: 1f348c8e82cf0f170df4ac2b1e859ea0d398ff09
            path: /go/src/k8s.io/kubernetes
            spdx:
              name: kubernetes
              version: 1.33.12
              packages:
                - name: kubernetes
                  purl: pkg:golang/k8s.io/kubernetes@1.33.12
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          environment:
            GOWORK: "off"
          with:
            deps: []
            download: true
        - name: update dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            ./hack/pin-dependency.sh golang.org/x/crypto v0.45.0
            ./hack/pin-dependency.sh github.com/opencontainers/selinux v1.13.0
            ./hack/pin-dependency.sh go.opentelemetry.io/otel/sdk v1.43.0
            ./hack/pin-dependency.sh google.golang.org/grpc v1.79.3
            ./hack/update-vendor.sh
        - name: clean git state
          privileged: true
          runs: |
            set -eux -o pipefail

            git add -A
            git -c user.name=build -c user.email=build@build commit -q -m "dependency updates" --no-verify
            git tag -f "v1.33.12"
        - name: verify controller-manager compiles after bump
          privileged: true
          runs: |
            set -eux -o pipefail

            GOWORK=off go test -run=^$ -count=1 ./cmd/kube-controller-manager/...
        - name: build
          runs: |
            set -eux -o pipefail

            make WHAT=cmd/kube-controller-manager DBG=${DBG}
        - name: install
          runs: |
            set -eux -o pipefail

            setcap cap_net_bind_service=+ep _output/bin/kube-controller-manager

            install -D -m 0755 _output/bin/kube-controller-manager \
              '${target.dir}/usr/local/bin/kube-controller-manager'
        - name: smoke test
          runs: |
            set -eux -o pipefail

            ${target.dir}/usr/local/bin/kube-controller-manager --help > /dev/null
            ${target.dir}/usr/local/bin/kube-controller-manager --version
      outputs:
        - source: ${target.dir}/usr/local/bin/kube-controller-manager
          target: /usr/local/bin/kube-controller-manager
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: directory
    path: /run/kubernetes
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Kubernetes controller manager image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - kube-controller-manager
