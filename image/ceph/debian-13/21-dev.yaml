        files:
          - url: git+https://github.com/ceph/ceph.git#v21.0.0
            checksum: c9045e280ded78e4fbc5e4bba74233bec5701c60
            path: ${source.dir}/ceph
            spdx:
              name: ceph
              version: 21.0.0
              packages:
                - name: ceph
                  purl: pkg:dhi/ceph@21.0.0
                  license: LGPL-2.1
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
            includes:
              - opt/**
              - usr/**
            uid: 0
            gid: 0
      pipeline:
        - name: install Python build dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            # CMake's FindCython.cmake uses ${Python3_EXECUTABLE} -m cython --version
            # The cython3 package installs for system Python, but we use Python artifact
            # Install Cython for the artifact Python so CMake can find it
            /opt/python/bin/python3 -m pip install --no-cache-dir Cython==3.2.4

            # Install sphinx-build for documentation generation (CMake requires it)
            # CMake looks for sphinx-build executable, install sphinx which provides it
            /opt/python/bin/python3 -m pip install --no-cache-dir sphinx

            # Install PyYAML - required by build scripts (y2c.py)
            /opt/python/bin/python3 -m pip install --no-cache-dir PyYAML

            # Install setuptools - provides distutils compatibility shim for Python 3.12+
            # Ceph's Cython build scripts use distutils.core.setup which was removed in Python 3.12
            /opt/python/bin/python3 -m pip install --no-cache-dir setuptools

            /opt/python/bin/python3 -m pip install --no-cache-dir prettytable
        - name: patch opentelemetry to use Debian abseil
          uses: git/patch@v1
          work-dir: ${source.dir}/ceph
          with:
            patch: ${source.dir}/patch/build-opentelemetry-use-system-abseil.patch
        - name: patch opentelemetry jaeger thrift compatibility
          uses: git/patch@v1
          work-dir: ${source.dir}/ceph
          with:
            patch: ${source.dir}/patch/build-opentelemetry-jaeger-thrift-compat.patch
        - name: patch distutils remove install layout deb for ceph 21
          uses: git/patch@v1
          work-dir: ${source.dir}/ceph
          with:
            patch: ${source.dir}/patch/21-build-distutils-remove-install-layout-deb.patch
        - name: configure and create build
          work-dir: ${source.dir}/ceph
          privileged: true
          environment:
            CCACHE_DIR: /ccache
            CCACHE_MAXSIZE: 20G
          runs: |
            set -eux -o pipefail

            # Initialize git submodules like in https://github.com/ceph/ceph/blob/main/do_cmake.sh#L5
            git submodule update --init --recursive --recommend-shallow --progress

            # Add Python artifact bin to PATH so CMake can find sphinx-build
            export PATH="/opt/python/bin:${PATH}"

            # Also create a separate build dir
            mkdir -p build

            # Use RelWithDebInfo for production builds (debug builds can take up to 60GB of disk space)
            # Create a bash array
            ARGS=(
              -GNinja
              -DCMAKE_BUILD_TYPE=Release
              -DWITH_PYTHON3=3.13
              -DPython3_EXECUTABLE=/opt/python/bin/python3
              -DWITH_CCACHE=ON
              -DCMAKE_CXX_COMPILER=g++
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
              -DSETUPTOOLS_DEB_LAYOUT=OFF
              -DWITH_MGR_DASHBOARD_FRONTEND=OFF
              -DWITH_TESTS=OFF
              -DWITH_MANPAGE=OFF
            )

            # Generate the build files
            cmake -S . -B build "${ARGS[@]}"
        - name: build
          work-dir: ${source.dir}/ceph/build
          privileged: true
          runs: |
            set -eux -o pipefail

            # Add Python artifact bin to PATH for build scripts
            export PATH="/opt/python/bin:${PATH}"

            # Build with ninja using available cores.
            # Some C++ translation units (RGW, Boost.Asio templates) use 4-5 GiB each;
            # ensure the builder has sufficient memory (cloud builder recommended).
            ninja -j"$(nproc)"
        - name: install
          work-dir: ${source.dir}/ceph/build
          runs: |
            set -eux -o pipefail

            export PATH="/opt/python/bin:${PATH}"

            # Install Ceph binaries and libraries
            DESTDIR="${target.dir}" ninja install

            # Copy Python runtime dependencies from build Python into the target.
            # prettytable is required by ceph_daemon.py (imported by the ceph CLI).
            # It was pip-installed into the build Python during the earlier step.
            SITE_PKG="${target.dir}/usr/local/lib/python3.13/site-packages"
            BUILD_SITE="/opt/python/lib/python3.13/site-packages"
            cp -r "${BUILD_SITE}"/prettytable "${SITE_PKG}/"
            cp -r "${BUILD_SITE}"/prettytable-*.dist-info "${SITE_PKG}/"
            cp -r "${BUILD_SITE}"/wcwidth "${SITE_PKG}/"
            cp -r "${BUILD_SITE}"/wcwidth-*.dist-info "${SITE_PKG}/"

            # Rook probes execute ceph with a stripped environment, so wrap the
            # generated script to restore the Python and Ceph library search paths.
            mv "${target.dir}/usr/local/bin/ceph" "${target.dir}/usr/local/bin/ceph.real"
            cat > "${target.dir}/usr/local/bin/ceph-wrapper.sh" << 'EOF'
            #!/bin/sh
            export PYTHONPATH="/usr/local/lib/python3.13/site-packages${PYTHONPATH:+:${PYTHONPATH}}"
            export LD_LIBRARY_PATH="/usr/local/lib:/usr/local/lib/ceph${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
            exec /opt/python/bin/python3 /usr/local/bin/ceph.real "$@"
            EOF
            install -m 0755 "${target.dir}/usr/local/bin/ceph-wrapper.sh" "${target.dir}/usr/local/bin/ceph"
            rm "${target.dir}/usr/local/bin/ceph-wrapper.sh"

            # Configure dynamic linker to find Ceph libraries at /usr/local/lib
            mkdir -p "${target.dir}/etc/ld.so.conf.d"
            echo "/usr/local/lib" > "${target.dir}/etc/ld.so.conf.d/ceph.conf"
      paths:
        - type: file
          path: ${source.dir}/patch/19-build-make-boost-url-a-list.patch
          uid: 0
          gid: 0
          source: image/ceph/debian-13/patch/19-build-make-boost-url-a-list.patch
        - type: file
