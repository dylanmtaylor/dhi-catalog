          source: image/ceph/debian-13/patch/build-distutils-remove-install-layout-deb.patch
        - type: file
          path: ${source.dir}/patch/21-build-distutils-remove-install-layout-deb.patch
          uid: 0
          gid: 0
          source: image/ceph/debian-13/patch/21-build-distutils-remove-install-layout-deb.patch
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${target.dir}/usr/local/lib
          target: /usr/local/lib
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/share/ceph
          target: /usr/local/share/ceph
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/ld.so.conf.d/ceph.conf
          target: /etc/ld.so.conf.d/ceph.conf
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/ceph
          target: /opt/docker/sbom/ceph
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13@sha256:a87c4bc7bbf75da7d5bb1816f2bdf7640c17eeb42d3ba84c5201827977da8de4
      includes:
