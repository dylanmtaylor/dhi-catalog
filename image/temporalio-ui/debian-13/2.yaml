# syntax=dhi.io/build:2-debian13

name: Temporal UI 2.x
image: dhi.io/temporalio-ui
variant: runtime
tags:
  - "2.49"
  - 2.49.1
  - 2.49-debian13
  - 2.49.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 172adf21820449c1e661d66d4117605609ac2e71
  DEBIAN_VERSION: "13"
  DOCKERIZE_COMMIT_SHA: 90dbb4fc2ef9098acd41e8c3ca98d2f730c741d6
  DOCKERIZE_VERSION: 0.9.5
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  NODE_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
  NODE_VERSION: 24.15.0
  SEMVER_MAJOR_MINOR_VERSION: "2.49"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.49.1
  VERSION: 2.49.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - bash
    - ca-certificates
    - tzdata
  builds:
    - name: build-ui
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      environment:
        HUSKY: "0"
      contents:
        packages:
          - bash
        files:
          - url: git+https://github.com/temporalio/ui.git#v2.49.1
            checksum: 172adf21820449c1e661d66d4117605609ac2e71
            path: ${source.dir}/ui
            spdx:
              name: temporalio-ui
              version: 2.49.1
              packages:
                - name: temporalio-ui
                  purl: pkg:dhi/temporalio-ui@2.49.1
                  license: MIT
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
            includes:
              - opt/nodejs
              - usr/local/bin
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v1
          work-dir: ${source.dir}/ui/server
          with:
            deps:
              - github.com/gomarkdown/markdown@v0.0.0-20260411013819-759bbc3e3207
            download: true
        - name: bump pnpm
          work-dir: ${source.dir}/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm pkg set pnpm.overrides.cookie=0.7.0
            npm pkg set pnpm.overrides.validator=13.15.20
            npm pkg set pnpm.overrides.esbuild=0.27.0
            npm pkg set pnpm.overrides.valibot=1.2.0                  # CVE-2025-66020
            npm pkg set pnpm.overrides.validator=13.15.22             # CVE-2025-12758
            npm pkg set pnpm.overrides.qs=6.14.2                      # CVE-2025-15284, CVE-2026-2391
            npm pkg set pnpm.overrides.devalue=5.6.4                  # GHSA-33hq-fvwr-56pm, GHSA-8qm3-746x-r74r, CVE-2026-30226, GHSA-mwv9-gp5h-frr4
            npm pkg set pnpm.overrides.svelte=5.53.5                  # CVE-2026-27901, CVE-2026-27902
            npm pkg set pnpm.overrides."@sveltejs/kit"=2.57.1         # GHSA-fpg4-jhqr-589c, CVE-2026-40073, CVE-2026-40074
            npm pkg set pnpm.overrides."@octokit/endpoint"=10.1.3     # CVE-2025-25285
            npm pkg set pnpm.overrides."@octokit/request-error"=6.1.7 # CVE-2025-25289
            npm pkg set pnpm.overrides.vite=6.4.2                     # GHSA-p9ff-h696-f583, GHSA-4w7w-66w2-5vf9

            # Prevent npm lifecycle hooks (upstream `prepare` downloads Temporal CLI from temporal.download — blocked in CI)
            pnpm update babel/runtime@7.26.10 --ignore-scripts
        - name: install dependencies
          work-dir: ${source.dir}/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            pnpm install --ignore-scripts
        - name: svelte-kit sync
          work-dir: ${source.dir}/ui
          runs: |
            set -eux -o pipefail

            pnpm exec svelte-kit sync
        - name: build ui assets
          work-dir: ${source.dir}/ui
          runs: |
            set -eux -o pipefail

            pnpm build:server
        - name: build ui server
          work-dir: ${source.dir}/ui
          runs: |
            set -eux -o pipefail

            # Link in standard location.
            mkdir -p /go/src/github.com/temporalio/ui-server
            ln -s "${source.dir}/ui/server" /go/src/github.com/temporalio/ui-server/v2
            cd /go/src/github.com/temporalio/ui-server/v2

            # Build UI server binary
            CGO_ENABLED=0 go build -o ${target.dir}/home/ui-server/ui-server ./cmd/server/main.go
        - name: remove dev assets
          work-dir: ${source.dir}/ui
          runs: |
            set -eux -o pipefail

            # keep --ignore-scripts so lifecycle hooks do not retry temporal.download fetch
            pnpm prune --prod --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: temporalio-ui-server
            source: ${source.dir}/ui/node_modules
      outputs:
        - source: ${target.dir}/home/ui-server/ui-server
          target: /home/ui-server/ui-server
          uid: 0
          gid: 0
        - source: ${source.dir}/ui/server/docker/start-ui-server.sh
          target: /home/ui-server/start-ui-server.sh
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${source.dir}/ui/server/config
          target: /home/ui-server/config
          uid: 0
          gid: 0
        - source: ${source.dir}/ui/server/ui/assets
          target: /home/ui-server/ui/assets
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/temporalio-ui
          target: /opt/docker/sbom/temporalio-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/temporalio-ui-server
          target: /opt/docker/sbom/temporalio-ui-server
          uid: 0
          gid: 0
    - name: build-base-dockerize
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - bash
        files:
          - url: git+https://github.com/jwilder/dockerize.git#v0.9.5
            checksum: 90dbb4fc2ef9098acd41e8c3ca98d2f730c741d6
            path: /go/src/github.com/jwilder/dockerize
            spdx:
              name: dockerize
              version: 0.9.5
              packages:
                - name: dockerize
                  purl: pkg:golang/github.com/jwilder/dockerize@0.9.5
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/jwilder/dockerize
          with:
            deps:
              - golang.org/x/crypto@v0.45.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: build dockerize
          work-dir: /go/src/github.com/jwilder/dockerize
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go build -o ${target.dir}/usr/local/bin/dockerize
      outputs:
        - source: ${target.dir}/usr/local/bin/dockerize
          target: /usr/local/bin/dockerize
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dockerize
          target: /opt/docker/sbom/dockerize
          uid: 0
          gid: 0
accounts:
  run-as: temporal
  users:
    - name: temporal
      uid: 5000
      gid: 5000
  groups:
    - name: temporal
      gid: 5000
      members:
        - temporal
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /home/ui-server
environment:
  TEMPORAL_CLOUD_UI: "false"
paths:
  - type: directory
    path: /home/ui-server/config
    uid: 5000
    gid: 5000
    mode: "0755"
  - type: directory
    path: /etc/temporal/config/
    uid: 5000
    gid: 5000
annotations:
  org.opencontainers.image.description: Temporal UI - Web interface for Temporal workflow management
  org.opencontainers.image.licenses: MIT
entrypoint:
  - /home/ui-server/start-ui-server.sh
ports:
  - 8080/tcp
