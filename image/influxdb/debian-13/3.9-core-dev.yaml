# syntax=dhi.io/build:2-debian13

name: InfluxDB 3.9.x Core (core, dev)
image: dhi.io/influxdb
variant: dev
flavor: core
tags:
  - 3-core-dev
  - 3.9-core-dev
  - 3.9.2-core-dev
  - 3-debian13-core-dev
  - 3.9-debian13-core-dev
  - 3.9.2-debian13-core-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-01"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: eae58d2018cc50ad4c2f6f56316c94d06d37683c
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
  PYTHON_VERSION: 3.13.13
  RUST_REFERENCE: dhi/rust:1.95.0-debian13@sha256:da9b6413aed5fe5779ebb0d5bc835b49206561e36f8594661cda426b25bebe42
  RUST_VERSION: 1.95.0
  SEMVER_MAJOR_MINOR_VERSION: "3.9"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.9.2
  VERSION: 3.9.2
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - openssl
    - perl-base
    - sed
    - util-linux
  builds:
    - name: influxdb3
      uses: dhi.io/rust:1.95.0-debian13@sha256:da9b6413aed5fe5779ebb0d5bc835b49206561e36f8594661cda426b25bebe42
      contents:
        packages:
          - binutils
          - git
          - grep
          - libprotobuf-dev
          - lld
          - protobuf-compiler
          - sed
        files:
          - url: git+https://github.com/influxdata/influxdb.git#v3.9.2
            checksum: eae58d2018cc50ad4c2f6f56316c94d06d37683c
            path: ${source.dir}/influxdb3
            spdx:
              name: influxdb3
              version: 3.9.2
              packages:
                - name: influxdb3
                  purl: pkg:cargo/influxdb3@3.9.2
                  license: MIT
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
            excludes:
              - etc/group
              - etc/passwd
              - etc/shadow
            uid: 0
            gid: 0
      pipeline:
        - name: bump cargo deps
          work-dir: ${source.dir}/influxdb3
          runs: |
            set -eux -o pipefail

            # Patch Cargo.lock directly to avoid triggering a git fetch for
            # git-sourced transitive deps (e.g. arrow-datafusion) which are
            # unreachable from within the build container on some platforms.
            python3 - << 'EOF'
            import pathlib
            lock = pathlib.Path('Cargo.lock')
            c = lock.read_text()
            # GHSA-pwjx-qhcg-rvj4, GHSA-965h-392x-2mh5, GHSA-xgp8-3hg3-c2mh, GHSA-82j2-j2ch-gfr8: rustls-webpki 0.103.9 -> 0.103.13
            c = c.replace(
                'name = "rustls-webpki"\nversion = "0.103.9"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "d7df23109aa6c1567d1c575b9952556388da57401e4ace1d15f79eedad0d8f53"',
                'name = "rustls-webpki"\nversion = "0.103.13"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "61c429a8649f110dddef65e2a5ad240f747e85f7758a6bccc7e5777bd33f756e"',
            )
            c = c.replace('"rustls-webpki 0.103.9"', '"rustls-webpki 0.103.13"')
            # GHSA-cq8v-f236-94qc: rand 0.9.2 -> 0.9.3
            c = c.replace(
                'name = "rand"\nversion = "0.9.2"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "6db2770f06117d490610c7488547d543617b21bfa07796d7a12f6f1bd53850d1"',
                'name = "rand"\nversion = "0.9.3"\nsource = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "7ec095654a25171c2124e9e3393a930bddbffdc939556c914957a4c3e0a87166"',
            )
            c = c.replace('"rand 0.9.2"', '"rand 0.9.3"')
            lock.write_text(c)
            print('patched: rustls-webpki 0.103.9->0.103.12, rand 0.9.2->0.9.3')
            EOF
        - name: cargo sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: influxdb3-cargo
            source: ${source.dir}/influxdb3
        - name: configure PYO3
          runs: |
            set -eux -o pipefail

            cat > "${source.dir}/pyo3_config_file.txt" << EOF
            implementation=CPython
            version=3.13
            shared=true
            abi3=false
            lib_name=python3.13
            lib_dir=/opt/python/lib
            executable=/opt/python/bin/python3.13
            pointer_width=64
            build_flags=
            suppress_build_script_link_lines=false
            EOF
        - name: build
          work-dir: ${source.dir}/influxdb3
          privileged: true
          caches:
            - path: /usr/local/cargo/git/db
            - path: /usr/local/cargo/registry
          runs: |
            set -eux -o pipefail

            export PYO3_CONFIG_FILE="${source.dir}/pyo3_config_file.txt"
            cargo build --release
        - name: install
          work-dir: ${source.dir}/influxdb3
          runs: |
            set -eux -o pipefail

            install -D target/release/influxdb3 \
              '${target.dir}/usr/local/bin/influxdb3'
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3
          target: /opt/docker/sbom/influxdb3
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/influxdb3-cargo
          target: /opt/docker/sbom/influxdb3-cargo
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13@sha256:ce35145dcd0016ab6f17a1eade4e57d37850d05a1cfcee6190762a496567b440
      excludes:
        - etc/group
        - etc/passwd
        - etc/shadow
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  INFLUX_CONFIGS_PATH: /var/lib/influx-cli/configs
  INFLUXD_CONFIG_PATH: /etc/influxdb/
  INFLUXDB3_DB_DIR: /var/lib/influxdb3
  INFLUXDB3_PLUGIN_DIR: /plugins
paths:
  - type: directory
    path: /var/lib/influxdb3
    uid: 65532
    gid: 65532
  - type: directory
    path: /plugins
    uid: 65532
    gid: 65532
annotations:
  org.opencontainers.image.description: A minimal InfluxDB image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - influxdb3
ports:
  - 8181/tcp
