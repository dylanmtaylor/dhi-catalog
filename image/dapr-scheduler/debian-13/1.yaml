# syntax=dhi.io/build:2-debian13

name: Dapr Scheduler 1.17.x
image: dhi.io/dapr-scheduler
variant: runtime
tags:
  - "1"
  - "1.17"
  - 1.17.7
  - 1-debian13
  - 1.17-debian13
  - 1.17.7-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-02"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 54e78963d88076ad606325eacd11d31dfab646c7
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.17"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.17.7
  VERSION: 1.17.7
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
  builds:
    - name: dapr-scheduler
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/dapr/dapr
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/dapr/dapr.git#v1.17.7
            checksum: 54e78963d88076ad606325eacd11d31dfab646c7
            path: /go/src/github.com/dapr/dapr
            spdx:
              name: dapr-scheduler
              version: 1.17.7
              packages:
                - name: dapr-scheduler
                  purl: pkg:golang/github.com/dapr/dapr@1.17.7
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel@v1.41.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: test go dependencies
          runs: |
            set -eux -o pipefail

            # Build system injects OTEL_EXPORTER_OTLP_TRACES_* vars which take priority
            # over OTEL_EXPORTER_OTLP_* and break unit tests that set the latter
            unset OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || true
            unset OTEL_EXPORTER_OTLP_TRACES_PROTOCOL || true

            # Build containers have no outbound network or non-loopback interfaces;
            # provide a fallback so GetHostAddress() doesn't fail
            export DAPR_HOST_IP="${DAPR_HOST_IP:-127.0.0.1}"

            if [ "${target.fips}" = "true" ]; then
              # Tests use non-FIPS algorithms (X25519, SHA-1, GCM with arbitrary IVs);
              # use lenient mode to match the runtime image's GODEBUG=fips140=on setting
              export GODEBUG=fips140=on
            fi

            # CGO_ENABLED=0: build container has no linker (binutils not installed)
            # -tags unit: required to compile unit test helpers (WithAppChannel, mock, diag utils etc.)
            # Exclude tests/: those are integration/e2e tests, not unit tests.
            # Also exclude the dnslookup package because upstream added an
            # integration-style reconnect test there that depends on mixed
            # IPv4/IPv6 loopback behavior and is flaky in the DHI build sandbox.
            CGO_ENABLED=0 go test -tags unit \
              $(go list -tags unit ./... \
                | grep -v 'github.com/dapr/dapr/tests/' \
                | grep -v 'github.com/dapr/dapr/pkg/actors/internal/placement/connector/dnslookup$')
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/dapr/dapr/pkg/buildinfo.gitcommit=54e78963d88076ad606325eacd11d31dfab646c7
              - -X github.com/dapr/dapr/pkg/buildinfo.gitversion=1.17.7
              - -X github.com/dapr/dapr/pkg/buildinfo.version=1.17.7
            output: ${target.dir}/usr/local/bin/dapr-scheduler
            packages: ./cmd/scheduler
      outputs:
        - source: ${target.dir}/usr/local/bin/dapr-scheduler
          target: /usr/local/bin/dapr-scheduler
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dapr-scheduler
          target: /opt/docker/sbom/dapr-scheduler
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: "65532"
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: symlink
    path: /scheduler
    uid: 0
    gid: 0
    source: /usr/local/bin/dapr-scheduler
annotations:
  org.opencontainers.image.description: A minimal Dapr Scheduler image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/dapr-scheduler
