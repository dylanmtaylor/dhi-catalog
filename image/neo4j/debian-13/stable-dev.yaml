# syntax=dhi.io/build:2-debian13

name: Neo4j 2026.x (dev)
image: dhi.io/neo4j
variant: dev
tags:
  - 2026-dev
  - 2026.04-dev
  - 2026.04.0-dev
  - 2026-debian13-dev
  - 2026.04-debian13-dev
  - 2026.04.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ARCH: '#{ target.arch == "amd64" ? "x64" : "aarch64" }'
  COMMIT_SHA: b65204dd43e1f06812294c4a804f1d292534f107
  GOSU_REFERENCE: dhi/pkg-gosu:1.19-debian13@sha256:c0a43ecf9fde17bd14b9b28f9c93c8f11d33a1a0713f40a53fb3924d7cbad642
  JRE_REFERENCE: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  MAVEN_REFERENCE: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  MVN_PROPS_VARIANT: stable
  NEO4J_HOME: /var/lib/neo4j
  SEMVER_MAJOR_MINOR_VERSION: "2026.04"
  SEMVER_MAJOR_VERSION: "2026"
  SEMVER_VERSION: 2026.04.0
  VERSION: 2026.04.0
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - tini
    - util-linux
  builds:
    - name: neo4j
      uses: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
      contents:
        packages:
          - coreutils
          - tar
          - gzip
          - xmlstarlet
        files:
          - url: git+https://github.com/neo4j/neo4j.git#2026.04.0
            checksum: b65204dd43e1f06812294c4a804f1d292534f107
            path: ${source.dir}/neo4j
            spdx:
              name: neo4j
              version: 2026.04.0
              packages:
                - name: neo4j
                  purl: pkg:dhi/neo4j@2026.04.0
                  license: GPL-3.0
            uid: 0
            gid: 0
          - url: git+https://github.com/neo4j/docker-neo4j-publish#master
            path: ${source.dir}/docker-neo4j-publish
            spdx:
              name: docker-neo4j-publish
              version: 2026.04.0
              packages:
                - name: docker-neo4j-publish
                  purl: pkg:dhi/docker-neo4j-publish@2026.04.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: copy startup scripts
          work-dir: ${source.dir}/docker-neo4j-publish
          runs: |
            set -eux -o pipefail

            cp -R 2026.04.0/trixie/community/local-package ${target.dir}/startup
        - name: patch entrypoint to use gosu instead of su-exec
          work-dir: ${target.dir}/startup
          runs: |
            set -eux -o pipefail

            # Replace su-exec with gosu in docker-entrypoint.sh
            # su-exec syntax: su-exec user command args
            # gosu syntax: gosu user command args (same syntax, so simple replacement works)
            sed -i 's/su-exec/gosu/g' docker-entrypoint.sh
        - name: patch properties
          uses: mvn/patch@v1
          with:
            dependencies: ${source.dir}/patch/mvn-deps-stable.json
            dependencies-key: dependencyManagement.dependencies
            mvn-root: ${source.dir}/neo4j
            properties: ${source.dir}/patch/mvn-properties-stable.json
        - name: manually edit pom.xml to allow for additional non-standard field
          work-dir: ${source.dir}/neo4j
          runs: |
            set -eux -o pipefail

            xmlstarlet ed -L \
              -N m="http://maven.apache.org/POM/4.0.0" \
              -s "/m:project/m:dependencyManagement/m:dependencies" -t elem -n "dependencyTMP" -v "" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "groupId" -v "io.netty" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "artifactId" -v "netty-transport-native-epoll" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "version" -v "4.2.13.Final" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "classifier" -v "linux-x86_64" \
              -r "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -v "dependency" \
              pom.xml

            xmlstarlet ed -L \
              -N m="http://maven.apache.org/POM/4.0.0" \
              -s "/m:project/m:dependencyManagement/m:dependencies" -t elem -n "dependencyTMP" -v "" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "groupId" -v "io.netty" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "artifactId" -v "netty-transport-native-epoll" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "version" -v "4.2.13.Final" \
              -s "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -t elem -n "classifier" -v "linux-aarch_64" \
              -r "/m:project/m:dependencyManagement/m:dependencies/dependencyTMP" -v "dependency" \
              pom.xml
        - name: build
          work-dir: ${source.dir}/neo4j
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            # Set platform-specific Maven properties
            if [ "${ARCH}" = "aarch64" ]; then
              export MAVEN_OPTS="-Dos.arch=aarch64 -Dos.name=Linux -Dos.version=arm64"
              export JAVA_OPTS="-Dos.arch=aarch64"
            fi

            # Spotless / lint steps expect build-resources under public/ for the stable line.
            # Apply on all architectures (previously only aarch64, which broke linux/amd64 CI).
            if [ "stable" = "stable" ]; then
              mkdir -p public && cp -r ./build-resources ./public
            fi

            # Set release version (source pom.xml uses SNAPSHOT versioning)
            mvn versions:set -DnewVersion=2026.04.0 -DgenerateBackupPoms=false -q

            # After updated dependencies, the pom.xml file may need linting;
            mvn spotless:apply

            mvn clean install -DskipTests -Doverwrite=true
        - name: install
          work-dir: ${source.dir}/neo4j
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/var/lib/neo4j
            TARFILE=$(find packaging/standalone/target -name "neo4j-community-*-unix.tar.gz")
            tar -xzf ${TARFILE} -C ${target.dir}/var/lib/neo4j --strip-components=1
      paths:
        - type: file
          path: /src/patch/mvn-properties-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-properties-stable.json
        - type: file
          path: /src/patch/mvn-deps-stable.json
          uid: 0
          gid: 0
          source: image/neo4j/patch/mvn-deps-stable.json
      outputs:
        - source: ${target.dir}/var/lib/neo4j
          target: /var/lib/neo4j
          uid: 7474
          gid: 7474
          mode: "0744"
        - source: ${target.dir}/startup
          target: /startup
          uid: 0
          gid: 0
        - source: ${target.dir}/startup/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/neo4j
          target: /opt/docker/sbom/neo4j
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
      uid: 0
      gid: 0
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:c0a43ecf9fde17bd14b9b28f9c93c8f11d33a1a0713f40a53fb3924d7cbad642
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: neo4j
      uid: 7474
      gid: 7474
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: neo4j
      gid: 7474
      members:
        - neo4j
os-release:
