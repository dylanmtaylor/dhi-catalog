# syntax=dhi.io/build:2-debian13

name: Langfuse 3.x
image: dhi.io/langfuse
variant: runtime
tags:
  - "3"
  - "3.174"
  - 3.174.1
  - 3-debian13
  - 3.174-debian13
  - 3.174.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-12-09"
vars:
  COMMIT_SHA: 1e3535e126fc918781f45753706ff0f576b12175
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  MIGRATE_COMMIT_SHA: 89e308c340a2c069c3260f268307d38a7db88227
  MIGRATE_VERSION: 4.19.1
  NODE_BUILD_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:153eb045e055c4862448a42399568bcbc4f273f39cb9090fcc19af3e704bc1d5
  NODE_RUNTIME_REFERENCE: dhi/node:24.15.0-debian13@sha256:12dd3a0b044f9601e987ecfd9fa728118375bcb418435d8780e1a95f8fb01317
  PNPM_VERSION: 10.33.0
  PRISMA_VERSION: 6.19.3
  SEMVER_MAJOR_MINOR_VERSION: "3.174"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.174.1
  TURBO_VERSION: 2.9.5
  VERSION: 3.174.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - ca-certificates
    - dash
    - dumb-init
    - tzdata
  builds:
    - name: golang-migrate
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/golang-migrate/migrate
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/golang-migrate/migrate.git#v4.19.1
            checksum: 89e308c340a2c069c3260f268307d38a7db88227
            path: /go/src/github.com/golang-migrate/migrate
            spdx:
              name: golang-migrate
              version: 4.19.1
              packages:
                - name: golang-migrate
                  purl: pkg:golang/github.com/golang-migrate/migrate/v4@v4.19.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps: []
            download: true
        - name: test
          runs: |
            set -eux -o pipefail

            CGO_ENABLED=0 go test -tags clickhouse ./cmd/migrate/...
        - name: build migrate
          uses: go/build@v1
          with:
            ldflags:
              - -s
              - -w
            output: ${target.dir}/usr/bin/migrate
            packages: ./cmd/migrate
            tags: clickhouse
      outputs:
        - source: ${target.dir}/usr/bin/migrate
          target: /usr/bin/migrate
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/golang-migrate
          target: /opt/docker/sbom/golang-migrate
          uid: 0
          gid: 0
    - name: langfuse
      uses: dhi.io/node:24.15.0-debian13-dev@sha256:153eb045e055c4862448a42399568bcbc4f273f39cb9090fcc19af3e704bc1d5
      work-dir: ${source.dir}/langfuse
      environment:
        CI: "true"
        DOCKER_BUILD: "1"
        NEXT_MANUAL_SIG_HANDLE: "true"
        NEXT_TELEMETRY_DISABLED: "1"
        PNPM_HOME: /pnpm
      caches:
        - path: /pnpm/store
        - path: /root/.cache
      contents:
        files:
          - url: git+https://github.com/langfuse/langfuse.git#v3.174.1
            checksum: 1e3535e126fc918781f45753706ff0f576b12175
            path: ${source.dir}/langfuse
            spdx:
              name: langfuse
              version: 3.174.1
              packages:
                - name: langfuse
                  purl: pkg:github/langfuse/langfuse@3.174.1
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: build and stage web (v3)
          privileged: true
          runs: |
            set -eux -o pipefail

            corepack enable
            corepack prepare pnpm@10.33.0 --activate
            npm install -g --no-package-lock --no-save turbo@2.9.5
            export PATH="$(npm config get prefix)/bin:${PATH}"

            # Cloud-only.
            rm -f ./web/src/middleware.ts

            turbo prune --scope=web --docker

            cd ./out
            cp -a json/. .

            # No uuid@11 override: oci-common@2.127.0 deep-imports uuid/v1
            # (removed in 11.x); CVE-2026-41907 stays MED.
            node -e '
              const fs = require("fs");
              const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
              p.pnpm = p.pnpm || {};
              Object.assign(p.pnpm.overrides = p.pnpm.overrides || {}, {
                "fast-uri":                              "3.1.2",   // CVE-2026-6321, CVE-2026-6322 (HIGH)
                "langsmith":                             "0.5.19",  // CVE-2026-40190, CVE-2026-41182 (MED)
                "nodemailer":                            "8.0.5",   // GHSA-vvjj-xcjg-gr5g (MED), GHSA-c7w3-x93f-qmm8 (LOW)
                "brace-expansion":                       "1.1.13",  // CVE-2026-33750 (MED), CVE-2025-5889 (LOW)
                "fast-xml-parser":                       "5.7.0",   // CVE-2026-41650 (MED)
                "qs":                                    "6.14.2",  // CVE-2026-2391 (LOW)
                "@tootallnate/once":                     "3.0.1",   // CVE-2026-3449 (LOW)
                "protobufjs@7":                          "7.5.6",   // CVE-2026-44288..44294 (HIGH/MED)
                "protobufjs@8":                          "8.0.3",   // CVE-2026-44288..44294 (HIGH/MED)
                "@protobufjs/utf8":                      "1.1.1",   // CVE-2026-44288 (MED)
                "postcss":                               "8.5.14",  // CVE-2026-41305 (MED)
                "form-data":                             "4.0.5",   // CVE-2025-7783 (CRITICAL)
                "follow-redirects":                      "1.16.0",  // GHSA-r4q5-vmmm-2653 (MED)
                "@babel/runtime":                        "7.29.2",  // CVE-2025-27789 (MED)
                "@opentelemetry/exporter-prometheus":    "0.217.0", // CVE-2026-44902 (HIGH)
                "@opentelemetry/sdk-node":               "0.217.0", // CVE-2026-44902 (HIGH)
              });
              fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            '

            # Overrides above drift the lockfile.
            pnpm install --no-frozen-lockfile

            cp -a full/. .

            # Scope Next's trace root to the pruned monorepo; otherwise it
            # walks up to /src/langfuse and blows the trace memory budget.
            rm -f /src/langfuse/pnpm-workspace.yaml /src/langfuse/pnpm-lock.yaml

            # Next 16 defaults to Turbopack which OOM-kills on a constrained
            # build container; force webpack.
            node -e '
              const fs = require("fs");
              const f = "./web/package.json";
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              p.scripts.build = p.scripts.build.replace(/(\s|^)next build(\s|$)/, "$1next build --webpack$2");
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n");
            '

            # next.config.mjs patches:
            #   cpus:1, workerThreads:false — bound static-page worker pool (avoid exit 137).
            #   esmExternals:"loose" — webpack require() ESM-only deps (uuid@14 etc.).
            #   outputFileTracingExcludes — drop @esbuild/* (embedded Go stdlib CVE cluster).
            #   outputFileTracingRoot — pin to out/ (parent of web/) so standalone keeps
            #     web/server.js layout; entrypoint expects /app/web/server.js.
            #   typescript.ignoreBuildErrors — upstream CI already typechecks. Next 16 rejects
            #     `eslint:` in config so it's skipped.
            #   withSentryConfig bypass — without SENTRY_AUTH_TOKEN, Sentry's webpack
            #     plugin adds wrapping + map work for nothing; trims memory pressure.
            #     Runtime `Sentry.init(...)` in app code is unaffected.
            node -e '
              const fs = require("fs");
              const f = "./web/next.config.mjs";
              let s = fs.readFileSync(f, "utf8");
              const extra = "cpus: 1, workerThreads: false, esmExternals: \"loose\",";
              if (/experimental:\s*\{/.test(s)) {
                s = s.replace(/experimental:\s*\{/, "experimental: { " + extra);
              } else {
                s = s.replace(/const nextConfig = \{/, "const nextConfig = {\n  experimental: { " + extra + " },");
              }
              if (!/outputFileTracingExcludes:/.test(s)) {
                s = s.replace(/const nextConfig = \{/, "const nextConfig = {\n  outputFileTracingExcludes: { \"*\": [\"node_modules/@esbuild/**\"] },");
              }
              if (!/outputFileTracingRoot:/.test(s)) {
                s = s.replace(/const nextConfig = \{/, "const nextConfig = {\n  outputFileTracingRoot: new URL(\"..\", import.meta.url).pathname,");
              }
              if (!/typescript:\s*\{/.test(s)) {
                s = s.replace(/const nextConfig = \{/, "const nextConfig = {\n  typescript: { ignoreBuildErrors: true },");
              }
              s = s.replace(/export\s+default\s+withSentryConfig\([^]*$/, "export default nextConfig;\n");
              fs.writeFileSync(f, s);
            '

            # Page-gen worker inherits NODE_OPTIONS; v3's larger bundle
            # needs a tighter cap so main + worker fit the host budget.
            HEAP_MB=$(node -e 'console.log(Math.min(3584, Math.floor(require("os").totalmem()/1024/1024*0.45)))')
            NODE_OPTIONS="--max-old-space-size=${HEAP_MB}" \
              NEXT_IGNORE_BUILD_ERRORS=true \
              turbo run build --filter=web... --concurrency=1

            mkdir -p "${target.dir}/opt/prisma"
            npm install -g --no-package-lock --no-save \
              --prefix "${target.dir}/opt/prisma" \
              prisma@6.19.3

            # Runtime image has no /usr/bin/env.
            find "${target.dir}/opt/prisma" -type f \
              \( -name '*.js' -o -name 'prisma' \) \
              -exec sed -i '1s|^#!/usr/bin/env node$|#!/usr/local/bin/node|' {} +

            mkdir -p "${target.dir}/app/web/.next" \
              "${target.dir}/app/packages/shared/scripts"

            cp -a ./web/.next/standalone/. "${target.dir}/app/"
            cp -a ./web/.next/static "${target.dir}/app/web/.next/static"
            cp -a ./web/public "${target.dir}/app/web/public"

            cp -a ./packages/shared/prisma "${target.dir}/app/packages/shared/prisma"

            # entrypoint runs up.sh as `sh up.sh` (shebang bypassed) under
            # runtime dash; POSIX-ify before staging.
            if [ -f ./packages/shared/clickhouse/scripts/up.sh ]; then
              sed -i -E \
                -e 's| && source | \&\& . |g' \
                -e 's|&> /dev/null|>/dev/null 2>\&1|g' \
                -e 's|" == "|" = "|g' \
                ./packages/shared/clickhouse/scripts/up.sh
            fi
            cp -a ./packages/shared/clickhouse "${target.dir}/app/packages/shared/clickhouse"

            cp ./web/next.config.mjs "${target.dir}/app/next.config.mjs"
            cp ./web/package.json "${target.dir}/app/package.json"

            cp ./web/entrypoint.sh "${target.dir}/app/web/entrypoint.sh"
            chmod +x "${target.dir}/app/web/entrypoint.sh"

            # Drop v3's bash+sed credential strip — runtime is dash, no sed.
            # False positives on partially-encoded passwords are acceptable
            # (advisory hint, prints only on migration fail).
            sed -i -E \
              -e 's|_stripped=\$\(printf.*"\$_val".*sed.*\)|_stripped="$_val"|' \
              -e 's|_stripped=\$\(printf.*"\$_pass".*sed.*\)|_stripped="$_pass"|' \
              "${target.dir}/app/web/entrypoint.sh"

            cp ./packages/shared/scripts/cleanup.sql \
              "${target.dir}/app/packages/shared/scripts/cleanup.sql"
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
        - source: ${target.dir}/opt/prisma
          target: /opt/prisma
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/langfuse
          target: /opt/docker/sbom/langfuse
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/node:24.15.0-debian13@sha256:12dd3a0b044f9601e987ecfd9fa728118375bcb418435d8780e1a95f8fb01317
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  HOSTNAME: 0.0.0.0
  NEXT_MANUAL_SIG_HANDLE: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_ENV: production
  PATH: /opt/prisma/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PORT: "3000"
paths:
  - type: directory
    path: /app
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: symlink
    path: /usr/local/bin/entrypoint.sh
    uid: 0
    gid: 0
    source: /app/web/entrypoint.sh
annotations:
  org.opencontainers.image.description: A minimal Langfuse image
  org.opencontainers.image.licenses: MIT
entrypoint:
  - dumb-init
  - --
  - /usr/local/bin/entrypoint.sh
cmd:
  - node
  - ./web/server.js
  - --keepAliveTimeout
  - "110000"
ports:
  - 3000/tcp
