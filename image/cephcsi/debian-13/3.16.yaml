  - "3.16"
  - 3.16.2
  - 3-debian13
  - 3.16-debian13
  - 3.16.2-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-01-14"
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  CEPH_REFERENCE: dhi/ceph:20.3.0-debian13@sha256:82b7da3de5c515f16d0a141faa37e39ca7eaa51715c71cb94c8b66995f7449de
  COMMIT_SHA: f26e7657f3580126488010bc946ea9dea2a7e89b
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "3.16"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.16.2
  VERSION: 3.16.2
contents:
  packages:
    - '!base-files'
    - cryptsetup-bin
    - e2fsprogs
    - kmod
    - libnl-genl-3-200
    - mount
    - nfs-common
    - util-linux
    - xfsprogs
  builds:
    - name: cephcsi
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/ceph/ceph-csi
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - gcc
          - libcephfs-dev
          - librados-dev
          - librbd-dev
          - make
          - pkg-config
        files:
          - url: git+https://github.com/ceph/ceph-csi.git#v3.16.2
            checksum: f26e7657f3580126488010bc946ea9dea2a7e89b
            path: /go/src/github.com/ceph/ceph-csi
            spdx:
              name: ceph-csi
              version: 3.16.2
              packages:
                - name: ceph-csi
                  purl: pkg:golang/github.com/ceph/ceph-csi@3.16.2
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: Update go dependencies (3.16 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/ceph/ceph-csi
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: sync vendor after dependency bump
          work-dir: /go/src/github.com/ceph/ceph-csi
          runs: |
            set -eux -o pipefail

            go mod vendor
        - name: run targeted go tests
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -mod=vendor -buildvcs=false
          runs: |
            set -eux -o pipefail

            # Match upstream's current Makefile, which keeps ceph_preview enabled
            # because ceph-csi still builds/tests against go-ceph preview APIs.
            go test -tags=ceph_preview ./cmd/...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/ceph/ceph-csi
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo_enabled: 1
            ldflags:
              - -X github.com/ceph/ceph-csi/internal/util.GitCommit=f26e7657f3580126488010bc946ea9dea2a7e89b
              - -X github.com/ceph/ceph-csi/internal/util.DriverVersion=3.16.2
            output: ${target.dir}/usr/local/bin/cephcsi
            packages: ./cmd
            tags: ceph_preview
      outputs:
        - source: ${target.dir}/usr/local/bin/cephcsi
          target: /usr/local/bin/cephcsi
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/ceph-csi
          target: /opt/docker/sbom/cephcsi
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/ceph:20.3.0-debian13@sha256:82b7da3de5c515f16d0a141faa37e39ca7eaa51715c71cb94c8b66995f7449de
