# syntax=dhi.io/build:2-debian13

name: pgvector 0.8.x for PostgreSQL 14.x (dev)
image: dhi.io/pgvector
variant: dev
tags:
  - pg14-dev
  - 0.8-pg14-dev
  - 0.8.2-pg14-dev
  - pg14-debian13-dev
  - 0.8-pg14-debian13-dev
  - 0.8.2-pg14-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2021-09-30"
  end-of-life: "2026-11-12"
vars:
  COMMIT_SHA: cab9da72c04353f143bb06b42ab70a403daac64a
  PG_MAJOR_VERSION: "14"
  PG_VERSION: "14.23"
  PGDATA: /var/lib/postgresql/14/data
  POSTGRES_BUILD_REFERENCE: dhi/postgres:14.23-debian13-dev@sha256:a709d0b23ab3aedb0bc488effd784e2ace7b606d2a9cb98d4f7c9558204d2e16
  POSTGRES_RUNTIME_REFERENCE: dhi/postgres:14.23-debian13@sha256:f4b2029466a4f290462e0f8c2f115e1501e278134a1d9ca34ebf1c8277d50995
  SEMVER_MAJOR_MINOR_VERSION: "0.8"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.8.2
  VERSION: 0.8.2
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - less
    - libc-bin
    - libgssapi-krb5-2
    - libicu76
    - libldap2
    - liblz4-1
    - libpam0g
    - libreadline8t64
    - libselinux1
    - libssl3t64
    - libxml2
    - libxslt1.1
    - libzstd1
    - llvm
    - locales
    - mawk
    - perl-base
    - sed
    - tzdata
    - util-linux
    - zlib1g
  builds:
    - name: pgvector
      uses: dhi.io/postgres:14.23-debian13-dev@sha256:a709d0b23ab3aedb0bc488effd784e2ace7b606d2a9cb98d4f7c9558204d2e16
      work-dir: ${source.dir}/pgvector
      contents:
        packages:
          - bash
          - build-essential
          - clang
          - coreutils
          - findutils
          - llvm-dev
          - sed
        files:
          - url: git+https://github.com/pgvector/pgvector.git#v0.8.2
            checksum: cab9da72c04353f143bb06b42ab70a403daac64a
            path: ${source.dir}/pgvector
            spdx:
              name: pgvector
              version: 0.8.2
              packages:
                - name: pgvector
                  purl: pkg:github/pgvector/pgvector@0.8.2
                  license: PostgreSQL
            uid: 0
            gid: 0
      pipeline:
        - name: build and install
          runs: |
            set -eux -o pipefail

            export PG_CONFIG=/opt/postgresql/14/bin/pg_config

            # OPTFLAGS="" disables -march=native so the resulting vector.so is
            # portable across the build host's CPU family. Upstream's
            # pgvector/pgvector image does the same.
            make OPTFLAGS="" -j"$(nproc)"
            make install DESTDIR='${target.dir}/install'
      outputs:
        - source: ${target.dir}/install/opt/postgresql/14
          target: /opt/postgresql/14
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/pgvector
          target: /opt/docker/sbom/pgvector
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/postgres:14.23-debian13@sha256:f4b2029466a4f290462e0f8c2f115e1501e278134a1d9ca34ebf1c8277d50995
      excludes:
        - etc/os-release
        - var/lib/dpkg/status
      uid: 0
      gid: 0
    - name: dhi.io/postgres:14.23-debian13-dev@sha256:a709d0b23ab3aedb0bc488effd784e2ace7b606d2a9cb98d4f7c9558204d2e16
      excludes:
        - etc/os-release
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: postgres
      uid: 70
      gid: 70
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: postgres
      gid: 70
      members:
        - postgres
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
stop-signal: SIGINT
environment:
  DEBIAN_FRONTEND: noninteractive
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  PATH: /opt/postgresql/14/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PG_MAJOR: "14"
  PGDATA: /var/lib/postgresql/14/data
paths:
  - type: directory
    path: /var/lib/postgresql/14/data
    uid: 70
    gid: 70
    mode: "0700"
annotations:
  org.opencontainers.image.description: A minimal pgvector image
  org.opencontainers.image.licenses: PostgreSQL
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
ports:
  - 5432/tcp
