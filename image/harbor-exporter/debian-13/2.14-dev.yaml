# syntax=dhi.io/build:2-debian13

name: Harbor Exporter 2.14.x (dev)
image: dhi.io/harbor-exporter
variant: dev
tags:
  - 2.14-dev
  - 2.14.4-dev
  - 2.14-debian13-dev
  - 2.14.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-08"
vars:
  COMMIT_SHA: 79a297f760eb9596c8693727b88c3c568f9c6302
  GO_SWAGGER_CHECKSUM: '#{ target.arch == "amd64" ? "sha256:94d63ada4aad825d75ead80c8dba048dbd4c4a013376df9f5b848a41899e9b04" : "sha256:b954b0b36144f2cbe65ab1477dd90d7739b5361b2b9004f73d855753c12c6594" }'
  GO_SWAGGER_VERSION: v0.31.0
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fdab09a65b42748429d758c1b1d4b2b3e70432aba826445e855669aa815e90a6
  SEMVER_MAJOR_MINOR_VERSION: "2.14"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.14.4
  VERSION: 2.14.4
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: harbor-exporter
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fdab09a65b42748429d758c1b1d4b2b3e70432aba826445e855669aa815e90a6
      work-dir: /go/src/github.com/goharbor/harbor
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.14.4
            checksum: 79a297f760eb9596c8693727b88c3c568f9c6302
            path: /go/src/github.com/goharbor/harbor
            spdx:
              name: harbor-exporter
              version: 2.14.4
              packages:
                - name: harbor-exporter
                  purl: pkg:golang/github.com/goharbor/harbor@2.14.4
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/go-swagger/go-swagger/releases/download/v0.31.0/swagger_linux_${target.arch}
            checksum: ${GO_SWAGGER_CHECKSUM}
            path: /usr/local/bin/swagger
            spdx:
              name: go-swagger
              version: v0.31.0
              packages:
                - name: go-swagger
                  purl: pkg:golang/github.com/go-swagger/go-swagger@v0.31.0
                  license: Apache-2.0
            uid: 0
            gid: 0
            mode: "755"
      pipeline:
        - name: generate-swagger
          runs: |
            set -eux -o pipefail

            /usr/local/bin/swagger generate server \
              --template-dir=tools/swagger/templates \
              --exclude-main \
              --additional-initialism=CVE \
              --additional-initialism=GC \
              --additional-initialism=OIDC \
              -f api/v2.0/swagger.yaml \
              -A harbor \
              --target src/server/v2.0
        - name: patch vulnerable go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/goharbor/harbor/src
          with:
            deps:
              - github.com/gorilla/csrf@v1.7.3
              - helm.sh/helm/v3@v3.20.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/goharbor/harbor/src/cmd/exporter
          with:
            ldflags:
              - -X github.com/goharbor/harbor/src/pkg/version.ReleaseVersion=2.14.4
              - -X github.com/goharbor/harbor/src/pkg/version.GitCommit=79a297f760eb9596c8693727b88c3c568f9c6302
            output: ${target.dir}/usr/local/bin/harbor-exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/harbor-exporter
          target: /usr/local/bin/harbor-exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/harbor-exporter
          target: /opt/docker/sbom/harbor-exporter
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
annotations:
  org.opencontainers.image.description: A minimal Harbor Exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/harbor-exporter
ports:
  - 9090/tcp
