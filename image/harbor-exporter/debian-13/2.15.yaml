# syntax=dhi.io/build:2-debian13

name: Harbor Exporter 2.15.x
image: dhi.io/harbor-exporter
variant: runtime
tags:
  - "2"
  - "2.15"
  - 2.15.1
  - 2-debian13
  - 2.15-debian13
  - 2.15.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-20"
vars:
  COMMIT_SHA: 335c05f2b9507b4c7116fe69b84e31ef9f4b91dd
  GO_SWAGGER_CHECKSUM: '#{ target.arch == "amd64" ? "sha256:c668a4a1f96f65fdc166fef3f89adebe15b82f34e9cdeb71bc771436f6b94b07" : "sha256:d21f57d56f3f6dcae0e801b0c47067549343b35a5234e76bfc608cae411598aa" }'
  GO_SWAGGER_VERSION: v0.33.1
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fdab09a65b42748429d758c1b1d4b2b3e70432aba826445e855669aa815e90a6
  SEMVER_MAJOR_MINOR_VERSION: "2.15"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.15.1
  VERSION: 2.15.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: harbor-exporter
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fdab09a65b42748429d758c1b1d4b2b3e70432aba826445e855669aa815e90a6
      work-dir: /go/src/github.com/goharbor/harbor
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.15.1
            checksum: 335c05f2b9507b4c7116fe69b84e31ef9f4b91dd
            path: /go/src/github.com/goharbor/harbor
            spdx:
              name: harbor-exporter
              version: 2.15.1
              packages:
                - name: harbor-exporter
                  purl: pkg:golang/github.com/goharbor/harbor@2.15.1
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/go-swagger/go-swagger/releases/download/v0.33.1/swagger_linux_${target.arch}
            checksum: ${GO_SWAGGER_CHECKSUM}
            path: /usr/local/bin/swagger
            spdx:
              name: go-swagger
              version: v0.33.1
              packages:
                - name: go-swagger
                  purl: pkg:golang/github.com/go-swagger/go-swagger@v0.33.1
                  license: Apache-2.0
            uid: 0
            gid: 0
            mode: "755"
      pipeline:
        - name: generate-swagger
          runs: |
            set -eux -o pipefail

            /usr/local/bin/swagger generate server \
              --template-dir=tools/swagger/templates \
              --exclude-main \
              --additional-initialism=CVE \
              --additional-initialism=GC \
              --additional-initialism=OIDC \
              -f api/v2.0/swagger.yaml \
              -A harbor \
              --target src/server/v2.0
        - name: patch vulnerable go dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/goharbor/harbor/src
          with:
            deps:
              - github.com/gorilla/csrf@v1.7.3
              - helm.sh/helm/v3@v3.20.2
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/Azure/go-ntlmssp@v0.1.1
            download: true
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/goharbor/harbor/src/cmd/exporter
          with:
            ldflags:
              - -X github.com/goharbor/harbor/src/pkg/version.ReleaseVersion=2.15.1
              - -X github.com/goharbor/harbor/src/pkg/version.GitCommit=335c05f2b9507b4c7116fe69b84e31ef9f4b91dd
            output: ${target.dir}/usr/local/bin/harbor-exporter
      outputs:
        - source: ${target.dir}/usr/local/bin/harbor-exporter
          target: /usr/local/bin/harbor-exporter
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/harbor-exporter
          target: /opt/docker/sbom/harbor-exporter
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Harbor Exporter image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/harbor-exporter
ports:
  - 9090/tcp
