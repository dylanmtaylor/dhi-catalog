name: Kyverno Policy Reporter UI 2.x (dev)
image: dhi.io/kyverno-policy-reporter-ui
variant: dev
tags:
  - 2-dev
  - 2.5-dev
  - 2.5.2-dev
  - 2-debian13-dev
  - 2.5-debian13-dev
  - 2.5.2-debian13-dev
platforms:
