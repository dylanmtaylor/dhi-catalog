contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: kyverno-policy-reporter-ui
      uses: dhi.io/bun:1.2.23-debian13-dev@sha256:2a5df837b30bf3435a8790f4bba88a07dd09ecd7fa80e7d9c5e58e0102e31ccc
      environment:
        GOPATH: /usr/local/go/bin
      contents:
        files:
          - url: git+https://github.com/kyverno/policy-reporter-ui.git#v2.5.2
            checksum: ee15078f75f86f4ac9b1cf38bea4742e6453d1c6
            path: /go/src/github.com/kyverno/policy-reporter-ui
            spdx:
              name: kyverno-policy-reporter-ui
              version: 2.5.2
              packages:
                - name: kyverno-policy-reporter-ui
                  purl: pkg:golang/github.com/kyverno/policy-reporter-ui@2.5.2
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
            includes:
              - usr/local/go
            uid: 0
            gid: 0
      pipeline:
        - name: build-frontend
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "2.5.2" \> "2.5.2" ]; then
              echo "Pinned bun overrides may be removable now that upstream has caught up; review each against frontend/package.json before proceeding"
              exit 1
            fi

            bun pm pkg set overrides.node-forge="1.4.0"           # CVE-2026-33895, CVE-2026-33894, CVE-2026-33891, CVE-2026-33896
            bun pm pkg set overrides.h3="1.15.9"                  # CVE-2026-23527, CVE-2026-33128, GHSA-wr4h-v87w-p3r7, GHSA-72gr-qfp7-vwhw, GHSA-4hxc-9384-m385
            bun pm pkg set overrides.devalue="5.8.1"              # CVE-2026-22774, CVE-2026-22775, CVE-2026-30226, CVE-2026-42570, GHSA-mwv9-gp5h-frr4
            bun pm pkg set overrides.tar="7.5.11"                 # CVE-2026-23745, CVE-2026-23950, CVE-2026-24842, CVE-2026-26960, GHSA-qffp-2rhf-9h96, CVE-2026-31802
            bun pm pkg set overrides.minimatch="10.2.3"           # CVE-2026-26996, CVE-2026-27904, CVE-2026-27903
            bun pm pkg set overrides.lodash="4.18.0"              # CVE-2025-13465, CVE-2026-4800, CVE-2026-2950
            bun pm pkg set overrides.vite="7.3.2"                 # GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9
            bun pm pkg set overrides.defu="6.1.5"                 # CVE-2026-35209
            bun pm pkg set overrides.rollup="4.59.0"              # CVE-2026-27606
            bun pm pkg set overrides.serialize-javascript="7.0.5" # GHSA-5c6j-r48x-rmvq, CVE-2026-34043
            bun pm pkg set overrides.svgo="4.0.1"                 # CVE-2026-29074
            bun pm pkg set overrides.simple-git="3.36.0"          # CVE-2026-28292, CVE-2026-6951
            bun pm pkg set overrides.unhead="2.1.13"              # CVE-2026-31860, CVE-2026-31873, CVE-2026-39315
            bun pm pkg set overrides.picomatch="4.0.4"            # CVE-2026-33671, CVE-2026-33672
            bun pm pkg set overrides.srvx="0.11.13"               # CVE-2026-33732
            bun pm pkg set overrides.yaml="2.8.3"                 # CVE-2026-33532
            bun pm pkg set overrides.brace-expansion="5.0.5"      # CVE-2026-33750
            bun pm pkg set overrides.axios="1.15.2"               # CVE-2025-62718, CVE-2026-40175, CVE-2026-42033, CVE-2026-42034, CVE-2026-42035, CVE-2026-42036, CVE-2026-42037, CVE-2026-42038, CVE-2026-42039, CVE-2026-42040, CVE-2026-42041, CVE-2026-42042, CVE-2026-42043, CVE-2026-42044, CVE-2026-42264
            bun pm pkg set overrides.postcss="8.5.10"             # CVE-2026-41305
            bun pm pkg set overrides.follow-redirects="1.16.0"    # GHSA-r4q5-vmmm-2653
            bun pm pkg set overrides.nitropack="2.13.4"           # CVE-2026-44372, CVE-2026-44373

            bun install
            bun run generate

            mkdir ${target.dir}/kodata
            cp -r dist ${target.dir}/kodata/ui
        - name: prepare ui for sbom
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/frontend
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules

            bun install --production

            # Remove esbuild from node modules to avoid phantom golang vulnerabilities in sbom
            rm -rf node_modules/@esbuild
            find node_modules -type d -name esbuild -exec rm -rf {} + 2> /dev/null || true
        - name: ui-sbom
          uses: sbom@v1
          with:
            prefix: kyverno-policy-reporter-ui-frontend
            source: /go/src/github.com/kyverno/policy-reporter-ui/frontend
        - name: copy-templates
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          runs: |
            set -eux -o pipefail

            cp -r templates ${target.dir}/kodata/templates
        - name: patch backend dependencies
          uses: go/bump@v2
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          with:
            deps:
              - golang.org/x/net@v0.53.0
            download: true
            tidy: true
        - name: build-backend
          uses: go/build@v1
          work-dir: /go/src/github.com/kyverno/policy-reporter-ui/backend
          privileged: true
          with:
            output: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
      outputs:
        - source: ${target.dir}/usr/local/bin/kyverno-policy-reporter-ui
          target: /usr/local/bin/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/kodata
          target: /kodata
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui
          target: /opt/docker/sbom/kyverno-policy-reporter-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          target: /opt/docker/sbom/kyverno-policy-reporter-ui-frontend
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
