  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  BUN_REFERENCE: dhi/bun:1.2.23-debian13-dev@sha256:2a5df837b30bf3435a8790f4bba88a07dd09ecd7fa80e7d9c5e58e0102e31ccc
  COMMIT_SHA: ee15078f75f86f4ac9b1cf38bea4742e6453d1c6
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "2.5"
  SEMVER_MAJOR_VERSION: "2"
