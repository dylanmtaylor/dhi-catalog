# syntax=dhi.io/build:2-debian13

name: Argo executor 3.7.x
image: dhi.io/argoexec
variant: runtime
tags:
  - "3"
  - "3.7"
  - 3.7.14
  - 3-debian13
  - 3.7-debian13
  - 3.7.14-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: ca37b537cd34d18029146a755bf42a9b2364c49b
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  MODULE_MAJOR_VERSION: v3
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.14
  VERSION: 3.7.14
contents:
  packages:
    - '!base-files'
  builds:
    - name: argoexec
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      contents:
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v3.7.14
            checksum: ca37b537cd34d18029146a755bf42a9b2364c49b
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argoexec
              version: 3.7.14
              packages:
                - name: argoexec
                  purl: pkg:golang/github.com/argoproj/argo-workflows@3.7.14
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.1
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            download: true
        - name: test
          work-dir: /go/src/github.com/argoproj/argo-workflows
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/argoproj/argo-workflows
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v3.version=3.7.14
              - -X github.com/argoproj/argo-workflows/v3.gitCommit=ca37b537cd34d18029146a755bf42a9b2364c49b
            output: ${target.dir}/usr/local/bin/argoexec
            packages: ./cmd/argoexec
      outputs:
        - source: ${target.dir}/usr/local/bin/argoexec
          target: /usr/local/bin/argoexec
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argoexec
          target: /opt/docker/sbom/argoexec
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: argoexec
  users:
    - name: argoexec
      uid: 8737
      gid: 8737
  groups:
    - name: argoexec
      gid: 8737
      members:
        - argoexec
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Argo executor image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - argoexec
