# syntax=dhi.io/build:2-alpine3.22

name: Ruby 4.0.x (dev)
image: dhi.io/ruby
variant: dev
tags:
  - 4-alpine3.22-dev
  - 4.0-alpine3.22-dev
  - 4.0.5-alpine3.22-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  ERB_COMMIT_SHA: 6a2e4a76d352127135359e3420d5f42b767a0600
  GEM_HOME: /usr/local/bundle
  JSON_COMMIT_SHA: 54f8a878aebee090476a53c851c943128894be62
  NET_IMAP_0_4_GEM_SHA256: 88289db8fd3f08aa8c661137810118e58fe309829e815e2ea8f3650662a6501b
  NET_IMAP_0_5_GEM_SHA256: 1590ca018d65d4165b7324a3f046dd16fd9dd5e72deba4acf494c1becdb55a04
  NET_IMAP_0_6_GEM_SHA256: 9a5598c67a3022c284d98430ef1d4948e7dbdb62596f61081ea8ca933270a02b
  SEMVER_MAJOR_MINOR_VERSION: "4.0"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.0.5
  SHA256: 5dc5521ea54c726e6cc10b1b5a0f4004b27b482e61c04c99aed79315e30895e5
  VERSION: 4.0.5
contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
  packages:
    - alpine-baselayout-data
    - apk-tools
    - build-base
    - busybox
    - ca-certificates-bundle
    - git
    - gmp
    - libcrypto3
    - make
    - openssl
    - tzdata
    - yaml
    - yaml-dev
    - zlib
  builds:
    - name: ruby
      contents:
        repositories:
          - https://dl-cdn.alpinelinux.org/alpine/v3.22/main
          - https://dl-cdn.alpinelinux.org/alpine/v3.22/community
        packages:
          - busybox
          - autoconf
          - bzip2
          - bzip2-dev
          - ca-certificates
          - coreutils
          - dpkg-dev
          - dpkg
          - g++
          - gcc
          - gdbm-dev
          - glib-dev
          - gmp-dev
          - libc-dev
          - libffi-dev
          - libxml2-dev
          - libxslt-dev
          - linux-headers
          - make
          - ncurses-dev
          - openssl
          - openssl-dev
          - patch
          - procps
          - yaml-dev
          - zlib-dev
          - ruby
          - tar
          - xz
          - yaml-dev
          - zlib-dev
          - musl-utils
        files:
          - url: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.xz
            checksum: sha256:5dc5521ea54c726e6cc10b1b5a0f4004b27b482e61c04c99aed79315e30895e5
            path: ${source.dir}/ruby.tar.xz
            spdx:
              name: ruby
              version: 4.0.5
              packages:
                - name: ruby
                  purl: pkg:dhi/ruby@4.0.5
                  license: BSD-2-Clause
            uid: 0
            gid: 0
          - url: git+https://github.com/ruby/json.git#v2.19.2
            checksum: 54f8a878aebee090476a53c851c943128894be62
            path: ${source.dir}/json
            uid: 0
            gid: 0
          - url: https://rubygems.org/downloads/net-imap-0.4.24.gem
            checksum: sha256:88289db8fd3f08aa8c661137810118e58fe309829e815e2ea8f3650662a6501b
            path: ${source.dir}/net-imap-0.4.24.gem
            uid: 0
            gid: 0
          - url: https://rubygems.org/downloads/net-imap-0.5.14.gem
            checksum: sha256:1590ca018d65d4165b7324a3f046dd16fd9dd5e72deba4acf494c1becdb55a04
            path: ${source.dir}/net-imap-0.5.14.gem
            uid: 0
            gid: 0
          - url: https://rubygems.org/downloads/net-imap-0.6.4.gem
            checksum: sha256:9a5598c67a3022c284d98430ef1d4948e7dbdb62596f61081ea8ca933270a02b
            path: ${source.dir}/net-imap-0.6.4.gem
            uid: 0
            gid: 0
          - url: git+https://github.com/ruby/erb.git#v4.0.4.1
            checksum: 6a2e4a76d352127135359e3420d5f42b767a0600
            path: ${source.dir}/erb
            uid: 0
            gid: 0
      pipeline:
        - name: unpack
          runs: |
            set -eux -o pipefail

            mkdir -p /usr/src/ruby
            tar -xaf ruby.tar.xz -C /usr/src/ruby --strip-components=1
        - name: Upgrade json default gem (CVE-2026-33210)
          runs: |
            set -eux -o pipefail

            # json is a Ruby default gem in 4.0. Docker Scout reports the version
            # from the default gemspec installed as part of Ruby itself, not from
            # a separately overlaid gem install. Because of that, we need to
            # update Ruby's vendored ext/json sources before make install,
            # following Ruby's own default-gem update pattern.
            #
            # Do not copy this approach to ordinary gems. For non-default gems,
            # keep using the simpler gem install/gem uninstall remediation style
            # already used elsewhere in this image.
            rm -rf /usr/src/ruby/test/json
            cp -a "${source.dir}/json/test/json" /usr/src/ruby/test/json

            # Remove only the upstream-managed json sources here. Ruby's
            # ext/json wrapper/build files remain in place because the standalone
            # ruby/json repository does not mirror Ruby's top-level ext/json
            # layout exactly.
            rm -rf /usr/src/ruby/ext/json/fbuffer
            rm -rf /usr/src/ruby/ext/json/generator
            rm -rf /usr/src/ruby/ext/json/parser
            rm -rf /usr/src/ruby/ext/json/simd
            rm -rf /usr/src/ruby/ext/json/vendor
            rm -rf /usr/src/ruby/ext/json/lib
            rm -f /usr/src/ruby/ext/json/json.gemspec
            rm -f /usr/src/ruby/ext/json/json.h

            cp -a "${source.dir}/json/ext/json/ext/." /usr/src/ruby/ext/json/
            cp -a "${source.dir}/json/lib" /usr/src/ruby/ext/json/lib
            cp -a "${source.dir}/json/json.gemspec" /usr/src/ruby/ext/json/json.gemspec

            rm -rf /usr/src/ruby/ext/json/lib/json/truffle_ruby
            rm -rf /usr/src/ruby/ext/json/lib/json/pure
            rm -f /usr/src/ruby/ext/json/lib/json/pure.rb

            grep -q "VERSION = '2.19.2'" /usr/src/ruby/ext/json/lib/json/version.rb
        - name: Upgrade erb default gem (CVE-2026-41316)
          runs: |
            set -eux -o pipefail

            # erb is a Ruby default gem with a small C extension. Replace Ruby's
            # vendored sources before make install so the installed default
            # gemspec reflects the patched version.
            #
            # The version check below makes this a no-op once Ruby's vendored
            # erb is at the target (or higher) and prevents downgrades.
            target=4.0.4.1
            current=$(sed -nE "s/^[[:space:]]*VERSION = '([^']+)'.*/\1/p" /usr/src/ruby/lib/erb/version.rb | head -1)
            if [ -z "$current" ] || ! dpkg --compare-versions "$current" lt "$target"; then
              echo "erb ${current:-(missing)} already >= ${target}, skipping"
              exit 0
            fi
            echo "Patching erb ${current} -> ${target}"

            rm -rf /usr/src/ruby/lib/erb /usr/src/ruby/lib/erb.rb /usr/src/ruby/lib/erb.gemspec
            rm -rf /usr/src/ruby/libexec/erb
            rm -rf /usr/src/ruby/ext/erb/escape

            cp -a "${source.dir}/erb/lib/erb.rb" /usr/src/ruby/lib/erb.rb
            cp -a "${source.dir}/erb/lib/erb" /usr/src/ruby/lib/erb
            cp -a "${source.dir}/erb/erb.gemspec" /usr/src/ruby/lib/erb.gemspec
            cp -a "${source.dir}/erb/libexec/erb" /usr/src/ruby/libexec/erb
            cp -a "${source.dir}/erb/ext/erb/escape" /usr/src/ruby/ext/erb/escape
            chmod +x /usr/src/ruby/libexec/erb

            grep -q "VERSION = '${target}'" /usr/src/ruby/lib/erb/version.rb
        - name: install
          runs: |
            set -eux -o pipefail

            # skip installing gem documentation with `gem install`/`gem update`
            mkdir -p /usr/local/etc
            echo 'gem: --no-document' >> /usr/local/etc/gemrc
            cd /usr/src/ruby

            autoconf

            gnuArch="$(dpkg-architecture --query DEB_BUILD_GNU_TYPE)"
            ./configure \
              --build="$gnuArch" \
              --disable-install-doc \
              --enable-shared

            ncpus=$(getconf _NPROCESSORS_ONLN)
            ncpus=$((ncpus > 6 ? 6 : ncpus))

            make -j${ncpus}
            # make -j${ncpus} check test-bundle
            make install

            # ensure ruby binary is installed in /usr/local/bin
            [ "$(command -v ruby)" = '/usr/local/bin/ruby' ]

            ruby --version
            ruby -e 'puts "hello world"'
        - name: Upgrade net-imap bundled gem (CVE-2026-42246, CVE-2026-42256, CVE-2026-42257, CVE-2026-42258, CVE-2026-42245)
          runs: |
            set -eux -o pipefail

            # Bumping across the net-imap 0.X line is breaking (config defaults,
            # SequenceSet#size semantics, etc.), so pick the patched version
            # within the same 0.X line that Ruby ships by default.
            current=$(gem list -e net-imap | awk '$1=="net-imap" {gsub(/[(),]/," "); print $2; exit}')
            case "$current" in
              0.6.*) target=0.6.4 ;;
              0.5.*) target=0.5.14 ;;
              0.4.*) target=0.4.24 ;;
              *)
                echo "net-imap ${current:-(missing)} not on a known 0.X line; skipping"
                exit 0
                ;;
            esac

            if ! dpkg --compare-versions "$current" lt "$target"; then
              echo "net-imap ${current} already >= ${target}, skipping"
              exit 0
            fi
            echo "Patching net-imap ${current} -> ${target}"

            gem uninstall net-imap --all --executables --force --ignore-dependencies || true
            gem install --local "${source.dir}/net-imap-${target}.gem" --no-document
            gem list -e net-imap
        - name: test-dev
          runs: |
            set -eux -o pipefail

            bundle --version
            bundler --version
            erb --version
            gem --version
            irb --version
            racc --version
            rake --version
            rbs --version
            rdbg --version
            rdoc --version
            ri --version
            typeprof --version

            # syntax_suggest is broken in ruby 3.2+
            # shellcheck disable=SC1083
            if [[ "$(ruby -v | awk '{print $2}')" != "3.2"* ]]; then
              syntax_suggest --version
            fi
      paths:
        - type: directory
          path: /tmp
          uid: 0
          gid: 0
      outputs:
        - source: /usr/local
          target: /usr/local
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.22"
  pretty-name: Docker Hardened Images/Alpine Linux v3.22
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  BUNDLE_APP_CONFIG: /usr/local/bundle
  BUNDLE_SILENCE_ROOT_WARNING: "true"
  DEBIAN_FRONTEND: noninteractive
  GEM_HOME: /usr/local/bundle
  LD_LIBRARY_PATH: /usr/local/lib:${LD_LIBRARY_PATH}
