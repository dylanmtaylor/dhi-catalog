  builds:
    - name: argocd-image-updater
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/argoproj-labs/argocd-image-updater
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - binutils
          - binutils-gold
        files:
          - url: git+https://github.com/argoproj-labs/argocd-image-updater.git#v1.2.0
            checksum: d611926ae8558abe5aa2a93f34cc51e9e1c398ac
            path: /go/src/github.com/argoproj-labs/argocd-image-updater
            spdx:
              name: argocd-image-updater
              version: 1.2.0
              packages:
                - name: argocd-image-updater
                  purl: pkg:golang/github.com/argoproj-labs/argocd-image-updater@1.2.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/argoproj/argo-cd/v3@v3.3.9
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - github.com/distribution/distribution/v3@v3.0.0-20230722181636-7b502560cad4
            download: true
            tidy: true
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Tests are using short keys which are not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi
            # Run unit tests, skip e2e tests and packages that require external access
            go test $(go list ./... | egrep -v '(test/|mocks/|ext/|e2e/)') -short -count=1 -v
        - name: build argocd-image-updater
          uses: go/build@v1
          with:
            ldflags:
              - -extldflags "-static"
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.version=1.2.0
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.gitCommit=d611926ae8558abe5aa2a93f34cc51e9e1c398ac
              - -X github.com/argoproj-labs/argocd-image-updater/pkg/version.buildDate=${SOURCE_DATE_EPOCH}
            output: ${target.dir}/usr/local/bin/argocd-image-updater
            packages: ./cmd
        - name: create git-ask-pass script
          runs: |
            set -eux -o pipefail

            mkdir -p ${target.dir}/usr/local/bin
            cp hack/git-ask-pass.sh ${target.dir}/usr/local/bin/git-ask-pass.sh
      outputs:
        - source: ${target.dir}/usr/local/bin/argocd-image-updater
          target: /usr/local/bin/argocd-image-updater
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/git-ask-pass.sh
          target: /usr/local/bin/git-ask-pass.sh
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocd-image-updater
          target: /opt/docker/sbom/argocd-image-updater
          uid: 0
          gid: 0
