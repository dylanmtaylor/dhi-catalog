# syntax=dhi.io/build:2-debian13

name: Terraform 1.15.x (dev)
image: dhi.io/terraform
variant: dev
tags:
  - 1-dev
  - 1.15-dev
  - 1.15.3-dev
  - 1-debian13-dev
  - 1.15-debian13-dev
  - 1.15.3-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-29"
vars:
  COMMIT_SHA: 94363314099a4b374a521f19fa43aa4f09cc5da9
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.15"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.15.3
  VERSION: 1.15.3
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - git
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: terraform
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/hashicorp/terraform
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/hashicorp/terraform.git#v1.15.3
            checksum: 94363314099a4b374a521f19fa43aa4f09cc5da9
            path: /go/src/github.com/hashicorp/terraform
            spdx:
              name: terraform
              version: 1.15.3
              packages:
                - name: terraform
                  purl: pkg:golang/github.com/hashicorp/terraform@v1.15.3
                  license: BUSL-1.1
            uid: 65532
            gid: 65532
      pipeline:
        - name: update go dependencies (1.15 only)
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/net@v0.53.0
            download: true
            replaces:
              - go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc=go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc@v0.60.0
            tidy: true
        - runs: |
            set -eux -o pipefail

            # Module cache is root-owned after go/bump; test and build run as nonroot.
            mkdir -p /go/pkg/mod/cache/download
            chown -R nonroot:nonroot /go/pkg/mod
        - name: run tests
          run-as: nonroot
          privileged: true
          runs: |
            set -eux -o pipefail

            # v1.13.x: TestTelemetryInTests panics in go-cmp on OTel attribute.Set unexported fields (module skew in upstream go.mod).
            # Default `go test` timeout is 10m; dev-variant builds can exceed it when e2etest runs under contention.
            if [ "1.15" = "1.13" ]; then
              go test -timeout 30m ./... -skip '^TestTelemetryInTests$'
            else
              go test -timeout 30m ./...
            fi
        - runs: |
            set -eux -o pipefail

            # Tests can recreate module paths owned by root under --privileged; restore for go/build.
            mkdir -p /go/pkg/mod/cache/download
            chown -R nonroot:nonroot /go/pkg/mod
        - name: build
          uses: go/build@v1
          run-as: nonroot
          with:
            ldflags:
              - -X github.com/hashicorp/terraform/version.dev=no
            output: ./terraform
      accounts:
        root: true
        run-as: root
        users:
          - name: nonroot
            uid: 65532
            gid: 65532
        groups:
          - name: nonroot
            gid: 65532
            members:
              - nonroot
      outputs:
        - source: /go/src/github.com/hashicorp/terraform/terraform
          target: /usr/local/bin/terraform
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/terraform
          target: /opt/docker/sbom/terraform
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
annotations:
  org.opencontainers.image.description: A minimal Terraform image
  org.opencontainers.image.licenses: BUSL-1.1
entrypoint:
  - /usr/local/bin/terraform
