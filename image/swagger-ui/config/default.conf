server {
    listen       8080;
    listen       [::]:8080;
    server_name  localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 1G;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
