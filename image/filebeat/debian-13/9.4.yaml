    path: /usr/share/filebeat/logs
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /usr/share/filebeat/data
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: symlink
    path: /usr/share/filebeat/filebeat
    uid: 0
    gid: 0
    source: /usr/local/bin/filebeat
