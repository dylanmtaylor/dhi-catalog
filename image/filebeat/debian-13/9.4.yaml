# syntax=dhi.io/build:2-debian13

name: Filebeat 9.4.x
image: dhi.io/filebeat
variant: runtime
tags:
  - "9"
  - "9.4"
  - 9.4.1
  - 9-debian13
  - 9.4-debian13
  - 9.4.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-30"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 471eefbca30a79d543af5106d039bf610a5c3281
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  SEMVER_MAJOR_MINOR_VERSION: "9.4"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.4.1
  VERSION: 9.4.1
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: filebeat
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      contents:
        files:
          - url: git+https://github.com/elastic/beats#v9.4.1
            checksum: 471eefbca30a79d543af5106d039bf610a5c3281
            path: /go/src/github.com/elastic/beats
            spdx:
              name: filebeat
              version: 9.4.1
              packages:
                - name: filebeat
                  purl: pkg:golang/github.com/elastic/beats@9.4.1
                  license: Elastic-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (9.4 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/elastic/beats/
          with:
            deps:
              - github.com/apache/thrift@v0.23.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: build
          work-dir: /go/src/github.com/elastic/beats/x-pack/filebeat
          runs: |
            set -eux -o pipefail

            # Reproducible version metadata
            # https://github.com/elastic/beats/issues/46314#issuecomment-3250659340
            GOLDFLAGS="-X github.com/elastic/beats/v7/libbeat/version.commit=471eefbca30a79d543af5106d039bf610a5c3281
                      -X github.com/elastic/beats/v7/libbeat/version.version=9.4.1
                      -X github.com/elastic/beats/v7/libbeat/version.buildTime=$(date -u -d @${SOURCE_DATE_EPOCH} +'%F-%T')"

            mkdir -p "${target.dir}/usr/share/filebeat"

            CGO_ENABLED=0 go build \
              -buildvcs=false \
              -ldflags "$GOLDFLAGS" \
              -tags "netgo" \
              -o "${target.dir}/usr/local/bin/filebeat" \
              .

            # Merge base and x-pack modules into a single output directory
            BEATS_ROOT=/go/src/github.com/elastic/beats
            mkdir -p "${target.dir}/usr/share/filebeat/modules.d"
            mkdir -p "${target.dir}/usr/share/filebeat/module"

            # Copy modules.d and module directories if they exist and are not empty
            if [ -d "$BEATS_ROOT/filebeat/modules.d" ] && [ -n "$(ls -A "$BEATS_ROOT/filebeat/modules.d" 2> /dev/null)" ]; then
              cp -r "$BEATS_ROOT"/filebeat/modules.d/* "${target.dir}/usr/share/filebeat/modules.d/"
            fi
            if [ -d "$BEATS_ROOT/filebeat/module" ] && [ -n "$(ls -A "$BEATS_ROOT/filebeat/module" 2> /dev/null)" ]; then
              cp -r "$BEATS_ROOT"/filebeat/module/* "${target.dir}/usr/share/filebeat/module/"
            fi
            if [ -d "$BEATS_ROOT/x-pack/filebeat/modules.d" ] && [ -n "$(ls -A "$BEATS_ROOT/x-pack/filebeat/modules.d" 2> /dev/null)" ]; then
              cp -r "$BEATS_ROOT"/x-pack/filebeat/modules.d/* "${target.dir}/usr/share/filebeat/modules.d/"
            fi
            if [ -d "$BEATS_ROOT/x-pack/filebeat/module" ] && [ -n "$(ls -A "$BEATS_ROOT/x-pack/filebeat/module" 2> /dev/null)" ]; then
              cp -r "$BEATS_ROOT"/x-pack/filebeat/module/* "${target.dir}/usr/share/filebeat/module/"
            fi
      outputs:
        - source: ${target.dir}/usr/local/bin/filebeat
          target: /usr/local/bin/filebeat
          uid: 1000
          gid: 1000
          mode: "0755"
        - source: /go/src/github.com/elastic/beats/x-pack/filebeat/filebeat.yml
          target: /usr/share/filebeat/filebeat.yml
          uid: 1000
          gid: 1000
          mode: "0644"
        - source: ${target.dir}/usr/share/filebeat/modules.d
          target: /usr/share/filebeat/modules.d
          uid: 1000
          gid: 1000
          mode: "0755"
        - source: ${target.dir}/usr/share/filebeat/module
          target: /usr/share/filebeat/module
          uid: 1000
          gid: 1000
          mode: "0755"
        - source: /opt/docker/sbom/filebeat
          target: /opt/docker/sbom/filebeat
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
