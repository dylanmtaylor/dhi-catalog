vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 805fa6103d8bc1761dbc9cb4e420def42703ec53
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.3"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.3.1
  VERSION: 1.3.1
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: addon
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/open-cluster-management-io/ocm
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/open-cluster-management-io/ocm.git#v1.3.1
            checksum: 805fa6103d8bc1761dbc9cb4e420def42703ec53
            path: /go/src/github.com/open-cluster-management-io/ocm
            spdx:
              name: open-cluster-management-addon-manager
              version: 1.3.1
              packages:
                - name: ocm
                  purl: pkg:golang/github.com/open-cluster-management-io/ocm@1.3.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: remove vendor directory
          runs: |
            set -eux -o pipefail

            rm -rf vendor
        - name: patch
          uses: go/bump@v1
          privileged: true
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.53.0
              - helm.sh/helm/v3@v3.20.2
            download: true
        - name: re-vendor
          runs: |
            set -eux -o pipefail

            go mod vendor
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              # Some unit tests will actually try to use X25519 which is not allowed in FIPS mode
              export GODEBUG=fips140=on
            fi

            # install integration test deps
            go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
            source <($(go env GOPATH)/bin/setup-envtest use 1.31 -p env)

            # Skip tests that become unstable with the bumped Kubernetes deps:
            # TestRunController assumes a connection-refused path, and
            # TestStopUnusedManagers can hang waiting for fake informer cache sync.
            CGO_ENABLED=0 go test ./cmd/addon/... ./pkg/addon/... -skip "^(TestRunController|TestStopUnusedManagers)$"
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X open-cluster-management.io/ocm/pkg/version.versionFromGit=1.3.1
              - -X open-cluster-management.io/ocm/pkg/version.commitFromGit=805fa6103d8bc1761dbc9cb4e420def42703ec53
            output: ${target.dir}/usr/local/bin/addon
            packages: ./cmd/addon
      outputs:
        - source: ${target.dir}/usr/local/bin/addon
          target: /usr/local/bin/addon
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/open-cluster-management-addon-manager
          target: /opt/docker/sbom/open-cluster-management-addon-manager
          uid: 0
          gid: 0
