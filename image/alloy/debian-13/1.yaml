# syntax=dhi.io/build:2-debian13

name: Grafana Alloy 1.x
image: dhi.io/alloy
variant: runtime
tags:
  - "1"
  - "1.16"
  - 1.16.1
  - 1-debian13
  - 1.16-debian13
  - 1.16.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: 89d82370454dcee7b07d719ba632810e207a6de9
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  NODE_REFERENCE: dhi/pkg-node:24.15.0-debian13@sha256:9b4c9188ee6d299453f30e7fd4bbbc94fb9dfdcb1dd9ff5b3614fa380f40843d
  SEMVER_MAJOR_MINOR_VERSION: "1.16"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.16.1
  VERSION: 1.16.1
contents:
  packages:
    - '!base-files'
    - '!libc6'
    - libsystemd0
  builds:
    - name: alloy
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - libsystemd-dev
        files:
          - url: git+https://github.com/grafana/alloy.git#v1.16.1
            checksum: 89d82370454dcee7b07d719ba632810e207a6de9
            path: /go/src/github.com/grafana/alloy
            spdx:
              name: alloy
              version: 1.16.1
              packages:
                - name: alloy
                  purl: pkg:golang/github.com/grafana/alloy@1.16.1
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/pkg-node:24.15.0-debian13@sha256:9b4c9188ee6d299453f30e7fd4bbbc94fb9dfdcb1dd9ff5b3614fa380f40843d
            includes:
              - opt/nodejs
              - opt/npm
              - usr/local/bin/node
              - usr/local/bin/npm
            uid: 0
            gid: 0
      pipeline:
        - name: bump ui dependencies
          uses: npm/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: /go/src/github.com/grafana/alloy/internal/web/ui
        - name: build ui
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          environment:
            GODEBUG: fips140=on
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
              - github.com/burningalchemist/sql_exporter@v0.0.0-20240708200932-cb883e06441c
              - github.com/go-git/go-git/v5@v5.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
            download: true
        - name: fix sql_exporter NewTarget call for v0.15.0 API
          uses: git/patch@v1
          work-dir: /go/src/github.com/grafana/alloy
          with:
            patch: /src/patch/fix-sql-exporter-newtarget.patch
        - name: test
          work-dir: /go/src/github.com/grafana/alloy/collector
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            go test -v -count=1 ./...
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/grafana/alloy/collector
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/grafana/alloy/internal/build.Version=1.16.1
              - -X github.com/grafana/alloy/syntax/internal/stdlib.Version=1.16.1
              - -X github.com/grafana/alloy/internal/build.Revision=89d82370454dcee7b07d719ba632810e207a6de9
              - -X github.com/grafana/alloy/internal/build.Branch=dhi
              - -X github.com/grafana/alloy/internal/build.BuildUser=dhi
              - -X github.com/grafana/alloy/internal/build.BuildDate=$(date -u -d @${SOURCE_DATE_EPOCH} +'%FT%TZ')
            output: ${target.dir}/usr/local/bin/alloy
            tags:
              - netgo
              - embedalloyui
              - promtail_journal_enabled
              - pyroscope_ebpf
        - name: install production ui deps for sbom
          work-dir: /go/src/github.com/grafana/alloy/internal/web/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: javascript-package-cataloger
            prefix: alloy-ui
            source: /go/src/github.com/grafana/alloy/internal/web/ui
      paths:
        - type: file
          path: /src/patch/fix-sql-exporter-newtarget.patch
          uid: 0
          gid: 0
          source: image/alloy/patch/fix-sql-exporter-newtarget.patch
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/alloy/patch/npm-bumps.json
      outputs:
        - source: /go/src/github.com/grafana/alloy/example-config.alloy
          target: /etc/alloy/config.alloy
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/alloy-ui
          target: /opt/docker/sbom/alloy-ui
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/alloy
          target: /usr/local/bin/alloy
          uid: 0
          gid: 0
          mode: "0755"
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: alloy
  users:
    - name: alloy
      uid: 473
      gid: 473
  groups:
    - name: alloy
      gid: 473
      members:
        - alloy
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  ALLOY_DEPLOY_MODE: docker
paths:
  - type: directory
    path: /var/lib/alloy
    uid: 473
    gid: 473
    mode: "0770"
  - type: directory
    path: /var/lib/alloy/data
    uid: 473
    gid: 473
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal Grafana Alloy image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/alloy
cmd:
  - run
  - /etc/alloy/config.alloy
  - --storage.path=/var/lib/alloy/data
ports:
  - 12345/tcp
