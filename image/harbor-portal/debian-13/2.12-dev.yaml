# syntax=dhi.io/build:2-debian13

name: Harbor Portal 2.12.x (dev)
image: dhi.io/harbor-portal
variant: dev
tags:
  - 2.12-dev
  - 2.12.4-dev
  - 2.12-debian13-dev
  - 2.12.4-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2024-11-05"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 6b4981d4dd46a20481be5a3a7cdf435bc20f4dcb
  GOLANG_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:6ab2431d046a2e21dbcbcb5111e94bec59650d302ec0ac34e696e7e44f708044
  NGINX_REFERENCE: dhi/nginx:1.31.0-debian13-dev@sha256:cb19b87741692be25eec958bfac83a79446f1a4862ce73b542e66adf83cadba6
  NODE_REFERENCE: dhi/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
  SEMVER_MAJOR_MINOR_VERSION: "2.12"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.12.4
  VERSION: 2.12.4
contents:
  packages:
    - '!base-files'
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: harbor-portal
      uses: dhi.io/node:24.15.0-debian13-dev@sha256:4e28305aaa96fda512a778c1695ca1e901d8b5a6e9cb5c122fc6fcec88c41e8c
      contents:
        packages:
          - build-essential
          - bash
          - coreutils
          - python3-setuptools
          - yq
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.12.4
            checksum: 6b4981d4dd46a20481be5a3a7cdf435bc20f4dcb
            path: ${source.dir}/goharbor/harbor
            spdx:
              name: harbor-portal
              version: 2.12.4
              packages:
                - name: harbor-portal
                  purl: pkg:github/goharbor/harbor@2.12.4#src/portal
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: copy swagger file
          work-dir: ${source.dir}/goharbor/harbor
          runs: |
            set -eux -o pipefail

            cp api/v2.0/swagger.yaml src/portal/swagger.yaml
        - name: npm install
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install --unsafe-perm
            npm run postinstall

            npm run generate-build-timestamp
        - name: build node portal
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            node --max_old_space_size=2048 'node_modules/@angular/cli/bin/ng' build --configuration production
        - name: build node swagger
          work-dir: ${source.dir}/goharbor/harbor/src/portal/app-swagger-ui
          privileged: true
          runs: |
            set -eux -o pipefail

            npm install
            npm run build
        - name: build swagger
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            yq . swagger.yaml > dist/swagger.json
        - name: reinstall dependencies for sbom
          work-dir: ${source.dir}/goharbor/harbor/src/portal
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: harbor-portal-sbom
          uses: sbom@v1
          with:
            prefix: harbor-portal
            source: ${source.dir}/goharbor/harbor/src/portal
      outputs:
        - source: ${source.dir}/goharbor/harbor/src/portal/dist
          target: /usr/share/nginx/html
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: ${source.dir}/goharbor/harbor/src/portal/app-swagger-ui/dist
          target: /usr/share/nginx/html
          uid: 65532
          gid: 65532
          mode: "0755"
  artifacts:
    - name: dhi.io/nginx:1.31.0-debian13-dev@sha256:cb19b87741692be25eec958bfac83a79446f1a4862ce73b542e66adf83cadba6
      includes:
        - '**'
      excludes:
        - usr/share/nginx/html/**
        - var/lib/dpkg/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nginx
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /run
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /etc/nginx/nginx.conf
    uid: 65532
    gid: 65532
    mode: "0644"
    source: image/harbor-portal/config/default.conf
  - type: directory
    path: /tmp
    uid: 65532
    gid: 65532
    mode: "1777"
  - type: directory
    path: /cache/nginx
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Harbor Portal web interface image.
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - nginx
  - -g
  - daemon off;
ports:
  - 8080/tcp
