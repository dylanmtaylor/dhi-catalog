  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 4361f5f36983b90072d5671c48d3380af9442c50
  NGINX_REFERENCE: dhi/nginx:1.30.0-debian13@sha256:595bf8694e4a023f8f2843247919aa1f7cf61b1afcf51cf8e62b7237fb5382c0
  NODE_BUILD_REFERENCE: dhi/node:20.20.2-debian13-dev@sha256:b6f32c3ef454b5ec42a16e94f6c36a8e5cc9cd561f182acd05f56ef26dea87c6
  SEMVER_MAJOR_MINOR_VERSION: "1.120"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.120.1
  VERSION: 1.120.1
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - base-passwd
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - gettext-base
    - grep
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: opencost-ui
      uses: dhi.io/node:20.20.2-debian13-dev@sha256:b6f32c3ef454b5ec42a16e94f6c36a8e5cc9cd561f182acd05f56ef26dea87c6
      work-dir: ${source.dir}/opencost-ui
      caches:
        - path: ${source.dir}/opencost-ui/node_modules
      contents:
        packages:
          - less
        files:
          - url: git+https://github.com/opencost/opencost-ui.git#v1.120.1
            checksum: 4361f5f36983b90072d5671c48d3380af9442c50
            path: ${source.dir}/opencost-ui
            spdx:
              name: opencost-ui
              version: 1.120.1
              packages:
                - name: opencost-ui
                  purl: pkg:github/opencost/opencost-ui@v1.120.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            DHI_NO_SFW: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/opencost-ui
        - name: install dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

            npm ci
        - name: build standard UI
          runs: |
            set -eux -o pipefail

            # Standard (non-legacy) build — output lands in build/client/
            NODE_ENV=production npm run build
            mkdir -p "${target.dir}/var/www"
            cp -r build/client/. "${target.dir}/var/www/"
        - name: build legacy UI
          runs: |
            set -eux -o pipefail

            # Legacy build overwrites build/client/; copy separately.
            VITE_LEGACY_MODE=true NODE_ENV=production npm run build:legacy
            mkdir -p "${target.dir}/var/www/legacy"
            cp -r build/client/. "${target.dir}/var/www/legacy/"
        - name: prepare for sbom
          runs: |
            set -eux -o pipefail

            # Add resolved version to package.json for accurate SBOM generation.
            tmp=$(mktemp)
            jq --arg version "1.120.1" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json
        - name: reinstall dependencies for sbom
          privileged: true
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM.
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: generate sbom
          uses: sbom@v1
          with:
            prefix: opencost-ui
            source: ${source.dir}/opencost-ui
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/opencost-ui/patch
      outputs:
        - source: ${target.dir}/var/www
          target: /var/www
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: ${target.dir}/var/www/legacy
          target: /var/www/legacy
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/opencost-ui
          target: /opt/docker/sbom/opencost-ui
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/nginx:1.30.0-debian13@sha256:595bf8694e4a023f8f2843247919aa1f7cf61b1afcf51cf8e62b7237fb5382c0
