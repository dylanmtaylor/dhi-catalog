          - url: https://repo1.maven.org/maven2/io/netty/netty-transport-classes-epoll/4.2.13.Final/netty-transport-classes-epoll-4.2.13.Final.jar
            path: ${source.dir}/patch/deps/netty-transport-classes-epoll-4.2.13.Final.jar
            uid: 1000
            gid: 1000
          - url: https://repo1.maven.org/maven2/io/netty/netty-transport-native-unix-common/4.2.13.Final/netty-transport-native-unix-common-4.2.13.Final.jar
            path: ${source.dir}/patch/deps/netty-transport-native-unix-common-4.2.13.Final.jar
            uid: 1000
            gid: 1000
      pipeline:
        - name: stage DHI Gradle CVE overrides init script
          work-dir: ${source.dir}
          runs: |
            set -eux -o pipefail

            cp "${source.dir}/patch/3.6.overrides.gradle" \
              "${source.dir}/dhi-overrides.init.gradle"
        - name: patch security plugin
          uses: git/patch@v1
          work-dir: ${source.dir}/security
          with:
            patch: ${source.dir}/patch/plugin-security.patch
        - name: patch opensearch-learning-to-rank-base plugin
          uses: git/patch@v1
          work-dir: ${source.dir}/opensearch-learning-to-rank-base
          with:
            patch: ${source.dir}/patch/plugin-ltr.patch
        - name: patch query-insights plugin
          uses: git/patch@v1
          work-dir: ${source.dir}/query-insights
          with:
            patch: ${source.dir}/patch/plugin-query-insights.patch
        - name: build OpenSearch core
          work-dir: ${source.dir}/OpenSearch
          privileged: true
          runs: |
            set -eux -o pipefail

            dhi-gradle publishToMavenLocal -Dbuild.snapshot=false -Dopensearch.version=3.6.0
            dhi-gradle :build-tools:publishToMavenLocal -Dbuild.snapshot=false -Dopensearch.version=3.6.0

            # Then create the distribution
            # Non-FIPS needs -Pcrypto.standard=FIPS-140-3 to include bc-fips JARs in lib/
            # because PemUtils.java unconditionally requires BouncyCastleFipsProvider
            # (https://github.com/opensearch-project/OpenSearch/pull/17393).
            # FIPS images get bc-fips via bootclasspath from /opt/bouncycastle/ instead.
            FIPS_GRADLE_FLAG=""
            if [ "${target.fips}" != "true" ]; then
              FIPS_GRADLE_FLAG="-Pcrypto.standard=FIPS-140-3"
            fi
            dhi-gradle localDistro -Dbuild.snapshot=false -Dopensearch.version=3.6.0 ${FIPS_GRADLE_FLAG}

            # Remove the bundled jdk
            rm -r "${source.dir}/OpenSearch/build/distribution/local/opensearch-3.6.0/jdk"
        - name: build OpenSearch plugin utils
          work-dir: ${source.dir}/common-utils
          privileged: true
          runs: |
            set -eux -o pipefail

            dhi-gradle build -Dbuild.snapshot=false -Dopensearch.version=3.6.0
            dhi-gradle publishToMavenLocal -Dbuild.snapshot=false -Dopensearch.version=3.6.0
        - name: build opensearch-remote-metadata-sdk
          work-dir: ${source.dir}/opensearch-remote-metadata-sdk
          privileged: true
          runs: |
            set -eux -o pipefail

            dhi-gradle build -Dbuild.snapshot=false -Dopensearch.version=3.6.0
            dhi-gradle publishToMavenLocal -Dbuild.snapshot=false -Dopensearch.version=3.6.0
        - name: build plugins
          privileged: true
          runs: |
            set -eux -o pipefail

            plugins=(
              alerting
              anomaly-detection
              asynchronous-search
              cross-cluster-replication
              custom-codecs
              flow-framework
              geospatial
              index-management
              job-scheduler
              k-NN
              ml-commons
              neural-search
              notifications/notifications
              observability
              opensearch-learning-to-rank-base
              opensearch-system-templates
              performance-analyzer
              query-insights
              reporting
              search-relevance
              security
              security-analytics
              skills
              sql
              user-behavior-insights
            )

            # Pass -Pcrypto.standard=FIPS-140-3 for non-FIPS so plugins that use
            # the flag don't ship their own BouncyCastle FIPS JARs, avoiding
            # jar hell with the bc-fips JARs already in lib/.
            FIPS_GRADLE_FLAG=""
            if [ "${target.fips}" != "true" ]; then
              FIPS_GRADLE_FLAG="-Pcrypto.standard=FIPS-140-3"
            fi

            for plugindir in "${plugins[@]}"; do
              cd ${source.dir}/${plugindir}
              dhi-gradle assemble -Dbuild.snapshot=false -Dopensearch.version=3.6.0 ${FIPS_GRADLE_FLAG}
            done
        - name: assemble opensearch distribution
          runs: |
            set -eux -o pipefail

            mv "${source.dir}/OpenSearch/build/distribution/local/opensearch-3.6.0" "${target.dir}/opensearch"

            plugin_zip_dirs=(
              alerting/alerting
              anomaly-detection
              asynchronous-search
              cross-cluster-replication
              custom-codecs
              flow-framework
              geospatial
              index-management
              job-scheduler
              k-NN
              ml-commons/plugin
              neural-search
              notifications/notifications/core # notifications has two plugins: "core" and "notifications"
              notifications/notifications/notifications
              observability
              opensearch-learning-to-rank-base
              opensearch-system-templates
              performance-analyzer
              query-insights
              reporting
              search-relevance
              security
              security-analytics
              skills
              sql/plugin
              user-behavior-insights
            )

            for plugin_zip_dir in "${plugin_zip_dirs[@]}"; do
              zipfile=$(echo ${source.dir}/$plugin_zip_dir/build/distributions/*.zip)
              if [ ! -f "$zipfile" ]; then
                echo "ERROR: Zip file not found for plugin: ${plugin_zip_dir}"
                exit 1
              fi
              echo "Found plugin zip file: $zipfile"

              # The plugin name is different from the repository name
              # We could pull it out of settings.gradle or we can get it here from the zip file name
              basezip="$(basename "$zipfile" .zip)"
              plugin_name="${basezip%-*}"

              mkdir -p "${target.dir}/opensearch/plugins/$plugin_name"
              unzip -o "$zipfile" -d "${target.dir}/opensearch/plugins/$plugin_name/"
            done

            # Some plugins have additional configuration files to install
            install -Dm644 ${source.dir}/notifications/notifications/notifications/src/main/config/notifications.yml "${target.dir}/opensearch/config/opensearch-notifications/notifications.yml"
            install -Dm644 ${source.dir}/notifications/notifications/core/src/main/config/notifications-core.yml "${target.dir}/opensearch/config/opensearch-notifications-core/notifications-core.yml"
            install -Dm644 ${source.dir}/observability/src/main/config/observability.yml "${target.dir}/opensearch/config/opensearch-observability/observability.yml"
            mkdir -p "${target.dir}/opensearch/config/opensearch-performance-analyzer"
            install -Dm644 ${source.dir}/performance-analyzer/config/* "${target.dir}/opensearch/config/opensearch-performance-analyzer/"
            install -Dm644 ${source.dir}/reporting/src/main/config/reports-scheduler.yml "${target.dir}/opensearch/config/opensearch-reports-scheduler/reports-scheduler.yml"
            mkdir -p "${target.dir}/opensearch/config/opensearch-security"
            install -Dm644 ${source.dir}/security/config/* "${target.dir}/opensearch/config/opensearch-security/"
        - name: replace vulnerable netty in security-analytics
          work-dir: ${target.dir}/opensearch/plugins/opensearch-security-analytics
          runs: |
            set -eux -o pipefail

            sa_commons_jar="$(ls security-analytics-commons-*.jar)"

            echo "Checking bundled Netty in ${sa_commons_jar}..."
            if ! /opt/java/openjdk/21/bin/jar tf "${sa_commons_jar}" | grep -q '^io/netty/'; then
              echo "ERROR: No embedded netty classes found in commons jar" >&2
              exit 1
            fi

            # Extract version from netty-codec-http pom.properties
            bundled_netty_ver="$(unzip -p "${sa_commons_jar}" 'META-INF/maven/io.netty/netty-codec-http/pom.properties' 2> /dev/null | grep '^version=' | cut -d= -f2 || echo "")"

            if [[ -n "${bundled_netty_ver}" ]]; then
              # Compare versions (simple lexicographic comparison is good enough for now)
              if [[ "${bundled_netty_ver}" > "4.2.13.Final" ]] || [[ "${bundled_netty_ver}" = "4.2.13.Final" ]]; then
                echo "ERROR: Bundled Netty version ${bundled_netty_ver} is >= target version 4.2.13.Final" >&2
                exit 1
              fi
              echo "Bundled version ${bundled_netty_ver} < target 4.2.13.Final, proceeding with upgrade..."
            else
              echo "WARNING: Found netty classes but could not determine version, proceeding..."
            fi

            echo "Stripping all embedded netty classes from: ${sa_commons_jar}"
            zip -qd "${sa_commons_jar}" 'io/netty/*' 'META-INF/maven/io.netty/*/*' || true
            if /opt/java/openjdk/21/bin/jar tf "${sa_commons_jar}" | grep -q '^io/netty/'; then
              echo "ERROR: Failed to strip embedded netty classes from commons jar" >&2
              exit 1
            fi

            echo "Bundling netty 4.2.13.Final jars..."
            for netty_dep in netty-buffer netty-codec netty-codec-http netty-codec-http2 netty-common netty-handler netty-resolver netty-transport netty-transport-classes-epoll netty-transport-native-unix-common; do
              cp ${source.dir}/patch/deps/${netty_dep}-4.2.13.Final.jar .
            done
        - name: copy config and entrypoint files
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            cp "${source.dir}/opensearch-build/docker/release/config/opensearch/opensearch-docker-entrypoint-3.x.sh" "${target.dir}/usr/local/bin/docker-entrypoint.sh"
            cp "${source.dir}/opensearch-build/config/opensearch.yml" "${target.dir}/opensearch/config/opensearch.yml"
            cp "${source.dir}/opensearch-build/docker/release/config/opensearch/log4j2.properties" "${target.dir}/opensearch/config/log4j2.properties"
      paths:
        - type: file
          path: /usr/local/bin/dhi-gradle
          uid: 0
          gid: 0
          mode: "0555"
          source: image/opensearch/scripts/dhi-gradle.sh
        - type: file
          path: ${source.dir}/patch/3.6.overrides.gradle
          uid: 0
          gid: 0
          mode: "0444"
          source: image/opensearch/patch/3.6.overrides.gradle
        - type: file
          path: /src/patch/plugin-security.patch
          uid: 0
          gid: 0
          mode: "0444"
          source: image/opensearch/patch/plugin-security.patch
        - type: file
          path: /src/patch/plugin-ltr.patch
          uid: 0
          gid: 0
          mode: "0444"
          source: image/opensearch/patch/plugin-ltr.patch
        - type: file
          path: /src/patch/plugin-query-insights.patch
          uid: 0
          gid: 0
          mode: "0444"
          source: image/opensearch/patch/plugin-query-insights.patch
      accounts:
        run-as: opensearch
        users:
          - name: opensearch
            uid: 1000
            gid: 1000
        groups:
          - name: opensearch
            gid: 1000
            members:
              - opensearch
      outputs:
        - source: ${target.dir}/opensearch
          target: /usr/share/opensearch
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/docker-entrypoint.sh
          target: /usr/local/bin/docker-entrypoint.sh
          uid: 0
          gid: 0
          mode: "0555"
        - source: /opt/docker/sbom/
          target: /opt/docker/sbom/
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
accounts:
  run-as: opensearch
  users:
    - name: opensearch
      uid: 1000
      gid: 1000
  groups:
    - name: opensearch
      gid: 1000
      members:
        - opensearch
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /usr/share/opensearch
environment:
  HOME: /usr/share/opensearch
  JAVA_HOME: /opt/java/openjdk/21-jre
  LANG: en_US.UTF-8
  LANGUAGE: en_US:en
  LC_ALL: en_US.UTF-8
  OPENSEARCH_FIPS_MODE: "false"
  OPENSEARCH_HOME: /usr/share/opensearch
  OPENSEARCH_PATH_CONF: /usr/share/opensearch/config
  PATH: /usr/share/opensearch/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /usr/share/opensearch/data
    uid: 1000
    gid: 1000
    mode: "0755"
  - type: directory
    path: /usr/share/opensearch/logs
    uid: 1000
    gid: 1000
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal OpenSearch image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - opensearch
ports:
  - 9200/tcp
  - 9300/tcp
  - 9600/tcp
  - 9650/tcp
