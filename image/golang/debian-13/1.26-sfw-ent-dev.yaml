  PKG_GOLANG_REFERENCE: dhi/pkg-golang:1.26.3-debian13@sha256:0e2967a4c894eafce683384b1f9ce96fd6804430671f9d85d54f7b8190ec47d3
  SFW_ARCH: '#{ target.arch == "amd64" ? "x86_64" : "arm64" }'
  SFW_VERSION: 1.10.0
  VERSION: 1.26.3
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!binutils'
    - '!binutils-aarch64-linux-gnu'
    - '!binutils-common'
    - '!binutils-x86-64-linux-gnu'
    - '!gawk'
    - '!libbinutils'
    - '!libctf-nobfd0'
    - '!libctf0'
    - '!libelogind0'
    - '!libgprofng0'
    - '!libsframe1'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - g++
    - gcc
    - git
    - grep
    - libc-bin
    - libc6-dev
    - libexpat1
    - libslang2
    - libstdc++6
    - make
    - mawk
    - perl-base
    - sed
    - tar
    - tzdata
    - util-linux
  builds:
    - name: golang-sfw-ent
      contents:
        packages:
          - bash
          - coreutils
          - findutils
        files:
          - url: https://github.com/SocketDev/firewall-release/releases/download/v1.10.0/sfw-linux-${SFW_ARCH}
            path: ${target.dir}/opt/socket/bin/sfw
            uid: 0
            gid: 0
            mode: "0755"
      pipeline:
        - name: create alias
          runs: |
            set -eux -o pipefail

            echo "Creating go alias"

            cat > "${target.dir}/opt/socket/bin/go" << 'EOF'
            #!/bin/sh

            # if DHI_NO_SFW is set to true, run the command without sfw, otherwise run with sfw
            if [ "${DHI_NO_SFW}" = "true" ]; then
              /usr/local/go/bin/go "$@"
            else
              sfw /usr/local/go/bin/go "$@"
            fi
            EOF

            chmod +x "${target.dir}/opt/socket/bin/go"
      outputs:
        - source: ${target.dir}/opt/socket
          target: /opt/socket
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-golang:1.26.3-debian13@sha256:0e2967a4c894eafce683384b1f9ce96fd6804430671f9d85d54f7b8190ec47d3
      includes:
        - opt/docker/sbom
        - usr/local/go
      uid: 0
      gid: 0
    - name: dhi.io/pkg-binutils:2.46-debian13@sha256:069179316afd8be7ba10ffb968dce13db5f4a349516553a98d77bfb85051f31d
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - usr/lib/aarch64-linux-gnu/gconv
        - usr/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1
        - usr/lib/aarch64-linux-gnu/libanl.so.1
        - usr/lib/aarch64-linux-gnu/libBrokenLocale.so.1
        - usr/lib/aarch64-linux-gnu/libc_malloc_debug.so.0
        - usr/lib/aarch64-linux-gnu/libc.so.6
        - usr/lib/aarch64-linux-gnu/libdl.so.2
        - usr/lib/aarch64-linux-gnu/libgcc_s.so.1
        - usr/lib/aarch64-linux-gnu/libm.so.6
