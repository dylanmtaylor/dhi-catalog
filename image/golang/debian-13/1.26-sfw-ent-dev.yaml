# syntax=dhi.io/build:2-debian13

name: Go 1.26.x / Socket Firewall Enterprise (sfw-ent, dev)
image: dhi.io/golang
variant: dev
flavor: sfw-ent
tags:
  - 1-sfw-ent-dev
  - 1.26-sfw-ent-dev
  - 1.26.3-sfw-ent-dev
  - 1-debian13-sfw-ent-dev
  - 1.26-debian13-sfw-ent-dev
  - 1.26.3-debian13-sfw-ent-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-02-03"
vars:
  BINUTILS_DIGEST: sha256:069179316afd8be7ba10ffb968dce13db5f4a349516553a98d77bfb85051f31d
  BINUTILS_VERSION: "2.46"
  MAJOR_MINOR_VERSION: "1.26"
