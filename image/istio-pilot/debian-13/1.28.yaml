# syntax=dhi.io/build:2-debian13

name: Istio Pilot 1.28.x
image: dhi.io/istio-pilot
variant: runtime
tags:
  - "1.28"
  - 1.28.6
  - 1.28-debian13
  - 1.28.6-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-05"
  end-of-life: "2026-07-31"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: db606cedf03cac76d91a05a4a5628fa47bd537f3
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.28"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.28.6
  VERSION: 1.28.6
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
  builds:
    - name: istio-pilot
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - grep
        files:
          - url: git+https://github.com/istio/istio.git#1.28.6
            checksum: db606cedf03cac76d91a05a4a5628fa47bd537f3
            path: /go/src/github.com/istio/istio
            spdx:
              name: istio-pilot
              version: 1.28.6
              packages:
                - name: istio
                  purl: pkg:golang/istio.io/istio@1.28.6
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch (1.28 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/istio/istio
          with:
            deps:
              - github.com/docker/cli@v29.2.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/go-openapi/swag@v0.26.0
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/prometheus@v0.65.0
              - google.golang.org/grpc@v1.79.3
            download: true
            replaces:
              - k8s.io/api=k8s.io/api@v0.34.1
              - k8s.io/apimachinery=k8s.io/apimachinery@v0.34.1
              - k8s.io/client-go=k8s.io/client-go@v0.34.1
        - name: run-upstream-pilot-tests
          work-dir: /go/src/github.com/istio/istio
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            skip_reason() {
              case "$1" in
                istio.io/istio/pilot/cmd/pilot-agent/status)
                  echo "status probes require network listener behavior outside this build sandbox"
                  ;;
                istio.io/istio/pilot/pkg/bootstrap | istio.io/istio/pilot/pkg/model | istio.io/istio/pilot/pkg/trustbundle)
                  echo "pre-existing skip: upstream runtime tests use environment-sensitive crypto/network paths"
                  ;;
                istio.io/istio/pilot/pkg/config/kube/clustertrustbundle | istio.io/istio/pilot/pkg/config/kube/crdclient | istio.io/istio/pilot/pkg/config/kube/ingress)
                  echo "Kubernetes config tests start informers and wait for cache sync without a live API server"
                  ;;
                istio.io/istio/pilot/pkg/controllers/ipallocate | istio.io/istio/pilot/pkg/controllers/untaint)
                  echo "controller tests depend on Kubernetes watcher/controller synchronization"
                  ;;
                istio.io/istio/pilot/pkg/credentials/kube)
                  echo "credential tests start Kubernetes informers that do not settle in the build sandbox"
                  ;;
                istio.io/istio/pilot/pkg/networking/apigen | istio.io/istio/pilot/pkg/networking/core | istio.io/istio/pilot/pkg/networking/grpcgen)
                  echo "networking simulation tests create fake discovery servers backed by Kubernetes informers"
                  ;;
                istio.io/istio/pilot/pkg/serviceregistry)
                  echo "service registry tests wait on Kubernetes discovery namespace cache sync"
                  ;;
                istio.io/istio/pilot/pkg/xds)
                  echo "xDS runtime tests exercise reconnect/discovery flows backed by Kubernetes informers"
                  ;;
                *)
                  return 1
                  ;;
              esac
            }

            go list ./pilot/... > /tmp/pilot-test-packages

            while read pkg; do
              if reason="$(skip_reason "$pkg")"; then
                echo "Compile-only: $pkg ($reason)"
                go test -run '^$' -count=1 -timeout=2m "$pkg" || exit 1
                continue
              fi

              echo "Testing: $pkg"
              test_args="-v -count=1 -timeout=5m"
              if [ "$pkg" = "istio.io/istio/pilot/pkg/config/kube/gateway" ]; then
                # This single Gateway API golden subtest drifts after the Kubernetes module compatibility pin;
                # keep the rest of the gateway package tests running.
                test_args="$test_args -skip ^TestConvertResources/backend-lb-policy$"
              fi
              go test $test_args "$pkg" || exit 1
            done < /tmp/pilot-test-packages
        - name: build
          uses: go/build@v1
          work-dir: /go/src/github.com/istio/istio
          environment:
            GOFLAGS: -buildvcs=false
          with:
            ldflags:
              - -X istio.io/istio/pkg/version.buildVersion=1.28.6
              - -X istio.io/istio/pkg/version.buildGitRevision=db606cedf03cac76d91a05a4a5628fa47bd537f3
              - -X istio.io/istio/pkg/version.buildStatus=Clean
              - -X istio.io/istio/pkg/version.buildTag=1.28.6
              - -X istio.io/istio/pkg/version.buildHub=docker.io/dhi
              - -X istio.io/istio/pkg/version.buildOS=$(go env GOOS)
              - -X istio.io/istio/pkg/version.buildArch=$(go env GOARCH)
            output: ${target.dir}/usr/local/bin/pilot-discovery
            packages: ./pilot/cmd/pilot-discovery
            tags: vtprotobuf,disable_pgv
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/istio-pilot/patch
      outputs:
        - source: ${target.dir}/usr/local/bin/pilot-discovery
          target: /usr/local/bin/pilot-discovery
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/istio-pilot
          target: /opt/docker/sbom/istio-pilot
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: "1337"
  users:
    - name: istio-proxy
      uid: 1337
      gid: 1337
  groups:
    - name: istio-proxy
      gid: 1337
      members:
        - istio-proxy
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Istio Pilot image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/pilot-discovery
