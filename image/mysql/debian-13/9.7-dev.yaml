# syntax=dhi.io/build:2-debian13

name: MySQL 9.7.x (dev)
image: dhi.io/mysql
variant: dev
tags:
  - 9-dev
  - 9.7-dev
  - lts-dev
  - 9.7.0-dev
  - 9-debian13-dev
  - 9.7-debian13-dev
  - lts-debian13-dev
  - 9.7.0-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-04-21"
vars:
  ARCH: '#{ target.arch == "amd64" ? "x86_64" : "aarch64" }'
  COMMIT_SHA: 845d525d49c8027a4d0cdcc43372c96ba295c857
  GOSU_REFERENCE: dhi/pkg-gosu:1.19-debian13@sha256:67f0f00ca82ffdffbd95b093fef3f8c4fc578a36525798afcb2da6ff4ef21107
  SEMVER_MAJOR_MINOR_VERSION: "9.7"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.7.0
  VERSION: 9.7.0
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - libaio1t64
    - libc-bin
    - libcurl4t64
    - libncurses6
    - libnuma1
    - libstdc++6
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: mysql
      work-dir: ${source.dir}/mysql
      contents:
        packages:
          - bash
          - bison
          - build-essential
          - ca-certificates
          - cmake
          - coreutils
          - diffutils
          - gpg
          - gpg-agent
          - gzip
          - libabsl-dev
          - libaio-dev
          - libboost-all-dev
          - libcurl4-openssl-dev
          - libncurses-dev
          - libssl-dev
          - libtirpc-dev
          - libc-bin
          - pkg-config
          - sed
          - tar
          - wget
          - xz-utils
          - zlib1g-dev
        files:
          - url: git+https://github.com/mysql/mysql-server#mysql-9.7.0
            checksum: 845d525d49c8027a4d0cdcc43372c96ba295c857
            path: ${source.dir}/mysql
            spdx:
              name: mysql
              version: 9.7.0
              packages:
                - name: mysql
                  purl: pkg:github/mysql/mysql-server@9.7.0
                  license: GPL-2.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: build
          runs: |
            set -eux -o pipefail

            mkdir -p build

            pushd build
            cmake .. \
              -DCMAKE_INSTALL_PREFIX='${target.dir}/opt/mysql' \
              -DWITH_DEBUG=OFF \
              -DWITH_UNIT_TESTS=OFF \
              -DWITH_ARCHIVE_STORAGE_ENGINE=OFF \
              -DWITH_BLACKHOLE_STORAGE_ENGINE=OFF \
              -DWITH_FEDERATED_STORAGE_ENGINE=OFF \
              -DWITH_EXAMPLE_STORAGE_ENGINE=OFF \
              -DWITH_NDBCLUSTER_STORAGE_ENGINE=OFF \
              -DWITH_ROUTER=OFF \
              -DINSTALL_MYSQLTESTDIR= \
              -DWITH_NDB=OFF

            make -j"$(nproc)"

            make install
            popd
      outputs:
        - source: ${target.dir}/opt/mysql
          target: /opt/mysql
          uid: 65532
          gid: 65532
        - source: /opt/docker/sbom/mysql
          target: /opt/docker/sbom/mysql
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/pkg-gosu:1.19-debian13@sha256:67f0f00ca82ffdffbd95b093fef3f8c4fc578a36525798afcb2da6ff4ef21107
      includes:
        - opt/docker/sbom/gosu
        - usr/local/sbin/gosu
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: mysql
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: mysql
      gid: 65532
      members:
        - mysql
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
  MYSQLDATA: /var/lib/mysql
  PATH: /opt/mysql/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
paths:
  - type: directory
    path: /var/lib/mysql-files
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/lib/mysql
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /run/mysqld
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: directory
    path: /var/lib/data/
    uid: 65532
    gid: 65532
    mode: "0755"
  - type: file
    path: /usr/local/bin/docker-entrypoint.sh
    uid: 0
    gid: 0
    mode: "0755"
    source: image/mysql/bin/docker-entrypoint.sh
  - type: symlink
    path: /usr/lib/${ARCH}-linux-gnu/libaio.so.1
    uid: 0
    gid: 0
    source: libaio.so.1t64
annotations:
  org.opencontainers.image.description: A minimal MySQL image
  org.opencontainers.image.licenses: GPL-2.0-only
entrypoint:
  - /usr/local/bin/docker-entrypoint.sh
cmd:
  - mysqld
ports:
  - 3306/tcp
  - 33060/tcp
