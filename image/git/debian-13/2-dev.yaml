    - '!mawk'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - curl
    - diffutils
    - dpkg
    - findutils
    - git=1:2.47.3-0+deb13u1
    - grep
    - libc-bin
    - libcurl3t64-gnutls
    - liberror-perl
    - libpcre2-8-0
    - mawk
    - perl
    - perl-base
    - sed
    - util-linux
  artifacts:
    - name: dhi.io/pkg-git-lfs:3.7.1-debian13@sha256:9b7a8ec84649c7a09085181d5cd079503908a9484dbfd9d35d9f4f9d64eb4af0
