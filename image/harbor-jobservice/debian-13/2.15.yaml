# syntax=dhi.io/build:2-debian13

name: Harbor Job Service 2.x
image: dhi.io/harbor-jobservice
variant: runtime
tags:
  - "2"
  - "2.15"
  - 2.15.1
  - 2-debian13
  - 2.15-debian13
  - 2.15.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2026-03-19"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 335c05f2b9507b4c7116fe69b84e31ef9f4b91dd
  GO_SWAGGER_VERSION: v0.33.1
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "2.15"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.15.1
  VERSION: 2.15.1
contents:
  packages:
    - '!base-files'
  builds:
    - name: harbor-jobservice
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        files:
          - url: git+https://github.com/goharbor/harbor.git#v2.15.1
            path: /go/src/github.com/goharbor/harbor
            spdx:
              name: harbor-jobservice
              version: 2.15.1
              packages:
                - name: harbor-jobservice
                  purl: pkg:golang/github.com/goharbor/harbor@2.15.1
                  license: Apache-2.0
            uid: 0
            gid: 0
          - url: https://github.com/go-swagger/go-swagger/releases/download/v0.33.1/swagger_linux_${target.arch}
            path: /usr/local/bin/swagger
            uid: 0
            gid: 0
            mode: "755"
      pipeline:
        - name: generate-swagger
          work-dir: /go/src/github.com/goharbor/harbor
          runs: |
            set -eux -o pipefail

            SWAGGER_TARGET="src/server/v2.0"

            /usr/local/bin/swagger generate server \
              --template-dir=tools/swagger/templates \
              --exclude-main \
              --additional-initialism=CVE \
              --additional-initialism=GC \
              --additional-initialism=OIDC \
              -f api/v2.0/swagger.yaml \
              -A harbor \
              --target ${SWAGGER_TARGET}
        - name: Patch vulnerable Go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/goharbor/harbor/src
          with:
            deps:
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - helm.sh/helm/v3@v3.20.2
            download: true
        - name: test
          work-dir: /go/src/github.com/goharbor/harbor/src/jobservice
          privileged: true
          runs: |
            set -eux -o pipefail

            # Run tests excluding multiple packages since those require external connections or environment setup
            CGO_ENABLED=0 go test $(go list ./... | grep -v -E '(/job$|/job/|common/dao|common/rds|logger|hook|lcm|mgt|migration|period|runner|runtime|sync|worker/cworker)')
        - name: build-binary
          uses: go/build@v1
          work-dir: /go/src/github.com/goharbor/harbor/src/jobservice
          with:
            ldflags:
              - -X github.com/goharbor/harbor/src/pkg/version.ReleaseVersion=2.15.1
              - -X github.com/goharbor/harbor/src/pkg/version.GitCommit=335c05f2b9507b4c7116fe69b84e31ef9f4b91dd
            output: ${target.dir}/usr/local/bin/harbor-jobservice
      outputs:
        - source: ${target.dir}/usr/local/bin/harbor-jobservice
          target: /usr/local/bin/harbor-jobservice
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/harbor-jobservice
          target: /opt/docker/sbom/harbor-jobservice
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Harbor Job Service image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /usr/local/bin/harbor-jobservice
cmd:
  - -c
  - /etc/jobservice/config.yml
ports:
  - 8080/tcp
  - 8443/tcp
