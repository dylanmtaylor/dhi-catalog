            uid: 0
            gid: 0
          - url: https://raw.githubusercontent.com/apache/airflow/constraints-3.2.1/constraints-3.13.txt
            path: ${source.dir}/airflow/constraints.txt
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/apache/logging/log4j/log4j-core/2.25.4/log4j-core-2.25.4.jar
            checksum: sha256:10fee2c0485d54fa44ee75d314f6295508f7b932281873db61a91b88073200e6
            path: ${source.dir}/log4j/log4j-core-2.25.4.jar
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/apache/logging/log4j/log4j-api/2.25.4/log4j-api-2.25.4.jar
            checksum: sha256:c4b642a7f047275215de117e0e3847eb2c7711d84a0aa7433e7b3c096daf341d
            path: ${source.dir}/log4j/log4j-api-2.25.4.jar
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/apache/logging/log4j/log4j-slf4j-impl/2.25.4/log4j-slf4j-impl-2.25.4.jar
            checksum: sha256:7ac68a0afcc83d54f48d116d79370a43f0a2a6b71b5c1d6dda943bb6a95ddbaa
            path: ${source.dir}/log4j/log4j-slf4j-impl-2.25.4.jar
            uid: 0
