        - source: /opt/docker/sbom/airflow-simple-auth-ui
          target: /opt/docker/sbom/airflow-simple-auth-ui
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/airflow
          target: /opt/docker/sbom/airflow
          uid: 0
          gid: 0
