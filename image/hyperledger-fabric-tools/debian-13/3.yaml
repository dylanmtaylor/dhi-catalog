# syntax=dhi.io/build:2-debian13

name: Hyperledger Fabric Tools 3.x
image: dhi.io/hyperledger-fabric-tools
variant: runtime
tags:
  - "3"
  - "3.1"
  - 3.1.4
  - 3-debian13
  - 3.1-debian13
  - 3.1.4-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 57f91e9b60bcca109834dc2deb60157444863bae
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "3.1"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.1.4
  VERSION: 3.1.4
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
  builds:
    - name: hyperledger-fabric-tools
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        files:
          - url: git+https://github.com/hyperledger/fabric.git#v3.1.4
            checksum: 57f91e9b60bcca109834dc2deb60157444863bae
            path: /go/src/github.com/hyperledger/fabric
            spdx:
              name: hyperledger-fabric-tools
              version: 3.1.4
              packages:
                - name: hyperledger-fabric-tools
                  purl: pkg:golang/github.com/hyperledger/fabric@3.1.4
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: go dependencies (3 only)
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric
          with:
            deps:
              - github.com/consensys/gnark-crypto@v0.20.1
              - go.opentelemetry.io/otel@v1.41.0
              - google.golang.org/grpc@v1.79.3
        - name: test
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            # Exclude peer and orderer packages (not included in tools image)
            EXCLUDES='/peer|/orderer'
            PKGS=$(go list ./cmd/... | egrep -v "${EXCLUDES}")

            # Skip TestUnsuccessfulChannelTxFileCreation (test expects permission-denied error, but container has write access)
            CGO_ENABLED=0 go test -skip '^TestUnsuccessfulChannelTxFileCreation$' $PKGS
        - name: build
          work-dir: /go/src/github.com/hyperledger/fabric
          runs: |
            set -eux -o pipefail

            GOLDFLAGS="-X github.com/hyperledger/fabric/common/metadata.Version=3.1.4 \
                       -X github.com/hyperledger/fabric/common/metadata.CommitSHA=57f91e9b60bcca109834dc2deb60157444863bae"

            # Build CLI tools
            for binary in configtxgen configtxlator cryptogen discover ledgerutil osnadmin; do
              CGO_ENABLED=0 go build \
                -ldflags="$GOLDFLAGS" -buildvcs=false -o "${target.dir}/usr/local/bin/$binary" ./cmd/$binary
            done
      outputs:
        - source: ${target.dir}/usr/local/bin/
          target: /usr/local/bin/
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/hyperledger-fabric-tools
          target: /opt/docker/sbom/hyperledger-fabric-tools
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Hyperledger Fabric Tools image
  org.opencontainers.image.licenses: Apache-2.0
cmd:
  - configtxgen
  - --help
