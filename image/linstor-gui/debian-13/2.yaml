# syntax=dhi.io/build:2-debian13

name: LINSTOR GUI 2.x
image: dhi.io/linstor-gui
variant: runtime
tags:
  - "2"
  - "2.4"
  - 2.4.0
  - 2-debian13
  - 2.4-debian13
  - 2.4.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2025-11-21"
vars:
  COMMIT_SHA: aedcd49f82cee0ab8c8f57e9da2548e9381ccc4a
  NGINX_REFERENCE: dhi/nginx:1.31.0-debian13@sha256:07477e2829f4f800abcdf369a93c9e5ec5dc4b17b2b86deb44063414aec3cd16
  NODE_BUILD_REFERENCE: dhi/node:22.22.3-debian13-dev@sha256:1786c391bba5542c038f7750a6922edf2adbbb3b9994501294ed60120fe47363
  SEMVER_MAJOR_MINOR_VERSION: "2.4"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.4.0
  VERSION: 2.4.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
  builds:
    - name: linstor-gui
      uses: dhi.io/node:22.22.3-debian13-dev@sha256:1786c391bba5542c038f7750a6922edf2adbbb3b9994501294ed60120fe47363
      contents:
        packages:
          - bash
          - gettext-base
          - jq
        files:
          - url: git+https://github.com/LINBIT/linstor-gui.git#v2.4.0
            checksum: aedcd49f82cee0ab8c8f57e9da2548e9381ccc4a
            path: ${source.dir}/linstor-gui
            spdx:
              name: linstor-gui
              version: 2.4.0
              packages:
                - name: linstor-gui
                  purl: pkg:github/LINBIT/linstor-gui@v2.4.0
                  license: GPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump dependencies
          uses: npm/bump@v1
          privileged: true
          environment:
            npm_config_ignore_scripts: "true"
          with:
            bumps: ${source.dir}/patch/npm-bumps.json
            npm-root: ${source.dir}/linstor-gui
        - name: install dependencies
          work-dir: ${source.dir}/linstor-gui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Install dependencies
            npm ci
        - name: build frontend
          work-dir: ${source.dir}/linstor-gui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Build the frontend
            npm run build
        - name: copy built files
          work-dir: ${source.dir}/linstor-gui
          runs: |
            set -eux -o pipefail

            # Copy built files to target
            mkdir -p "${target.dir}/app"
            cp -r dist/* "${target.dir}/app/"
        - name: prepare for sbom
          work-dir: ${source.dir}/linstor-gui
          runs: |
            set -eux -o pipefail

            # Add version to package.json for SBOM generation
            tmp=$(mktemp)
            jq --arg version "2.4.0" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json
        - name: reinstall dependencies for sbom
          work-dir: ${source.dir}/linstor-gui
          privileged: true
          runs: |
            set -eux -o pipefail

            # Clean and reinstall only production dependencies for accurate SBOM
            rm -rf node_modules
            npm install --omit=dev --ignore-scripts
        - name: generate sbom
          work-dir: ${source.dir}/linstor-gui
          runs: |
            set -eux -o pipefail

            mkdir -p /opt/docker/sbom/linstor-gui
            npm sbom --omit=dev --omit=peer --package-lock-only --sbom-format=spdx \
              > /opt/docker/sbom/linstor-gui/.spdx.linstor-gui.json
        - name: install config files
          runs: |
            set -eux -o pipefail

            # Copy nginx config file
            mkdir -p "${target.dir}/etc/nginx"
            cp ${source.dir}/config/nginx.conf "${target.dir}/etc/nginx/nginx.conf"

            # Copy error page to html directory
            cp ${source.dir}/config/50x.html "${target.dir}/app/50x.html"
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          source: image/linstor-gui/config
        - type: file
          path: ${source.dir}/patch/npm-bumps.json
          uid: 0
          gid: 0
          source: image/linstor-gui/patch/npm-bumps.json
      outputs:
        - source: ${target.dir}/app
          target: /usr/share/nginx/html
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: ${target.dir}/etc/nginx/nginx.conf
          target: /etc/nginx/nginx.conf
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/linstor-gui
          target: /opt/docker/sbom/linstor-gui
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/nginx:1.31.0-debian13@sha256:07477e2829f4f800abcdf369a93c9e5ec5dc4b17b2b86deb44063414aec3cd16
      includes:
        - '**'
      excludes:
        - etc/nginx/nginx.conf
        - etc/passwd
        - usr/share/nginx/html/**
      uid: 65532
      gid: 65532
accounts:
  run-as: nginx
  users:
    - name: nginx
      uid: 65532
      gid: 65532
  groups:
    - name: nginx
      gid: 65532
      members:
        - nginx
    - name: www-data
      gid: 82
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /run
    uid: 65532
    gid: 65532
    mode: "0770"
  - type: directory
    path: /var/cache/nginx
    uid: 65532
    gid: 65532
    mode: "0770"
annotations:
  org.opencontainers.image.description: A minimal LINSTOR GUI image
  org.opencontainers.image.licenses: GPL-3.0
entrypoint:
  - nginx
cmd:
  - -g
  - daemon off;
ports:
  - 8000/tcp
