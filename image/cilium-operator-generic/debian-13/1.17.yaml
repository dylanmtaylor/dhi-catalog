  builds:
    - name: cilium-operator
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      work-dir: /go/src/github.com/cilium/cilium/operator
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/cilium/cilium.git#v1.17.16
            checksum: 383d39c83a022b95ccc1b4738c9e33e63534af34
            path: /go/src/github.com/cilium/cilium
            spdx:
              name: cilium-operator-generic
              version: 1.17.16
              packages:
                - name: cilium-operator-generic
                  purl: pkg:golang/github.com/cilium/cilium@1.17.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies (1.17 only)
          uses: go/bump@v2
          work-dir: /go/src/github.com/cilium/cilium
          with:
