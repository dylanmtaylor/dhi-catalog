# syntax=dhi.io/build:2-debian13

name: Dex 2.x
image: dhi.io/dex
variant: runtime
tags:
  - "2"
  - "2.45"
  - 2.45.1
  - 2-debian13
  - 2.45-debian13
  - 2.45.1-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: 11d2eeb52b42e1980e14cb91e69dd9e3faab2076
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  GOMPLATE_COMMIT_SHA: 0f4c15bc8521939478426bf6ffca4718837b9cb4
  GOMPLATE_VERSION: 5.1.0
  SEMVER_MAJOR_MINOR_VERSION: "2.45"
  SEMVER_MAJOR_VERSION: "2"
  SEMVER_VERSION: 2.45.1
  VERSION: 2.45.1
contents:
  packages:
    - '!base-files'
    - '!gcc-14-base'
    - '!libc6'
    - '!libgcc-s1'
    - libsqlite3-0
  builds:
    - name: gomplate
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/hairyhenderson/gomplate
      contents:
        files:
          - url: git+https://github.com/hairyhenderson/gomplate.git#v5.1.0
            checksum: 0f4c15bc8521939478426bf6ffca4718837b9cb4
            path: /go/src/github.com/hairyhenderson/gomplate
            spdx:
              name: gomplate
              version: 5.1.0
              packages:
                - name: gomplate
                  purl: pkg:golang/github.com/hairyhenderson/gomplate@5.1.0
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - go.opentelemetry.io/otel/sdk@v1.43.0
            download: true
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/hairyhenderson/gomplate/v4/version.GitCommit=0f4c15bc8521939478426bf6ffca4718837b9cb4
              - -X github.com/hairyhenderson/gomplate/v4/version.Version=5.1.0
            output: ${target.dir}/usr/local/bin/gomplate
            packages: ./cmd/gomplate
      outputs:
        - source: ${target.dir}/usr/local/bin/gomplate
          target: /usr/local/bin/gomplate
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/gomplate
          target: /opt/docker/sbom/gomplate
          uid: 0
          gid: 0
    - name: dex
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/dexidp/dex
      contents:
        packages:
          - libsqlite3-dev
        files:
          - url: git+https://github.com/dexidp/dex.git#v2.45.1
            checksum: 11d2eeb52b42e1980e14cb91e69dd9e3faab2076
            path: /go/src/github.com/dexidp/dex
            spdx:
              name: dex
              version: 2.45.1
              packages:
                - name: dex
                  purl: pkg:golang/github.com/dexidp/dex@2.45.1
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/russellhaering/goxmldsig@v1.6.0
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - golang.org/x/net@v0.51.0
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: build dex
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            cgo-enabled: 1
            ldflags:
              - -X main.version=2.45.1
            output: ${target.dir}/usr/local/bin/dex
            packages: ./cmd/dex
            tags: libsqlite3
        - name: build docker-entrypoint
          uses: go/build@v1
          environment:
            GOFLAGS: -buildvcs=false
          with:
            output: ${target.dir}/usr/local/bin/docker-entrypoint
            packages: ./cmd/docker-entrypoint
        - name: install static files
          runs: |
            set -eux -o pipefail

            install -D -m 0644 /go/src/github.com/dexidp/dex/config.docker.yaml '${target.dir}/etc/dex/config.docker.yaml'

            mkdir -p '${target.dir}/srv/dex'
            cp -a /go/src/github.com/dexidp/dex/web '${target.dir}/srv/dex/'
      outputs:
        - source: ${target.dir}/etc/dex
          target: /etc/dex
          uid: 0
          gid: 0
        - source: ${target.dir}/srv/dex/web
          target: /srv/dex/web
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/dex
          target: /usr/local/bin/dex
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/docker-entrypoint
          target: /usr/local/bin/docker-entrypoint
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/dex
          target: /opt/docker/sbom/dex
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /var/dex
    uid: 65532
    gid: 65532
  - type: directory
    path: /etc/dex
    uid: 0
    gid: 0
annotations:
  org.opencontainers.image.description: A minimal Dex image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - docker-entrypoint
cmd:
  - dex
  - serve
  - /etc/dex/config.docker.yaml
ports:
  - 5556/tcp
  - 5558/tcp
