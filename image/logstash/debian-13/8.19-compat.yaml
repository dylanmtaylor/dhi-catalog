          - url: https://repo1.maven.org/maven2/org/bouncycastle/bctls-jdk18on/1.84/bctls-jdk18on-1.84.jar
            checksum: sha256:a0591da70ced0f637f1b7e2df431dd91c3cb7c8511e6f75267e7850b2e293ccc
