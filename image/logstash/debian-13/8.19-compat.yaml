      contents:
        packages:
          - bash
          - coreutils
        files:
          - url: git+https://github.com/elastic/logstash.git#88c68f5a90fa7f09a19a00fce79fa0fa4e9a9d4e
            checksum: 88c68f5a90fa7f09a19a00fce79fa0fa4e9a9d4e
            path: ${source.dir}/logstash
            uid: 0
            gid: 0
      pipeline:
        - name: build env2yaml java
          work-dir: ${source.dir}/logstash/docker/data/logstash/env2yaml
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
            - id: maven_password
              env: MAVEN_PASSWORD
          runs: |
            set -eux -o pipefail

            gradle build
      outputs:
        - source: ${source.dir}/logstash/docker/data/logstash/env2yaml
          target: /usr/share/logstash/env2yaml
          uid: 0
          gid: 0
          mode: "0755"
        - source: ${source.dir}/logstash/docker/data/logstash/env2yaml/env2yaml
          target: /usr/local/bin/env2yaml
          uid: 0
          gid: 0
