    path: /home/cassandra
    uid: 999
    gid: 999
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal K8ssandra Medusa image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - /home/cassandra/docker-entrypoint.sh
