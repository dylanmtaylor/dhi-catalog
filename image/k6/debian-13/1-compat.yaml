# syntax=dhi.io/build:2-debian13

name: Grafana k6 1.x (compat)
image: dhi.io/k6
variant: runtime
flavor: compat
tags:
  - 1-compat
  - 1.7-compat
  - 1.7.1-compat
  - 1-debian13-compat
  - 1.7-debian13-compat
  - 1.7.1-debian13-compat
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 9f82e6f1fc5e806b93459b6189fbd81e4fd6b2ee
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.7"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.7.1
  VERSION: 1.7.1
contents:
  packages:
    - '!base-files'
    - coreutils
    - dash
    - grep
  builds:
    - name: k6
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/grafana/k6
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/grafana/k6.git#v1.7.1
            checksum: 9f82e6f1fc5e806b93459b6189fbd81e4fd6b2ee
            path: /go/src/github.com/grafana/k6
            spdx:
              name: k6
              version: 1.7.1
              packages:
                - name: k6
                  purl: pkg:golang/github.com/grafana/k6@1.7.1
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        - name: test
          privileged: true
          runs: |
            set -eux -o pipefail

            # Exclude browser packages from the test list
            PKGS=$(go list ./... | grep -v "internal/js/modules/k6/browser")

            # Skip flaky tests: TestMachineReadableSummary (known issue #5456), TestEventSystemError, TestEventLoopDoesntCrossIterations, TestEventLoopCrossScenario (flaky with otel SDK v1.40.0)
            SKIP_TESTS="TestMachineReadableSummary|TestEventSystemError|TestEventLoopDoesntCrossIterations|TestEventLoopCrossScenario"
            if [ "${target.fips}" = "true" ]; then
              # The FIPS builder defaults to fips140=only. k6 uses MD5 for
              # non-cryptographic group ID hashing, so override to lenient mode.
              export GODEBUG=fips140=on
              # FIPS rejects TLS 1.0/1.1, CBC cipher suites, and certain ECC curves
              SKIP_TESTS="${SKIP_TESTS}|TestRequestAndBatchTLS"
              # Flaky VU sharing count and non-deterministic tar timestamps under FIPS builder
              SKIP_TESTS="${SKIP_TESTS}|TestExecutionInfoVUSharing|TestUploadTest"
            fi

            for i in {1..5}; do
              if CGO_ENABLED=0 go test -count=1 $PKGS -skip "$SKIP_TESTS"; then
                exit 0
              fi
              echo "Retry $i/5..."
              sleep 2
            done

            exit 1
        - name: build
          uses: go/build@v1
          with:
            output: ${target.dir}/usr/local/bin/k6
      outputs:
        - source: ${target.dir}/usr/local/bin/k6
          target: /usr/local/bin/k6
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/k6
          target: /opt/docker/sbom/k6
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Grafana k6 image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /usr/local/bin/k6
