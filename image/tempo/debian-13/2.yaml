# syntax=dhi.io/build:2-debian13

name: Tempo 2.x
image: dhi.io/tempo
variant: runtime
tags:
  - "2"
  - "2.10"
  - 2.10.5
  - 2-debian13
  - 2.10-debian13
  - 2.10.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 991ce39eb956e9ed771fcffe05eff42d33de27ba
  DEBIAN_EPOCH_MAJOR_MINOR_VERSION: "2.10"
  DEBIAN_EPOCH_MAJOR_VERSION: "2"
  DEBIAN_EPOCH_VERSION: 2.10.5
  FIPS_SUFFIX: ""
  GO_DIGEST: sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  GO_VERSION: 1.26.3
  VERSION: 2.10.5
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
  builds:
    - name: tempo
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      contents:
        packages:
          - bash
          - hostname
          - make
          - sed
        files:
          - url: git+https://github.com/grafana/tempo.git#v2.10.5
            checksum: 991ce39eb956e9ed771fcffe05eff42d33de27ba
            path: ${source.dir}/tempo
            spdx:
              name: tempo
              version: 2.10.5
              packages:
                - name: tempo
                  purl: pkg:dhi/tempo@2.10.5
                  license: AGPL-3.0
            uid: 0
            gid: 0
      pipeline:
        - name: bump go dependencies
          uses: go/bump@v1
          work-dir: ${source.dir}/tempo
          with:
            deps:
              - github.com/apache/thrift@v0.23.0
              - golang.org/x/net@v0.53.0
            tidy: true
        - name: install
          work-dir: ${source.dir}/tempo
          runs: |
            set -eux -o pipefail

            go mod tidy
            go mod vendor

            make tempo

            mkdir -p "${target.dir}/opt/tempo"
            cp "bin/linux/tempo-${target.arch}" "${target.dir}/opt/tempo/tempo"

            mkdir -p "${target.dir}/etc/tempo"
            cp "tools/packaging/tempo.yaml" "${target.dir}/etc/tempo/config.yaml"
      outputs:
        - source: ${target.dir}/opt/tempo
          target: /opt/tempo
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/tempo
          target: /etc/tempo
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tempo
          target: /opt/docker/sbom/tempo
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /var/tempo
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Tempo image
  org.opencontainers.image.licenses: AGPL-3.0
entrypoint:
  - /opt/tempo/tempo
cmd:
  - -config.file=/etc/tempo/config.yaml
ports:
  - 3200/tcp
