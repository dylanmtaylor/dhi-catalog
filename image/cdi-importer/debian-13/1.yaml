vars:
  BASE_REFERENCE: dhi/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
  COMMIT_SHA: d97a33c2f063258d14c6df27d297e84e3f48b779
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
  SEMVER_MAJOR_MINOR_VERSION: "1.65"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.65.0
  VERSION: 1.65.0
contents:
  repositories:
    - deb [signed-by=/usr/share/keyrings/dhi-deb-main.gpg] http://dhi.io/deb/debian/main trixie main
  keyring:
    - https://dhi.io/keyring/dhi-deb-els-gpg.D46852F6925E9F71.key
  packages:
    - '!base-files'
    - '!libc6'
    - ca-certificates
    - libnbd0
    - nbdkit
    - qemu-utils
  builds:
    - name: cdi-importer
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
      work-dir: /go/src/kubevirt.io/containerized-data-importer
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - libnbd-dev
          - pkg-config
        files:
          - url: git+https://github.com/kubevirt/containerized-data-importer.git#v1.65.0
            checksum: d97a33c2f063258d14c6df27d297e84e3f48b779
            path: /go/src/kubevirt.io/containerized-data-importer
            spdx:
              name: cdi-importer
              version: 1.65.0
              packages:
                - name: cdi-importer
                  purl: pkg:golang/kubevirt.io/containerized-data-importer@1.65.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch vulnerable Go dependencies
          uses: go/bump@v1
          work-dir: /go/src/kubevirt.io/containerized-data-importer
          environment:
            GOWORK: "off"
          with:
            deps:
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/ulikunitz/xz@v0.5.15
              - go.opentelemetry.io/otel@v1.41.0
            download: true
        - name: patch grpc CVE
          privileged: true
          environment:
            GODEBUG: ""
            GOFIPS140: ""
          runs: |
            set -eux -o pipefail

            # grpc@v1.79.3 transitives require go >= 1.25; upstream go.work still says 1.24.0
            if [ -f go.work ]; then
              go work edit -go=1.25.0
            fi

            go get google.golang.org/grpc@v1.79.3 # CVE-2026-33186

            go mod tidy
            # requires manual patch due to go/bump not supporting GOWORK=true (uses go mod vendor)
            if [ -f go.work ]; then
              go work vendor
            else
              go mod vendor
            fi
        - name: test
          environment:
            GOWORK: "off"
          runs: |
            set -eux -o pipefail

            go test ./pkg/importer/...
        - name: build
          uses: go/build@v1
          environment:
            GOWORK: "off"
          with:
            cgo_enabled: 1
            ldflags:
              - -X kubevirt.io/containerized-data-importer/pkg/version.gitVersion=v1.65.0
              - -X kubevirt.io/containerized-data-importer/pkg/version.gitCommit=d97a33c2f063258d14c6df27d297e84e3f48b779
            output: ${target.dir}/usr/local/bin/cdi-importer
            packages: ./cmd/cdi-importer
      outputs:
        - source: ${target.dir}/usr/local/bin/cdi-importer
          target: /usr/local/bin/cdi-importer
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/cdi-importer
          target: /opt/docker/sbom/cdi-importer
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
