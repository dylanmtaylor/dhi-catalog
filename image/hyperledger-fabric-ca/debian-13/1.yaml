  COMMIT_SHA: 0727b136fc5e89dc349de5cfcf3e99f5a59fd03a
  GO_REFERENCE: dhi/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
  SEMVER_MAJOR_MINOR_VERSION: "1.5"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.5.20
  VERSION: 1.5.20
contents:
  packages:
    - '!base-files'
    - ca-certificates
  builds:
    - name: hyperledger-fabric-ca
      uses: dhi.io/golang:1.25.10-debian13-dev@sha256:375eb677024bb497cf14a3a63048d5b63e800451878d3fca7a3dd5970b9baec0
      contents:
        packages:
          - build-essential
          - curl
          - gcc
          - git
          - grep
          - gzip
          - make
        files:
          - url: git+https://github.com/hyperledger/fabric-ca.git#v1.5.20
            checksum: 0727b136fc5e89dc349de5cfcf3e99f5a59fd03a
            path: /go/src/github.com/hyperledger/fabric-ca
            spdx:
              name: fabric-ca
              version: 1.5.20
              packages:
                - name: fabric-ca
                  purl: pkg:golang/github.com/hyperledger/fabric-ca@1.5.20
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            deps:
              - google.golang.org/grpc@v1.79.3
            download: true
        - name: go test
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "${target.fips}" = "true" ]; then
              export GODEBUG='fips140=on'
            fi

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...

            CGO_ENABLED=1 go test \
              -timeout 15m -p 1 \
              -tags pkcs11 \
              ./cmd/fabric-ca-server/... ./cmd/fabric-ca-client/...
        - name: go build server
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.20
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-server
            packages: ./cmd/fabric-ca-server
            tags:
              - pkcs11
        - name: go build client
          uses: go/build@v1
          work-dir: /go/src/github.com/hyperledger/fabric-ca
          with:
            cgo_enabled: 1
            ldflags:
              - -s
              - -w
              - -X github.com/hyperledger/fabric-ca/lib/metadata.Version=1.5.20
              - -linkmode external
              - -extldflags -lpthread
            output: ${target.dir}/usr/local/bin/fabric-ca-client
            packages: ./cmd/fabric-ca-client
            tags:
              - pkcs11
              - caclient
      outputs:
        - source: ${target.dir}/usr/local/bin/fabric-ca-server
          target: /usr/local/bin/fabric-ca-server
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin/fabric-ca-client
          target: /usr/local/bin/fabric-ca-client
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/fabric-ca
          target: /opt/docker/sbom/fabric-ca
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-glibc-debian13@sha256:03c0bb735cf243aac5adbb9da6f1ffea6f157a17531573b8c5f8e1329a3cc724
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
