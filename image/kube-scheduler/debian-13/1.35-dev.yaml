            ./hack/pin-dependency.sh github.com/opencontainers/selinux v1.13.0
            ./hack/pin-dependency.sh go.opentelemetry.io/otel/sdk v1.43.0
            ./hack/pin-dependency.sh google.golang.org/grpc v1.79.3
            ./hack/update-vendor.sh
        - name: clean git state
          privileged: true
          runs: |
            set -eux -o pipefail

            git add -A
            git -c user.name=build -c user.email=build@build commit -q -m "dependency updates" --no-verify
            git tag -f "v1.35.5"
        - name: build
          runs: |
            set -eux -o pipefail

            make WHAT=cmd/kube-scheduler DBG=${DBG}
        - name: install
          runs: |
            set -eux -o pipefail

            install -D -m 0755 _output/bin/kube-scheduler \
              '${target.dir}/usr/local/bin/kube-scheduler'
        - name: smoke test
          runs: |
            set -eux -o pipefail

            ${target.dir}/usr/local/bin/kube-scheduler --help > /dev/null
            ${target.dir}/usr/local/bin/kube-scheduler --version
