                  purl: pkg:golang/k8s.io/kubernetes@1.35.5
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          environment:
            GOWORK: "off"
          with:
            deps: []
            download: true
        - name: update dependencies
          privileged: true
          runs: |
            set -eux -o pipefail

