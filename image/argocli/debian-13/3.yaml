tags:
  - "3"
  - "3.7"
  - 3.7.14
  - 3-debian13
  - 3.7-debian13
  - 3.7.14-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: ca37b537cd34d18029146a755bf42a9b2364c49b
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  MODULE_MAJOR_VERSION: v3
  NODE_REF: dhi/node:20.20.2-debian13-dev@sha256:df6490e4b2699302596709ee23dfe72e7b2fc5d0c6dae1de89806c1ea34d632f
  SEMVER_MAJOR_MINOR_VERSION: "3.7"
  SEMVER_MAJOR_VERSION: "3"
  SEMVER_VERSION: 3.7.14
  VERSION: 3.7.14
contents:
  packages:
    - '!base-files'
    - ca-certificates
  builds:
    - name: argocli
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/argoproj/argo-workflows
      contents:
        files:
          - url: git+https://github.com/argoproj/argo-workflows.git#v3.7.14
            checksum: ca37b537cd34d18029146a755bf42a9b2364c49b
            path: /go/src/github.com/argoproj/argo-workflows
            spdx:
              name: argocli
              version: 3.7.14
              packages:
                - name: argocli
                  purl: pkg:golang/github.com/argoproj/argo-workflows@3.7.14
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/node:20.20.2-debian13-dev@sha256:df6490e4b2699302596709ee23dfe72e7b2fc5d0c6dae1de89806c1ea34d632f
            includes:
              - opt/nodejs
              - opt/yarn
              - usr/local/bin/node
              - usr/local/bin/yarn
            uid: 0
            gid: 0
      pipeline:
        - name: patch
          uses: go/bump@v1
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/expr-lang/expr@v1.17.7
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            tidy: true
        - name: patch (3 only)
          uses: go/bump@v1
          with:
            deps:
              - github.com/cloudflare/circl@v1.6.3
              - github.com/expr-lang/expr@v1.17.7
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v3@v3.0.5
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/jackc/pgx/v5@v5.9.2
              - github.com/moby/spdystream@v0.5.1
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            echo "Testing core functionality after patching..."

            # Test core workflow functionality
            go test -v -count=1 -timeout=3m ./workflow/validate -run="TestDAG"
            go test -v -count=1 -timeout=3m ./workflow/common

            # Test all util packages except telemetry (which fails due to network requirements)
            UTIL_PACKAGES=$(go list ./util/... | grep -v './util/telemetry')
            go test -v -count=1 -timeout=4m $UTIL_PACKAGES
        - name: build ui
          work-dir: /go/src/github.com/argoproj/argo-workflows/ui
          privileged: true
          runs: |
            set -eux -o pipefail

            export JOBS=max
            yarn install --network-timeout 1000000

            export YARN_CACHE_FOLDER=/root/.yarn
            export NODE_OPTIONS="--max-old-space-size=2048"
            yarn build
        - name: build
          uses: go/build@v1
          with:
            ldflags:
              - -X github.com/argoproj/argo-workflows/v3.version=3.7.14
              - -X github.com/argoproj/argo-workflows/v3.gitCommit=ca37b537cd34d18029146a755bf42a9b2364c49b
            output: ${target.dir}/usr/local/bin/argo
            packages: ./cmd/argo
      outputs:
        - source: ${target.dir}/usr/local/bin/argo
          target: /usr/local/bin/argo
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/argocli
          target: /opt/docker/sbom/argocli
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: argocli
  users:
    - name: argocli
      uid: 8737
      gid: 8737
  groups:
    - name: argocli
      gid: 8737
      members:
        - argocli
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
annotations:
  org.opencontainers.image.description: A minimal Argo CLI image
  org.opencontainers.image.licenses: Apache-2.0
entrypoint:
  - argo
