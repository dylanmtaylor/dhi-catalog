          uses: git/patch@v1
          work-dir: /go/src/github.com/grafana/agent
          with:
            patch: /go/src/patch/fix-semconv-schema-url.patch
        - name: patch-go
          uses: go/bump@v1
          work-dir: /go/src/github.com/grafana/agent
          with:
            deps:
              - github.com/apache/thrift@v0.23.0
              - github.com/aws/aws-sdk-go@v1.55.5
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
