              - -X github.com/grafana/agent/internal/build.Revision=cb392a39d69999610e33c4c2b129cb4198e01bb2
              - -X github.com/grafana/agent/internal/build.BuildDate=$(date -ud @${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
