          work-dir: /go/src/github.com/grafana/agent
          privileged: true
          runs: |
            set -eux -o pipefail

            # FIPS builder defaults to fips140=only; upstream tests use MD5 in paths that panic in strict mode.
            if [ "${target.fips}" = "true" ]; then
              export GODEBUG=fips140=on
            fi

            # TestCache (loki/relabel) fails in DHI pipeline builds; skip like other upstream-only tests.
            CGO_ENABLED=0 go test \
              -skip='TestConvertErrors|Test_TopicDiscovery|TestCache' \
              $(go list ./... | grep -v 'internal/cmd/integration-tests' | grep -v 'agent/internal/flow')
