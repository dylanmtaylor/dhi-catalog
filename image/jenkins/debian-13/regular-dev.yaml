  - linux/arm64
vars:
  BCFIPS_VERSION: 2.1.2
  BCPKIXFIPS_VERSION: 2.1.10
  BCRNGJENT_VERSION: 1.3.6
  BCTLSFIPS_VERSION: 2.1.22
  BCUTILFIPS_VERSION: 2.1.5
  BUILD_JDK_DIGEST: sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  BUILD_JDK_REF: dhi/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
  BUILD_JDK_VERSION: 21.0.11.10
  COMMIT_SHA: 0795dd3a7c9a2c20f15592529d21852145e67e62
  DOCKER_REPO_COMMIT_SHA: 000a9c34e417ee8142cbcfd6b17992c8cfa8caf6
