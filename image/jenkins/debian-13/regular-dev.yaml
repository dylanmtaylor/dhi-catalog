  JDK_MAJOR_VERSION: "21"
  JRE_DIGEST: sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JRE_REF: dhi/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
  JRE_VERSION: 21.0.11.10
  LIBPNG_REF: dhi/pkg-libpng:1.6.58-debian13@sha256:8dc77002ab5113f0f6bdfae2aefe42108bf2264e26d1f6aabdfe585d57da4989
  MAVEN_DIGEST: sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  MAVEN_REF: dhi/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
  MAVEN_VERSION: 3.9.16
  SEMVER_MAJOR_MINOR_VERSION: "2.565"
  SEMVER_MAJOR_VERSION: "2"
  VERSION: "2.565"
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - fontconfig
    - fonts-dejavu-core
    - git
    - grep
    - libc-bin
    - libpng16-16t64
    - mawk
    - openssh-client
    - perl-base
    - procps
    - sed
    - tini
    - tzdata
    - unzip
    - util-linux
  builds:
    - name: jenkins
      uses: dhi.io/eclipse-temurin:21.0.11.10-jdk-debian13-dev@sha256:94af871b695a132ebc47af06f5acb29aa53632092047e5622a4fd6b2c85ecc34
      caches:
        - path: /root/.m2/repository
      contents:
        packages:
          - coreutils
          - findutils
          - bash
          - curl
          - git
          - gzip
          - sed
          - tar
          - unzip
          - zip
        files:
          - url: git+https://github.com/jenkinsci/jenkins.git#jenkins-2.565
            checksum: 0795dd3a7c9a2c20f15592529d21852145e67e62
            path: ${source.dir}/jenkins
            spdx:
              name: jenkins
              version: "2.565"
              packages:
                - name: jenkins
                  purl: pkg:dhi/jenkins@2.565
                  license: MIT
            uid: 0
            gid: 0
          - url: git+https://github.com/jenkinsci/docker.git#000a9c34e417ee8142cbcfd6b17992c8cfa8caf6
            checksum: 000a9c34e417ee8142cbcfd6b17992c8cfa8caf6
            path: ${source.dir}/docker-builds
            uid: 0
            gid: 0
          - url: https://repo1.maven.org/maven2/org/apache/mina/mina-core/2.2.7/mina-core-2.2.7.jar
            checksum: sha256:b4fed29776eaf632144aca9471ed867d3105631e87ff8dd4cb85669eeb3e5c58
            path: ${source.dir}/patch/deps/mina-core-2.2.7.jar
            spdx:
              name: mina-core
              version: 2.2.7
              packages:
                - name: mina-core
                  purl: pkg:maven/org.apache.mina/mina-core@2.2.7
                  license: Apache-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/maven:3.9.16-jdk21-debian13-dev@sha256:fd18a70a9943afff0d097431142e99d61535f118984959513de4c42164a59b57
            includes:
              - opt/**
              - usr/local/bin/**
            uid: 0
            gid: 0
      pipeline:
        - uses: mvn/mirror@v1
        - name: build
          work-dir: ${source.dir}/jenkins
          privileged: true
          secrets:
            - id: maven_user
              env: MAVEN_USER
              optional: true
            - id: maven_password
              env: MAVEN_PASSWORD
              optional: true
          runs: |
            set -eux -o pipefail

            mvn clean install -DskipTests -Dmaven.test.skip=true -Dspotless.check.skip=true
        - name: patch bundled mina-core
          work-dir: ${source.dir}/jenkins
          runs: |
            set -eux -o pipefail

            patch_dir="$(mktemp -d)"
            trap 'rm -rf "${patch_dir}"' EXIT

            war_file="war/target/jenkins.war"
            hpi_path="WEB-INF/detached-plugins/mina-sshd-api-core.hpi"
            old_mina_path="WEB-INF/lib/mina-core-2.2.4.jar"
            new_mina_path="WEB-INF/lib/mina-core-2.2.7.jar"

            unzip -q "${war_file}" "${hpi_path}" -d "${patch_dir}"
            hpi_file="${patch_dir}/${hpi_path}"

            if jar tf "${hpi_file}" | grep -q "${old_mina_path}"; then
              zip -q -d "${hpi_file}" "${old_mina_path}"
            fi

            mkdir -p "${patch_dir}/hpi-overlay/WEB-INF/lib"
            cp "${source.dir}/patch/deps/mina-core-2.2.7.jar" "${patch_dir}/hpi-overlay/${new_mina_path}"
            (cd "${patch_dir}/hpi-overlay" && jar --update --file "${hpi_file}" "${new_mina_path}")

            if jar tf "${hpi_file}" | grep -q "${old_mina_path}"; then
              echo "ERROR: ${old_mina_path} is still present in ${hpi_path}" >&2
              exit 1
            fi
            jar tf "${hpi_file}" | grep -q "${new_mina_path}"

            (cd "${patch_dir}" && jar --update --file "${source.dir}/jenkins/${war_file}" "${hpi_path}")

            unzip -p "${war_file}" "${hpi_path}" > "${patch_dir}/verified-mina-sshd-api-core.hpi"
            if jar tf "${patch_dir}/verified-mina-sshd-api-core.hpi" | grep -q "${old_mina_path}"; then
              echo "ERROR: ${old_mina_path} is still present in repacked ${war_file}" >&2
              exit 1
            fi
            jar tf "${patch_dir}/verified-mina-sshd-api-core.hpi" | grep -q "${new_mina_path}"
        - name: install
          work-dir: ${source.dir}/jenkins
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/share/jenkins"
            cp war/target/jenkins.war "${target.dir}/usr/share/jenkins/jenkins.war"
        - name: copy-entrypoint-scripts
          work-dir: ${source.dir}/docker-builds
          runs: |
            set -eux -o pipefail

            mkdir -p "${target.dir}/usr/local/bin"
            mkdir -p "${target.dir}/usr/share/jenkins/ref/init.groovy.d"

            # Copy jenkins.sh entrypoint script from upstream docker repo
            cp jenkins.sh "${target.dir}/usr/local/bin/jenkins.sh"

            # Copy jenkins-support script (required by jenkins.sh)
            cp jenkins-support "${target.dir}/usr/local/bin/jenkins-support"
      outputs:
        - source: ${target.dir}/usr/share/jenkins
          target: /usr/share/jenkins
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
          mode: "0755"
        - source: /opt/docker/sbom/jenkins
          target: /opt/docker/sbom/jenkins
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/share/jenkins/ref
          target: /usr/share/jenkins/ref
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:21.0.11.10-debian13@sha256:1a1dbb27530b1f279f8ca73354a3da9b8d64b8c9a5540a3e58b3030eb8322f3d
      includes:
        - opt/**
        - usr/local/bin/**
      uid: 0
      gid: 0
