# syntax=dhi.io/build:2-debian13

name: Tailscale 1.x (dev)
image: dhi.io/tailscale
variant: dev
tags:
  - 1-dev
  - 1.98-dev
  - 1.98.2-dev
  - 1-debian13-dev
  - 1.98-debian13-dev
  - 1.98.2-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 34c530668cb05fa60b3d707a44b70460344789ef
  GO_VERSION: 1.26.3
  GOLANG_REFERENCE: dhi/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
  SEMVER_MAJOR_MINOR_VERSION: "1.98"
  SEMVER_MAJOR_VERSION: "1"
  SEMVER_VERSION: 1.98.2
  TS_VERSION: 1.98.2-t34c53066
  VERSION: 1.98.2
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - base-files
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - iproute2
    - iptables
    - iputils-ping
    - libc-bin
    - mawk
    - perl-base
    - sed
    - util-linux
  builds:
    - name: tailscale
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/tailscale.com
      caches:
        - path: /go/pkg/mod
      contents:
        files:
          - url: git+https://github.com/tailscale/tailscale.git#v1.98.2
            checksum: 34c530668cb05fa60b3d707a44b70460344789ef
            path: /go/src/tailscale.com
            spdx:
              name: tailscale
              version: 1.98.2
              packages:
                - name: tailscale
                  purl: pkg:dhi/tailscale@1.98.2
                  license: BSD-3-Clause
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v1
          with:
            deps:
              - golang.org/x/image@v0.39.0
              - golang.org/x/net@v0.53.0
            download: true
        - name: build
          runs: |
            set -eux -o pipefail

            GOLDFLAGS='-X tailscale.com/version.Version=1.98.2
                       -X tailscale.com/version.shortStamp=1.98.2
                       -X tailscale.com/version.longStamp=1.98.2-t34c53066
                       -X tailscale.com/version.gitCommitStamp=34c530668cb05fa60b3d707a44b70460344789ef'

            mkdir -p '${target.dir}/usr/local/bin'
            for cmd in tailscale tailscaled containerboot; do
              CGO_ENABLED=0 go build \
                -tags='ts_kube,ts_package_container' \
                -ldflags="$GOLDFLAGS" \
                -o "${target.dir}/usr/local/bin/${cmd}" "./cmd/${cmd}"
            done
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/tailscale
          target: /opt/docker/sbom/tailscale
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
  - type: symlink
    path: /usr/sbin/iptables
    uid: 0
    gid: 0
    source: iptables-legacy
  - type: symlink
    path: /usr/sbin/ip6tables
    uid: 0
    gid: 0
    source: ip6tables-legacy
annotations:
  com.docker.dhi.runtime-root-required: "true"
  org.opencontainers.image.description: A minimal Tailscale image
  org.opencontainers.image.licenses: BSD-3-Clause
entrypoint:
  - containerboot
