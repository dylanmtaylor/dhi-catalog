# syntax=dhi.io/build:2-debian13

name: LocalStack 4.14.x (dev)
image: dhi.io/localstack
variant: dev
tags:
  - 4-dev
  - 4.14-dev
  - 4.14.0-dev
  - 4-debian13-dev
  - 4-python3.13-dev
  - 4.14-debian13-dev
  - 4.14-python3.13-dev
  - 4.14.0-debian13-dev
  - 4.14.0-python3.13-dev
  - 4-python3.13-debian13-dev
  - 4.14-python3.13-debian13-dev
  - 4.14.0-python3.13-debian13-dev
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: 3d5a0c70e0fe2eb0864447c882454d33b406ba8a
  PYTHON_BUILD_REFERENCE: dhi/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
  PYTHON_MAJOR_MINOR_VERSION: "3.13"
  PYTHON_REFERENCE: dhi/python:3.13.13-debian13@sha256:a87c4bc7bbf75da7d5bb1816f2bdf7640c17eeb42d3ba84c5201827977da8de4
  PYTHON_VERSION: 3.13.13
  SEMVER_MAJOR_MINOR_VERSION: "4.14"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.14.0
  VERSION: 4.14.0
contents:
  packages:
    - '!gawk'
    - '!libelogind0'
    - '!original-awk'
    - apt
    - bash
    - ca-certificates
    - coreutils
    - diffutils
    - dpkg
    - findutils
    - grep
    - iproute2
    - iputils-ping
    - libc-bin
    - mawk
    - perl-base
    - sed
    - unzip
    - util-linux
  builds:
    - name: localstack
      uses: dhi.io/python:3.13.13-debian13-dev@sha256:09682ab25f895adc2ffa36f6ddc2543ccb20edce5dbde91b5e8edd1476335325
      contents:
        packages:
          - ca-certificates
          - coreutils
          - git
          - sed
          - '!libexpat1'
        files:
          - url: git+https://github.com/localstack/localstack.git#v4.14.0
            checksum: 3d5a0c70e0fe2eb0864447c882454d33b406ba8a
            path: ${source.dir}/localstack
            spdx:
              name: localstack
              version: 4.14.0
              packages:
                - name: localstack
                  purl: pkg:dhi/localstack@4.14.0
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install
          work-dir: ${source.dir}/localstack
          privileged: true
          runs: |
            set -eux -o pipefail

            export VIRTUAL_ENV='${target.dir}/opt/localstack'
            python3 -m venv "$VIRTUAL_ENV"

            # Align with upstream Dockerfile: pyproject name is localstack-core (setuptools-scm env).
            export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_LOCALSTACK_CORE="4.14.0"
            "$VIRTUAL_ENV/bin/python3" - << 'PY'
            from pathlib import Path

            replacements = {
                "localstack-core/localstack/aws/protocol/parser.py": [
                    (
                        "# cbor2: explicitly load from private _decoder module to avoid using the (non-patched) C-version\nfrom cbor2._decoder import loads as cbor2_loads\n",
                        "# cbor2>=5.9 removed the private _decoder module; fall back to the public loader.\ntry:\n    from cbor2._decoder import loads as cbor2_loads\nexcept ModuleNotFoundError:\n    from cbor2 import loads as cbor2_loads\n",
                    ),
                ],
                "localstack-core/localstack/aws/protocol/serializer.py": [
                    (
                        "from cbor2._encoder import dumps as cbor2_dumps\n",
                        "try:\n    from cbor2._encoder import dumps as cbor2_dumps\nexcept ModuleNotFoundError:\n    from cbor2 import dumps as cbor2_dumps\n",
                    ),
                ],
                "localstack-core/localstack/aws/client.py": [
                    (
                        "            # cbor2: explicitly load from private _decoder module to avoid using the (non-patched) C-version\n            from cbor2._decoder import loads\n",
                        "            # cbor2>=5.9 removed the private _decoder module; fall back to the public loader.\n            try:\n                from cbor2._decoder import loads\n            except ModuleNotFoundError:\n                from cbor2 import loads\n",
                    ),
                    (
                        "    from cbor2._decoder import CBORDecodeValueError, semantic_decoders\n    from cbor2._encoder import CBOREncodeValueError, default_encoders\n    from cbor2._types import CBORTag\n",
                        "    try:\n        from cbor2._decoder import CBORDecodeValueError, semantic_decoders\n        from cbor2._encoder import CBOREncodeValueError, default_encoders\n        from cbor2._types import CBORTag\n    except ModuleNotFoundError:\n        return\n",
                    ),
                ],
            }

            for relpath, pairs in replacements.items():
                path = Path(relpath)
                text = path.read_text()
                for old, new in pairs:
                    if old not in text:
                        raise SystemExit(f"expected block not found in {path}")
                    text = text.replace(old, new)
                path.write_text(text)
            PY
            "$VIRTUAL_ENV/bin/python3" -m pip install -r requirements-runtime.txt
            "$VIRTUAL_ENV/bin/python3" -m pip install -e .[runtime]
            # Install the CLI launcher without dependencies: runtime comes from localstack-core.
            "$VIRTUAL_ENV/bin/python3" -m pip install --no-deps "localstack==4.14.0"

            # aws.spec uses host-mode dirs under localstack-core/.filesystem/... (see Directories.for_host).
            mkdir -p localstack-core/.filesystem/usr/lib/localstack

            # Generate AWS service catalog cache like upstream final stage.
            "$VIRTUAL_ENV/bin/python3" -m localstack.aws.spec

            # Container runtime reads static_libs from /usr/lib/localstack -> /opt/localstack (venv root).
            find localstack-core/.filesystem/usr/lib/localstack -maxdepth 1 -name 'service-catalog-*.dill' -exec cp {} "${VIRTUAL_ENV}/" \;

            # Patch CVEs
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'joserfc>=1.6.3'       # Fix CVE-2026-27932
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'pyopenssl>=26.0.0'    # Fix CVE-2026-27459, CVE-2026-27448
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'pyasn1>=0.6.3'        # Fix CVE-2026-30922
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'multipart>=1.3.1'     # Fix CVE-2026-28356
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'cbor2>=5.9.0'         # Fix CVE-2026-26209
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'requests>=2.33.0'     # Fix CVE-2026-25645
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'urllib3>=2.7.0'       # Fix CVE-2026-44432, CVE-2026-44431
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'cryptography>=46.0.7' # Fix CVE-2026-39892, CVE-2026-34073
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'python-dotenv>=1.2.2' # Fix CVE-2026-28684
            "$VIRTUAL_ENV/bin/python3" -m pip install --upgrade 'pygments>=2.20.0'     # Fix CVE-2026-4539

            "$VIRTUAL_ENV/bin/python3" -m pip uninstall -y pip

            mkdir -p '${target.dir}/usr/lib'
            ln -s /opt/localstack '${target.dir}/usr/lib/localstack'
        - name: remove java
          runs: |
            set -eux -o pipefail

            rm -rf ${target.dir}/opt/localstack/lib/python3.13/site-packages/amazon_kclpy/jars
        - name: create symlinks
          runs: |
            set -eux -o pipefail

            find '${target.dir}/opt/localstack/bin' -type f -executable -exec sed -i '1s|^#!${target.dir}|#!|' {} +
            mkdir -p '${target.dir}/usr/local/bin'
            ln -s ../../../opt/localstack/bin/localstack{,-supervisor} '${target.dir}/usr/local/bin'
      outputs:
        - source: ${target.dir}/opt/localstack
          target: /opt/localstack
          uid: 0
          gid: 0
        - source: ${source.dir}/localstack/localstack-core
          target: /src/localstack/localstack-core
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/local
          target: /usr/local
          uid: 0
          gid: 0
        - source: ${target.dir}/usr/lib
          target: /usr/lib
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/localstack
          target: /opt/docker/sbom/localstack
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/python:3.13.13-debian13@sha256:a87c4bc7bbf75da7d5bb1816f2bdf7640c17eeb42d3ba84c5201827977da8de4
      includes:
        - opt/**
        - usr/**
      uid: 0
      gid: 0
accounts:
  root: true
  run-as: root
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: _apt
      uid: 42
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  DEBIAN_FRONTEND: noninteractive
paths:
