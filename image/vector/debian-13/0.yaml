# syntax=dhi.io/build:2-debian13

name: Vector 0.55.x
image: dhi.io/vector
variant: runtime
tags:
  - "0"
  - "0.55"
  - 0.55.0
  - 0-debian13
  - 0.55-debian13
  - 0.55.0-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COMMIT_SHA: cf8de830c6060629092397fd2334fc0f0219363a
  RUST_REFERENCE: dhi/rust:1.95.0-debian13-dev@sha256:1e64686b22eb66e73775d799a68b9e647267d93b9966b969216448da6b9620e1
  SEMVER_MAJOR_MINOR_VERSION: "0.55"
  SEMVER_MAJOR_VERSION: "0"
  SEMVER_VERSION: 0.55.0
  VERSION: 0.55.0
contents:
  packages:
    - '!libelogind0'
    - '!mawk'
    - '!original-awk'
    - base-files
    - libsasl2-2
  builds:
    - name: vector
      uses: dhi.io/rust:1.95.0-debian13-dev@sha256:1e64686b22eb66e73775d799a68b9e647267d93b9966b969216448da6b9620e1
      contents:
        packages:
          - build-essential
          - curl
          - git
          - pkg-config
          - libssl-dev
          - libclang-dev
          - cmake
          - protobuf-compiler
          - grep
          - sed
          - gzip
          - bash
          - coreutils
          - findutils
          - ca-certificates
          - libsasl2-dev
        files:
          - url: git+https://github.com/vectordotdev/vector.git#v0.55.0
            checksum: cf8de830c6060629092397fd2334fc0f0219363a
            path: ${source.dir}/vector-cf8de830c6060629092397fd2334fc0f0219363a
            spdx:
              name: vector
              version: 0.55.0
              packages:
                - name: vector
                  purl: pkg:dhi/vector@0.55.0
                  license: MPL-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: patch source
          uses: patch@v1
          work-dir: ${source.dir}/vector-cf8de830c6060629092397fd2334fc0f0219363a
          privileged: true
          with:
            options: -p1
            patches:
              - ${source.dir}/patch/allow_dead_code.patch
              - ${source.dir}/patch/allow_unstable_name_collisions.patch
        - name: bump cargo dependencies
          work-dir: ${source.dir}/vector-cf8de830c6060629092397fd2334fc0f0219363a
          privileged: true
          runs: |
            set -eux -o pipefail

            # CVE-2026-42327, CVE-2026-44662 → openssl ≥0.10.79
            sed -i '/^openssl = /s/version = "[^"]*"/version = ">=0.10.79, <0.11"/' Cargo.toml

            # Update dependencies to pull in patched versions
            cargo update --ignore-rust-version --recursive openssl
        - name: ui sbom
          uses: sbom@v1
          with:
            extra-scanners: rust-cargo-lock-cataloger
            prefix: vector-cargo
            source: ${source.dir}/vector-cf8de830c6060629092397fd2334fc0f0219363a
        - name: build and install
          work-dir: ${source.dir}/vector-cf8de830c6060629092397fd2334fc0f0219363a
          privileged: true
          runs: |
            set -eux -o pipefail

            cargo build --release --no-default-features --features default

            install -D target/release/vector \
              '${target.dir}/usr/local/bin/vector'
            install -D -m 0644 -o 65532 -g 65532 config/vector.yaml \
              '${target.dir}/etc/vector/vector.yaml'
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: image/vector/patch
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/etc/vector
          target: /etc/vector
          uid: 65532
          gid: 65532
          mode: "0755"
        - source: /opt/docker/sbom/vector
          target: /opt/docker/sbom/vector
          uid: 0
          gid: 0
        - source: /opt/docker/sbom/vector-cargo
          target: /opt/docker/sbom/vector-cargo
          uid: 0
          gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
paths:
  - type: directory
    path: /var/lib/vector
    uid: 65532
    gid: 65532
    mode: "0755"
annotations:
  org.opencontainers.image.description: A minimal Vector observability data pipeline
  org.opencontainers.image.licenses: MPL-2.0
entrypoint:
  - /usr/local/bin/vector
cmd:
  - --config
  - /etc/vector/vector.yaml
ports:
  - 8686/tcp
