  builds:
    - name: zot
      uses: dhi.io/golang:1.26.3-debian13-dev@sha256:fd3180feff08929120077efe8799d54693a9861006cf400e5788591948f7402d
      work-dir: /go/src/github.com/project-zot/zot
      contents:
        files:
          - url: git+https://github.com/project-zot/zot.git#v2.1.16
            checksum: b47b643e05bab5c2d7fc0466d11ec5842a9d269c
            path: /go/src/github.com/project-zot/zot
            spdx:
              name: zot
              version: 2.1.16
              packages:
                - name: zot
                  purl: pkg:golang/github.com/project-zot/zot/v2@2.1.16
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update go dependencies
          uses: go/bump@v2
          with:
            deps:
              - github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
              - github.com/Azure/go-ntlmssp@v0.1.1
              - github.com/go-git/go-git/v5@v5.19.0
              - github.com/go-jose/go-jose/v4@v4.1.4
              - github.com/in-toto/in-toto-golang@v0.11.0
              - github.com/moby/buildkit@v0.28.1
              - github.com/sigstore/timestamp-authority/v2@v2.0.6
              - go.opentelemetry.io/otel/sdk@v1.43.0
              - github.com/hashicorp/go-getter@v1.8.6
              - go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
              - go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
              - go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
              - github.com/distribution/distribution/v3@v3.1.1
              - helm.sh/helm/v3@v3.20.2
            tidy: true
        - uses: go/hermetic@v1
        - name: test
          runs: |
            set -eux -o pipefail

            # Skip tests that assume non-root (TLS permission checks) or flake in CI (scheduler timing, htpasswd watcher race)
            # Exclude packages that need external infra (trivy, redis) or root-sensitive file ops
            go test -v -count=1 -short \
              -skip 'TestTSLFailedReadingOfCACert|TestHTTPClient|TestCommon|TestScheduler|TestHTPasswdWatcherOriginal' \
              $(go list ./... | grep -v -E '(extensions/search|pkg/test/(image-utils|common)$|pkg/storage)')
        - name: build zot
          uses: go/build@v1
          with:
            experiments: jsonv2
            ldflags:
              - -X zotregistry.dev/zot/v2/pkg/api/config.ReleaseTag=2.1.16
              - -X zotregistry.dev/zot/v2/pkg/api/config.Commit=v2.1.16-b47b643e05bab5c2d7fc0466d11ec5842a9d269c
              - -X zotregistry.dev/zot/v2/pkg/api/config.BinaryType=full
              - -s
              - -w
            output: ${target.dir}/usr/local/bin/zot
            packages: ./cmd/zot
            tags: sync,search,scrub,metrics,lint,mgmt,profile,userprefs,imagetrust,events
      paths:
        - type: file
          path: ${source.dir}/etc/zot/config.json
          uid: 0
          gid: 0
          source: image/zot/config/config.json
      outputs:
        - source: ${target.dir}/usr/local/bin/zot
          target: /usr/local/bin/zot
          uid: 0
          gid: 0
        - source: ${source.dir}/etc/zot/config.json
          target: /etc/zot/config.json
          uid: 0
          gid: 0
          mode: "0644"
        - source: /opt/docker/sbom/zot
          target: /opt/docker/sbom/zot
          uid: 0
          gid: 0
