# syntax=dhi.io/build:2-debian13

name: Cassandra 4.1.x
image: dhi.io/cassandra
variant: runtime
tags:
  - "4"
  - "4.1"
  - 4.1.10
  - 4-debian13
  - 4.1-debian13
  - 4.1.10-debian13
platforms:
  - linux/amd64
  - linux/arm64
dates:
  release: "2022-12-13"
vars:
  BASE_DIGEST: sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: d48bfcce442489de45797ecdf3bde7574ade42d5
  JAVA_REFERENCE: dhi/eclipse-temurin:11.0.30-jdk-debian13-dev@sha256:9da980fe083b16d681ba140cc46d220d88036434ed2b049269baea3f4a43ce08
  JAVA_VERSION: 11.0.30
  JRE_PATH: /opt/java/openjdk/11-jre
  JRE_REFERENCE: dhi/eclipse-temurin:11.0.30-debian13@sha256:0c3b4f55b443c725e5fcdda80140555909a7295f5ff31a67a03dc203a12645b8
  SEMVER_MAJOR_MINOR_VERSION: "4.1"
  SEMVER_MAJOR_VERSION: "4"
  SEMVER_VERSION: 4.1.10
  VERSION: 4.1.10
contents:
  packages:
    - '!base-files'
    - bash
    - ca-certificates
    - coreutils
    - grep
    - numactl
    - procps
    - sed
    - util-linux
  builds:
    - name: cassandra
      uses: dhi.io/eclipse-temurin:11.0.30-jdk-debian13-dev@sha256:9da980fe083b16d681ba140cc46d220d88036434ed2b049269baea3f4a43ce08
      work-dir: ${source.dir}/apache/cassandra
      contents:
        packages:
          - bash
          - coreutils
          - curl
          - dirmngr
          - gpg
          - gpg-agent
          - jq
          - libjemalloc2
          - tar
          - gzip
          - ant
          - ant-optional
        files:
          - url: git+https://github.com/apache/cassandra.git#cassandra-4.1.10
            checksum: d48bfcce442489de45797ecdf3bde7574ade42d5
            path: ${source.dir}/apache/cassandra
            spdx:
              name: apache-cassandra
              version: 4.1.10
              packages:
                - name: cassandra
                  purl: pkg:github/apache/cassandra@4.1.10
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: update lz4-java groupId for new coordinates
          runs: |
            set -eux -o pipefail

            sed -i 's|groupId="org.lz4" artifactId="lz4-java"|groupId="at.yawk.lz4" artifactId="lz4-java"|g' build.xml
            echo "Updated lz4-java groupId from org.lz4 to at.yawk.lz4"
            grep "lz4-java" build.xml
        - name: patch cassandra 4.x dependencies
          runs: |
            set -eux -o pipefail

            jq -c '.[]' "${source.dir}/patch/cassandra-4-mvn-dependencies.json" | while read -r dep; do
              groupId="$(echo "$dep" | jq -r '.groupId')"
              artifactId="$(echo "$dep" | jq -r '.artifactId')"
              from_version="$(echo "$dep" | jq -r '.from_version')"
              version="$(echo "$dep" | jq -r '.version')"

              if ! grep -q "groupId=\"${groupId}\" artifactId=\"${artifactId}\" version=\"${from_version}\"" build.xml; then
                echo "ERROR: ${groupId}:${artifactId}:${from_version} not found in build.xml; upstream may have bumped this dependency. Update cassandra-4-mvn-dependencies.json." >&2
                exit 1
              fi
              sed -i "s|groupId=\"${groupId}\" artifactId=\"${artifactId}\" version=\"${from_version}\"|groupId=\"${groupId}\" artifactId=\"${artifactId}\" version=\"${version}\"|g" build.xml
            done
        - name: fix guava failureaccess dependency
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/4.1/guava-failureaccess.patch
        - name: exclude vulnerable hadoop dependencies
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/4.1/exclude-dependencies.patch
        - name: patch snakeyaml compatibility
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/4.1/snakeyaml-compatibility.patch
        - name: patch logback compatibility for cassandra 4.x
          uses: git/patch@v1
          with:
            patch: ${source.dir}/patch/4.1/logback-compatibility.patch
        - name: prefetch maven resolver ant tasks
          privileged: true
          runs: |
            set -eux -o pipefail

            DEST=/root/.m2/repository/org/apache/maven/resolver/maven-resolver-ant-tasks/1.3.0
            JAR="$DEST/maven-resolver-ant-tasks-1.3.0.jar"
            mkdir -p "$DEST"

            URLS="https://maven-central.storage-download.googleapis.com/maven2/org/apache/maven/resolver/maven-resolver-ant-tasks/1.3.0/maven-resolver-ant-tasks-1.3.0-uber.jar
            https://repo.maven.apache.org/maven2/org/apache/maven/resolver/maven-resolver-ant-tasks/1.3.0/maven-resolver-ant-tasks-1.3.0-uber.jar
            https://repo1.maven.org/maven2/org/apache/maven/resolver/maven-resolver-ant-tasks/1.3.0/maven-resolver-ant-tasks-1.3.0-uber.jar"

            for url in $URLS; do
              echo ">>> trying $url"
              if curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors "$url" -o "$JAR"; then
                echo ">>> got jar from $url ($(wc -c < "$JAR") bytes)"
                exit 0
              fi
              echo ">>> $url failed, trying next"
            done
            echo "all mirrors failed for maven-resolver-ant-tasks-1.3.0-uber.jar" >&2
            exit 1
        - name: build cassandra
          privileged: true
          runs: |
            set -eux -o pipefail

            if [ "4.1" = "4.0" ] || [ "4.1" = "4.1" ]; then
              export CASSANDRA_USE_JDK11=true
            fi

            MIRROR=https://maven-central.storage-download.googleapis.com/maven2
            ant _main-jar \
              -Dno-checkstyle=true \
              -Dartifact.remoteRepository.central="$MIRROR" \
              -Dartifact.remoteRepository.apache="$MIRROR" \
              -Dmaven-ant-tasks.url="$MIRROR/org/apache/maven/maven-ant-tasks"
        - name: remove cqlsh from runtime bin
          runs: |
            set -eux -o pipefail

            rm -f bin/cqlsh bin/cqlsh.py
      paths:
        - type: file
          path: ${source.dir}/patch/5.0/mvn-dependencies.json
          uid: 0
          gid: 0
          source: image/cassandra/patch/5.0/mvn-dependencies.json
        - type: file
          path: ${source.dir}/patch/5.0/logback-compatibility.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/5.0/logback-compatibility.patch
        - type: file
          path: ${source.dir}/patch/cassandra-4-mvn-dependencies.json
          uid: 0
          gid: 0
          source: image/cassandra/patch/cassandra-4-mvn-dependencies.json
        - type: file
          path: ${source.dir}/patch/4.0/exclude-dependencies.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.0/exclude-dependencies.patch
        - type: file
          path: ${source.dir}/patch/4.1/exclude-dependencies.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.1/exclude-dependencies.patch
        - type: file
          path: ${source.dir}/patch/4.1/snakeyaml-compatibility.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.1/snakeyaml-compatibility.patch
        - type: file
          path: ${source.dir}/patch/4.0/snakeyaml-compatibility.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.0/snakeyaml-compatibility.patch
        - type: file
          path: ${source.dir}/patch/4.0/guava-failureaccess.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.0/guava-failureaccess.patch
        - type: file
          path: ${source.dir}/patch/4.1/guava-failureaccess.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.1/guava-failureaccess.patch
        - type: file
          path: ${source.dir}/patch/4.0/logback-compatibility.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.0/logback-compatibility.patch
        - type: file
          path: ${source.dir}/patch/4.1/logback-compatibility.patch
          uid: 0
          gid: 0
          source: image/cassandra/patch/4.1/logback-compatibility.patch
      outputs:
        - source: ${source.dir}/apache/cassandra/bin
          target: /opt/cassandra/bin
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/conf
          target: /opt/cassandra/conf
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/doc
          target: /opt/cassandra/doc
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/build/apache-cassandra-4.1.10-SNAPSHOT.jar
          target: /opt/cassandra/lib/apache-cassandra-4.1.10-SNAPSHOT.jar
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/build/classes
          target: /opt/cassandra/lib/classes
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/build/lib/jars
          target: /opt/cassandra/lib
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/pylib
          target: /opt/cassandra/pylib
          uid: 0
          gid: 0
        - source: ${source.dir}/apache/cassandra/tools
          target: /opt/cassandra/tools
          uid: 0
          gid: 0
    - name: locale
      contents:
        packages:
          - bash
          - locales
          - coreutils
          - gzip
      pipeline:
        - name: install locales
          runs: |
            set -eux -o pipefail

            ln -s /etc/locale.alias /usr/share/locale/locale.alias

            echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
            locale-gen en_US.UTF-8
      outputs:
        - source: /usr/share/locale
          target: /usr/share/locale
          uid: 0
          gid: 0
        - source: /usr/lib/locale
          target: /usr/lib/locale
          uid: 0
          gid: 0
  artifacts:
    - name: dhi.io/eclipse-temurin:11.0.30-debian13@sha256:0c3b4f55b443c725e5fcdda80140555909a7295f5ff31a67a03dc203a12645b8
      includes:
        - opt/**
      uid: 0
      gid: 0
    - name: dhi.io/static:20250419-debian13@sha256:74fc43fa240887b8159970e434244039aab0c6efaaa9cf044004cdc22aa2a34d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: cassandra
  users:
    - name: cassandra
      uid: 999
      gid: 999
  groups:
