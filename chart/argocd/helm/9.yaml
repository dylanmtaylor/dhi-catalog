# syntax=dhi.io/build:2-helm3

name: Argo CD Helm chart 9.x
image: dhi.io/argocd-chart
variant: helm
tags:
  - 9.5.14
platforms:
  - linux/amd64
vars:
  ARGOCD_REFERENCE: dhi/argocd:3.4.2-debian13@sha256:7ae010da4659605d78179e5116855df5725437d75e098db328cfa9d9fb2440a1
  CHART_COMMIT_SHA: 8b96b7d918925e9f1f8260f8a1ee3e498a2db63f
  DEX_REFERENCE: dhi/dex:2.45.1-debian13@sha256:3f4fa677b8d8c5f9ac372b3741345b1a74ca309b492278f79cff519260a6012f
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HAPROXY_CHART_REFERENCE: dhi/haproxy-chart:1.28.1@sha256:c698ee175d704432dff2eb14341acb57f686a1408c755041e2bc58b7f38d38a0
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
  REDIS_CHART_REFERENCE: dhi/redis-chart:23.0.7@sha256:313098a17db88c2c689cdc5978dce38c6804cf3132b36323f7f0e3f4e3d6edcf
  REDIS_EXPORTER_REFERENCE: dhi/redis-exporter:1.83.0-debian13@sha256:0cbc6d7b1583e5b16ef4e17df1193ed593d51bd98885c491dbcfb96ba1dd5fd2
  REDIS_REFERENCE: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
  SEMVER_MAJOR_MINOR_VERSION: "9.5"
  SEMVER_MAJOR_VERSION: "9"
  SEMVER_VERSION: 9.5.14
  VERSION: 9.5.14
contents:
  builds:
    - name: argocd
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/argoproj/argo-helm#argo-cd-9.5.14
            checksum: 8b96b7d918925e9f1f8260f8a1ee3e498a2db63f
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            chart:
              appRef: argocd
              dependencies:
                - alias: redis-ha
                  condition: redis-ha.enabled
                  name: redis-ha
                  ref: dhi/redis-chart:23.0.7@sha256:313098a17db88c2c689cdc5978dce38c6804cf3132b36323f7f0e3f4e3d6edcf
                - alias: haproxy
                  condition: haproxy.enabled
                  name: haproxy
                  ref: dhi/haproxy-chart:1.28.1@sha256:c698ee175d704432dff2eb14341acb57f686a1408c755041e2bc58b7f38d38a0
              description: Docker Hardened Images Helm chart for Argo CD
              images:
                - name: argocd
                  ref: dhi/argocd:3.4.2-debian13@sha256:7ae010da4659605d78179e5116855df5725437d75e098db328cfa9d9fb2440a1
                - name: dex
                  ref: dhi/dex:2.45.1-debian13@sha256:3f4fa677b8d8c5f9ac372b3741345b1a74ca309b492278f79cff519260a6012f
                - name: redis
                  ref: dhi/redis:8.6.3-debian13-compat@sha256:76c27985358eecb0bf24fbc294432cb3ee5832be3761b84f340cd2579422fe86
                - name: redis-exporter
                  ref: dhi/redis-exporter:1.83.0-debian13@sha256:0cbc6d7b1583e5b16ef4e17df1193ed593d51bd98885c491dbcfb96ba1dd5fd2
              name: argocd-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/argoproj/argo-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/argo-cd
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update values
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: argo-cd/values.yaml
            patches:
              - del(.redis-ha.image)
              - del(.redis-ha.exporter.image)
              - del(.redis-ha.exporter.tag)
              - del(.redis-ha.haproxy.image.repository)
              - del(.redis-ha.haproxy)
              - del(.redis-ha.redis.masterGroupName)
              - del(.redis-ha.redis.config)
              - del(.redis-ha.hardAntiAffinity)
              - del(.redis-ha.additionalAffinities)
              - del(.redis-ha.affinity)
              - del(.redis-ha.tolerations)
              - del(.redis-ha.topologySpreadConstraints)
              - del(.redis-ha.containerSecurityContext)
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/argo-cd/templates
          runs: |
            set -eux -o pipefail

            sed -i 's/$redisHa.haproxy.enabled/.Values.haproxy.enabled/' _helpers.tpl
            # HAProxy is a sibling subchart (dhi/haproxy-chart); its Service name is haproxy.fullname, not
            # "{redis-ha fullname}-haproxy" as in the upstream embedded redis-ha chart.
            sed -i 's#        {{- printf "%s-haproxy" (include "redis-ha.fullname" $redisHaContext) | trunc 63 | trimSuffix "-" -}}#        {{- include "haproxy.fullname" (dict "Chart" (dict "Name" "haproxy") "Release" .Release "Values" .Values.haproxy) | trunc 63 | trimSuffix "-" -}}#' _helpers.tpl
            cat "${source.dir}/config/_helpers.redis-ha.append.tpl" >> _helpers.tpl
        - name: helm login
          uses: helm/login@v1
          with:
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          privileged: true
          with:
            chart: argo-cd
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: argo-cd
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/argocd/config
