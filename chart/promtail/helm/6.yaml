# syntax=dhi.io/build:2-helm3

name: Promtail Helm chart 6.x
image: dhi.io/promtail-chart
variant: helm
tags:
  - 6.17.1
platforms:
  - linux/amd64
vars:
  CHART_COMMIT_SHA: b68e01680c1aa5230134a6620ac5c9c6ac007985
  DHI_NAMESPACE: dhi
  DHI_PREFIX: ""
  DHI_REGISTRY: dhi.io
  DHI_SKIP_CONTEXT_COPY: "true"
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
  PROMETHEUS_CONFIG_RELOADER_IMAGE_REFERENCE: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:663521947cad99f56d0550697a339d39296e4475bf769aa8fb1c7c220ab713fd
  PROMTAIL_REFERENCE: dhi/promtail:3.6.11-debian13@sha256:84ca5e7c1cdde6580ebda8bcb3900dad5b5b23f85374028248e648b3d26a789e
  SEMVER_MAJOR_MINOR_VERSION: "6.17"
  SEMVER_MAJOR_VERSION: "6"
  SEMVER_VERSION: 6.17.1
  VERSION: 6.17.1
contents:
  builds:
    - name: promtail
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/helm-charts.git#promtail-6.17.1
            checksum: b68e01680c1aa5230134a6620ac5c9c6ac007985
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/promtail
          with:
            chart:
              appRef: promtail
              description: Docker Hardened Images Helm chart for Promtail
              images:
                - name: promtail
                  ref: dhi/promtail:3.6.11-debian13@sha256:84ca5e7c1cdde6580ebda8bcb3900dad5b5b23f85374028248e648b3d26a789e
                - name: prometheus-config-reloader
                  ref: dhi/prometheus-config-reloader:0.91.0-debian13@sha256:663521947cad99f56d0550697a339d39296e4475bf769aa8fb1c7c220ab713fd
              name: promtail-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: remove default volumes
          uses: yq/patch@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            file: promtail/values.yaml
            patches:
              - del(.defaultVolumes)
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/promtail
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: promtail
            cmd: lint .
        - name: package
          uses: helm/package@v1
          work-dir: ${source.dir}/helm-charts/charts
          with:
            chart: promtail
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/promtail/config
