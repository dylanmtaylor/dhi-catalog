image:
  repository: ${zot.registry}/${zot.repository}
  tag: ${zot.tag}@${zot.digest}

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

test:
  image:
    repository: ${alpine-base.registry}/${alpine-base.repository}
    tag: ${alpine-base.tag}@${alpine-base.digest}
