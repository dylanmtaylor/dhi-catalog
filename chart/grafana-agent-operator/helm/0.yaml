  GRAFANA_AGENT_REFERENCE: dhi/grafana-agent:0.44.8-debian13@sha256:917f6b8b022d980c0037b26185da6673d070c1e97ca3dc509eb09e7d3871b184
  HELM_REFERENCE: dhi/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
  SEMVER_MAJOR_MINOR_VERSION: "0.5"
