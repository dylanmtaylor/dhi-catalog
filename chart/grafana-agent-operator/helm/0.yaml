contents:
  builds:
    - name: grafana-agent-operator-chart
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:f4a916b146b07955a0f7f705854bfda3af7853e4cedb839335d4d269004cbf00
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/grafana/helm-charts.git#grafana-agent-operator-0.5.2
            checksum: af9ef28257450b1bbf292a9de8bc42d3eeef3c42
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/agent-operator
          with:
            chart:
              appRef: grafana-agent-operator
              description: Docker Hardened Images Helm chart for Grafana Agent Operator
              images:
                - name: grafana-agent-operator
                  ref: dhi/grafana-agent-operator:0.44.8-debian13@sha256:d553de8413ff901d0d34f664aa02ae5acf8825492be1930affacf5a31005566e
                - name: grafana-agent
                  ref: dhi/grafana-agent:0.44.8-debian13@sha256:917f6b8b022d980c0037b26185da6673d070c1e97ca3dc509eb09e7d3871b184
                - name: busybox
                  ref: dhi/busybox:1.37.0-debian13@sha256:f05f53964b498b59b389a4f28b1ec0c588f8612ba78a79154ab793d32e55641b
              name: grafana-agent-operator-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/grafana/helm-charts
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/charts/agent-operator
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: Patch templates
          work-dir: ${source.dir}/helm-charts/charts/agent-operator/templates/tests
          runs: |
            set -eux -o pipefail

            sed -i '/image: "{{ .Values.image.registry }}.*/a\
              securityContext:\
                runAsNonRoot: true\
                runAsUser: 65532\
                allowPrivilegeEscalation: false\
                seccompProfile:\
                  type: RuntimeDefault\
            ' test-grafanaagent.yaml
            sed -i 's/image: "{{ .Values.image.registry }}\/grafana\/agent:{{ .Values.image.tag }}"/image: "{{ .Values.test.grafana.image.registry }}\/{{ .Values.test.grafana.image.repository}}:{{ .Values.test.grafana.image.tag }}"/' test-grafanaagent.yaml
        - name: lint
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts/charts/agent-operator
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts/charts/agent-operator
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/grafana-agent-operator/config
