  VAULT_HELM_REFERENCE: dhi/vault:1.21.4-debian13-helm@sha256:d8a67de853fec1ff8fb5e9d17f880d5a68e24116ac3a6c027fb64b893bdeccb9
  VAULT_K8S_REFERENCE: dhi/vault-k8s:1.7.4-debian13@sha256:d2f3b4a5854658c41c661497dbe1fe2ca513baaf856d7ae4211ea2661f404c70
  VAULT_REFERENCE: dhi/vault:1.21.4-debian13@sha256:b0ed3835fe41fad7b9a8f7bbf2b684d250d1bc45df5f4708aa29eafb6174ce48
  VERSION: 0.32.0
contents:
  builds:
    - name: vault
      uses: dhi.io/helm:3.21.0-debian13-dev@sha256:462393863790e8d4b174f63f0da50798da095a059d4fab7692ae4fb7a58e99d3
      contents:
        packages:
          - bash
          - build-essential
          - coreutils
          - grep
          - libc-bin
          - sed
        files:
          - url: git+https://github.com/hashicorp/vault-helm.git#v0.32.0
            checksum: 3e032ad7685f80fc2a021e282a52b6d2fbd37a07
            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart:
              appRef: vault
              description: Docker Hardened Images Helm chart for Vault
              images:
                - name: vault
                  ref: dhi/vault:1.21.4-debian13@sha256:b0ed3835fe41fad7b9a8f7bbf2b684d250d1bc45df5f4708aa29eafb6174ce48
                - name: vault-helm
                  ref: dhi/vault:1.21.4-debian13-helm@sha256:d8a67de853fec1ff8fb5e9d17f880d5a68e24116ac3a6c027fb64b893bdeccb9
                - name: vault-k8s
                  ref: dhi/vault-k8s:1.7.4-debian13@sha256:d2f3b4a5854658c41c661497dbe1fe2ca513baaf856d7ae4211ea2661f404c70
                - name: vault-csi-provider
                  ref: dhi/vault-csi-provider:1.7.1-debian13@sha256:f4a44cde64365aea53116683f5700f9e5149cd45d555ccd48b458c2169f2912b
              name: vault-chart
              notes: ${source.dir}/config/NOTES.txt
              sourceUrl: https://github.com/hashicorp/vault-helm
            cmd: prepare
            registry: dhi.io
        - name: relocate chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts
          with:
            cmd: patch
            patches:
              from: ${source.dir}/config
            registry: dhi.io
        - name: update dependencies
          uses: helm/cmd@v1
          with:
            chart: ${source.dir}/helm-charts
            cmd: dependency update
        - name: lint
          uses: helm/cmd@v1
          work-dir: ${source.dir}/helm-charts
          with:
            chart: .
            cmd: lint .
        - name: package
          uses: helm/package@v1
          with:
            chart: ${source.dir}/helm-charts
      paths:
        - type: directory
          path: ${source.dir}/config
          uid: 0
          gid: 0
          mode: "0644"
          source: chart/vault/config
