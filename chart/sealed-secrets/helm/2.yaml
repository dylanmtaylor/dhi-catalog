            path: ${source.dir}/helm-charts
            uid: 0
            gid: 0
      pipeline:
        - name: prepare chart
          uses: helm/rudder@v1
          work-dir: ${source.dir}/helm-charts/helm/sealed-secrets
          with:
            chart:
              appRef: sealed-secrets-controller
              description: Docker Hardened Images Helm chart for Sealed Secrets
