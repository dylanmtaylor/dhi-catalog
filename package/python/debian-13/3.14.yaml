# syntax=dhi.io/build:2-debian13

image: dhi.io/pkg-python
variant: runtime
tags:
  - "3.14"
  - 3.14.5
  - 3.14-debian13
  - 3.14.5-debian13
platforms:
  - linux/amd64
  - linux/arm64
vars:
  COSIGN_DIGEST: sha256:9dfbfe297449aa1f23f4ea8dc1872c91ce40c810b851ae075e0a703461426dc1
  COSIGN_VERSION: 2.5.0
  EXPAT_DIGEST: sha256:fadd9a04bbefababb203f4b4df9adcccded340c463ff39382ad3780863050f1e
  EXPAT_VERSION: 2.8.1
  OIDC_IDENTITY: hugo@python.org
  OIDC_ISSUER: https://github.com/login/oauth
  PATCH_CVE-2025-12084: ""
  PATCH_CVE-2025-13836: ""
  PATCH_CVE-2025-13837: ""
  PIP_CHECKSUM: sha256:99cb1c2899893b075ff56e4ed0af55669a955b49ad7fb8d8603ecdaf4ed653fb
  PIP_URL: https://files.pythonhosted.org/packages/3a/eb/fea4d1d51c49832120f7f285d07306db3960f423a2612c6057caf3e8196f/pip-26.1.1-py3-none-any.whl
  PIP_VERSION: 26.1.1
  PYTHON_MAJOR_MINOR_VERSION: "3.14"
  PYTHON_MAJOR_VERSION: "3"
  PYTHON_VERSION: 3.14.5
  SETUPTOOLS_CHECKSUM: sha256:a59e362652f08dcd477c78bb6e7bd9d80a7995bc73ce773050228a348ce2e5bb
  SETUPTOOLS_URL: https://files.pythonhosted.org/packages/9d/76/f789f7a86709c6b087c5a2f52f911838cad707cc613162401badc665acfe/setuptools-82.0.1-py3-none-any.whl
  SETUPTOOLS_VERSION: ""
  VERSION: 3.14.5
  WHEEL_CHECKSUM: sha256:212281cab4dff978f6cedd499cd893e1f620791ca6ff7107cf270781e587eced
  WHEEL_URL: https://files.pythonhosted.org/packages/87/1b/9e33c09813d65e248f7f773119148a612516a4bea93e9c6f545f78455b7c/wheel-0.47.0-py3-none-any.whl
  WHEEL_VERSION: 0.47.0
contents:
  packages:
    - base-files
    - ca-certificates
    - libbz2-1.0
    - libcrypt1
    - libdb5.3t64
    - libffi8
    - libgcc-s1
    - liblzma5
    - libncursesw6
    - libreadline8t64
    - libsqlite3-0
    - libstdc++6
    - libtinfo6
    - libuuid1
    - ncurses-base
    - ncurses-bin
    - netbase
    - tzdata
    - zlib1g
  builds:
    - name: python
      contents:
        packages:
          - bash
          - coreutils
          - dpkg-dev
          - libc6
          - gawk
          - sed
          - grep
          - findutils
          - g++
          - gcc
          - make
          - pkg-config
          - git
          - zip
          - base-files
          - ca-certificates
          - netbase
          - tzdata
          - ncurses-base
          - ncurses-bin
          - build-essential
          - dpkg-dev
          - gcc
          - libbluetooth-dev
          - libbz2-dev
          - libc6-dev
          - libdb-dev
          - libffi-dev
          - libgdbm-dev
          - liblzma-dev
          - libncurses-dev
          - libreadline-dev
          - libsqlite3-dev
          - libssl-dev
          - tk-dev
          - uuid-dev
          - zlib1g-dev
        files:
          - url: https://files.pythonhosted.org/packages/3a/eb/fea4d1d51c49832120f7f285d07306db3960f423a2612c6057caf3e8196f/pip-26.1.1-py3-none-any.whl
            checksum: sha256:99cb1c2899893b075ff56e4ed0af55669a955b49ad7fb8d8603ecdaf4ed653fb
            path: ${source.dir}/pip-26.1.1-py3-none-any.whl
            uid: 0
            gid: 0
          - url: https://files.pythonhosted.org/packages/87/1b/9e33c09813d65e248f7f773119148a612516a4bea93e9c6f545f78455b7c/wheel-0.47.0-py3-none-any.whl
            checksum: sha256:212281cab4dff978f6cedd499cd893e1f620791ca6ff7107cf270781e587eced
            path: ${source.dir}/wheel-0.47.0-py3-none-any.whl
            uid: 0
            gid: 0
          - url: https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tar.xz.sigstore
            path: ${source.dir}/python.tar.xz.sigstore
            uid: 0
            gid: 0
          - url: https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tar.xz
            path: ${source.dir}/python.tar.xz
            spdx:
              name: python
              version: 3.14.5
              packages:
                - name: python
                  purl: pkg:dhi/python@3.14.5
                  license: PSF-2.0
            uid: 0
            gid: 0
        artifacts:
          - name: dhi.io/cosign:2.5.0@sha256:9dfbfe297449aa1f23f4ea8dc1872c91ce40c810b851ae075e0a703461426dc1
            includes:
              - usr/local/bin/cosign
            uid: 0
            gid: 0
      pipeline:
        - name: verify
          uses: cosign/verify-blob@v1
          with:
            blob: ${source.dir}/python.tar.xz
            certificate-identity: hugo@python.org
            certificate-oidc-issuer: https://github.com/login/oauth
            offline: true
            signature: ${source.dir}/python.tar.xz.sigstore
        - name: install
          runs: |
            set -eux -o pipefail

            tar -xaf python.tar.xz --strip-components=1

            for _subdir in common "3.14"; do
              _dir="${source.dir}/patch/${_subdir}"
              [ -d "${_dir}" ] || continue
              for _p in $(find "${_dir}" -maxdepth 1 -type f -name '*.patch' | LC_ALL=C sort); do
                git apply "${_p}"
              done
            done

            gnuArch="$(dpkg-architecture --query DEB_BUILD_GNU_TYPE)"

            # setuptools wheel checks: avoid zipfile CLI piped to grep/head (BrokenPipeError with pipefail)
            _wheel_name_contains() {
              python3 -c 'import sys, zipfile; w, frag = sys.argv[1], sys.argv[2]; sys.exit(0 if any(frag in n for n in zipfile.ZipFile(w).namelist()) else 1)' "$1" "$2"
            }

            if [ -f "${source.dir}/pip-26.1.1-py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/pip*
              cp "${source.dir}/pip-26.1.1-py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_PIP_VERSION = \".*\"/_PIP_VERSION = \"26.1.1\"/g" Lib/ensurepip/__init__.py
            fi

            if [ -f "${source.dir}/setuptools--py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/setuptools*
              cp "${source.dir}/setuptools--py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_SETUPTOOLS_VERSION = \".*\"/_SETUPTOOLS_VERSION = \"\"/g" Lib/ensurepip/__init__.py
            fi

            if [ -f "${source.dir}/wheel-0.47.0-py3-none-any.whl" ]; then
              rm -rf Lib/ensurepip/_bundled/wheel*
              cp "${source.dir}/wheel-0.47.0-py3-none-any.whl" Lib/ensurepip/_bundled/
              sed -i "s/_WHEEL_VERSION = \".*\"/_WHEEL_VERSION = \"0.47.0\"/g" Lib/ensurepip/__init__.py
            fi

            # Replace vendored wheel in setuptools if present
            if [ -f "${source.dir}/setuptools--py3-none-any.whl" ] && [ -f "${source.dir}/wheel-0.47.0-py3-none-any.whl" ]; then
              # Verify wheel files are valid zip archives before extracting
              if ! python3 -m zipfile -t "${source.dir}/setuptools--py3-none-any.whl" > /dev/null 2>&1; then
                echo "Error: setuptools wheel file is not a valid zip archive"
                exit 1
              fi
              if ! python3 -m zipfile -t "${source.dir}/wheel-0.47.0-py3-none-any.whl" > /dev/null 2>&1; then
                echo "Error: wheel file is not a valid zip archive"
                exit 1
              fi

              # Extract both wheels
              python3 -m zipfile -e "${source.dir}/setuptools--py3-none-any.whl" setuptools_temp/
              python3 -m zipfile -e "${source.dir}/wheel-0.47.0-py3-none-any.whl" wheel_temp/

              # Remove old vendored wheel from setuptools
              rm -rf setuptools_temp/setuptools/_vendor/wheel*

              # Copy new wheel into setuptools vendor directory
              cp -r wheel_temp/wheel/ setuptools_temp/setuptools/_vendor/
              cp -r wheel_temp/wheel-0.47.0.dist-info/ setuptools_temp/setuptools/_vendor/

              # Repackage setuptools with all its contents (including _distutils_hack, etc.)
              (cd setuptools_temp && zip -r "../setuptools--patched.whl" .)

              # Verify _distutils_hack is still present in the repacked wheel if it was in the original
              if _wheel_name_contains "${source.dir}/setuptools--py3-none-any.whl" "_distutils_hack"; then
                if ! _wheel_name_contains "setuptools--patched.whl" "_distutils_hack"; then
                  echo "ERROR: _distutils_hack was present in original setuptools but missing from repacked wheel!"
                  python3 -c 'import zipfile,sys; print("\n".join(zipfile.ZipFile(sys.argv[1]).namelist()[:30]))' "setuptools--patched.whl"
                  exit 1
                fi
              fi

              mv "setuptools--patched.whl" "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl"
              rm -rf setuptools_temp wheel_temp
            fi

            # Verify the bundled setuptools wheel still has _distutils_hack if it should
            if _wheel_name_contains "${source.dir}/setuptools--py3-none-any.whl" "_distutils_hack"; then
              if ! _wheel_name_contains "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl" "_distutils_hack"; then
                echo "ERROR: _distutils_hack not in bundled setuptools wheel!"
                python3 -c 'import zipfile,sys; print("\n".join(zipfile.ZipFile(sys.argv[1]).namelist()[:30]))' "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl"
                exit 1
              fi
            fi

            ./configure --prefix="/opt/python-3.14.5" \
              --build="$gnuArch" \
              --enable-loadable-sqlite-extensions \
              --enable-option-checking=fatal \
              --enable-shared \
              --with-lto \
              --with-ensurepip

            nproc="$(nproc)"
            EXTRA_CFLAGS="-DTHREAD_STACK_SIZE=0x100000"
            LDFLAGS="${LDFLAGS:--Wl},--strip-all"
            EXTRA_CFLAGS="${EXTRA_CFLAGS:-} -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
            make -j "$nproc" "EXTRA_CFLAGS=${EXTRA_CFLAGS:-}" "LDFLAGS=${LDFLAGS:-}"
            rm python
            make -j "$nproc" "EXTRA_CFLAGS=${EXTRA_CFLAGS:-}" "LDFLAGS=${LDFLAGS:--Wl},-rpath='\$\$ORIGIN/../lib'" python

            make DESTDIR="${target.dir}" install

            # Verify _distutils_hack was installed if it was present in the wheel
            if _wheel_name_contains "Lib/ensurepip/_bundled/setuptools--py3-none-any.whl" "_distutils_hack"; then
              if [ ! -d "${target.dir}/opt/python-3.14.5/lib/python3.14/site-packages/_distutils_hack" ]; then
                echo "ERROR: _distutils_hack directory not found in installed site-packages!"
                ls -la "${target.dir}/opt/python-3.14.5/lib/python3.14/site-packages/" | head -20
                exit 1
              fi
              if [ ! -f "${target.dir}/opt/python-3.14.5/lib/python3.14/site-packages/_distutils_hack/override.py" ]; then
                echo "ERROR: _distutils_hack/override.py file not found!"
                ls -la "${target.dir}/opt/python-3.14.5/lib/python3.14/site-packages/_distutils_hack/"
                exit 1
              fi
            fi

            ln -s idle3 "${target.dir}/opt/python-3.14.5/bin/idle"
            ln -s pip3 "${target.dir}/opt/python-3.14.5/bin/pip"
            ln -s pydoc3 "${target.dir}/opt/python-3.14.5/bin/pydoc"
            ln -s python3 "${target.dir}/opt/python-3.14.5/bin/python"
            ln -s python3-config "${target.dir}/opt/python-3.14.5/bin/python-config"

            ln -s "/opt/python-3.14.5" "${target.dir}/opt/python"

            # shellcheck disable=SC2061,SC2035
            find "${target.dir}/opt/python-3.14.5" -depth \
              \( \
              \( -type d -a \( -name test -o -name tests -o -name idle_test \) \) \
              -o \( -type f -a \( -name '*.pyc' -o -name '*.pyo' -o -name 'libpython*.a' \) \) \
              \) -exec rm -rf '{}' +
        - name: strip
          uses: strip@v1
          with:
            dir: ${target.dir}/opt
      paths:
        - type: directory
          path: ${source.dir}/patch
          uid: 0
          gid: 0
          source: package/python/patch
          recursive: true
        - type: directory
          path: /tmp
          uid: 0
          gid: 0
      outputs:
        - source: ${target.dir}/opt
          target: /opt
          uid: 0
          gid: 0
        - source: /opt/docker/sbom
          target: /opt/docker/sbom
          uid: 0
          gid: 0
accounts:
  root: true
  run-as: root
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
environment:
  LD_LIBRARY_PATH: /opt/python/lib
  PATH: /opt/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  PYTHON_VERSION: 3.14.5
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
